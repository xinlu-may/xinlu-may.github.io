<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心路新路全齡身心健康幸福導航站預約系統</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fcfcfc; color: #333; text-align: center; padding: 20px; }
        h1 { color: #4a6741; margin-bottom: 30px; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        .service-card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-decoration: none; 
            color: #333; 
            transition: transform 0.2s;
        }
        .service-card:hover { transform: translateY(-5px); }
        .icon { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h1>🌱 心路新路全齡身心健康幸福導航站預約系統</h1>
    <p>歡迎預約，請選擇您的服務項目：</p>
    <div class="grid-container">
        <a href="#tokyo" class="service-card"><span class="icon">✈️</span>東京行程預約</a>
        <a href="#assessment" class="service-card"><span class="icon">🔍</span>全齡關懷十大向度健康幸福測評預約</a>
        <a href="#counseling" class="service-card"><span class="icon">💬</span>1 對 1 諮詢預約</a>
        <a href="#reading" class="service-card"><span class="icon">📚</span>線上讀書會預約</a>
        <a href="#youth" class="service-card"><span class="icon">🧒</span>兒童青少年課程預約</a>
        <a href="#senior" class="service-card"><span class="icon">👵</span>樂齡課程預約</a>
    </div>
</body>
</html>
