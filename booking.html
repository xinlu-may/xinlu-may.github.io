<style>
  :root{
    --paper:#FFF8F5;
    --paper-deep:#FBEEEA;
    --ink:#3A3530;
    --ink-soft:#4a423c;
    --navy:#3A4A5C;
    --navy-deep:#2C3A48;
    --clay:#E8956B;
    --clay-deep:#C96F45;
    --sage:#8FC4A8;
    --sage-deep:#5A9B78;
    --sakura:#F4A8B8;
    --sakura-deep:#D97A8E;
    --sky:#7FB8D9;
    --sky-deep:#4F94BC;
    --line:#DDD3C0;
    --white:#FFFFFF;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 2px 10px rgba(44,62,80,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Sans TC',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{
    font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Serif TC',serif;
    font-weight:700;
    color:var(--navy);
    margin:0;
  }
  a{color:var(--clay-deep);}
  button{font-family:inherit;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}

  /* ===== Hero / Stamp signature ===== */
  .hero{
    background: linear-gradient(165deg, #FDEEF1 0%, #FBE4E9 35%, #E8F2F7 75%, #DCEDF5 100%);
    color:var(--ink);
    padding:64px 20px 56px;
    position:relative;
    overflow:hidden;
  }
  .hero .wrap{display:flex;align-items:center;gap:40px;flex-wrap:wrap;position:relative;z-index:2;}
  .hero-text{flex:1;min-width:280px;}
  .hero-eyebrow{
    font-size: 17px;letter-spacing:.12em;color:var(--sakura-deep);
    text-transform:uppercase;margin-bottom:10px;font-weight:500;
  }
  .hero h1{
    color:var(--navy);font-size:clamp(28px,4vw,42px);line-height:1.3;margin-bottom:14px;
  }
  .hero p.lead{color:var(--ink-soft);font-size: 19px;max-width:480px;margin:0;}
  .hero-deco{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
  .hero-dates{
    display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;
  }
  .hero-date-chip{
    border:1px solid var(--sakura);border-radius:30px;background:rgba(255,255,255,0.6);
    padding:6px 16px;font-size: 17px;color:var(--navy);
  }
  .stamp{
    flex-shrink:0;width:148px;height:148px;border-radius:50%;
    border:3px solid var(--clay);
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-9deg);
    position:relative;
  }
  .stamp::before{
    content:'';position:absolute;inset:10px;border:1px dashed rgba(201,123,99,0.6);border-radius:50%;
  }
  .stamp-inner{text-align:center;color:var(--clay);}
  .stamp-inner .top{font-size: 15px;letter-spacing:.15em;display:block;margin-bottom:4px;}
  .stamp-inner .city{font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Serif TC',serif;font-weight:700;font-size: 26px;display:block;}
  .stamp-inner .yr{font-size: 16px;letter-spacing:.1em;display:block;margin-top:4px;}

  /* ===== Nav ===== */
  .tabbar{
    background:var(--white);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:50;
  }
  .tabbar .wrap{display:flex;gap:4px;overflow-x:auto;}
  .tab-btn{
    background:none;border:none;padding:16px 18px;font-size: 16px;color:var(--ink-soft);
    cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;
  }
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--clay);}
  .tab-btn:hover{color:var(--navy);}

  section.panel{display:none;padding:44px 0 64px;}
  section.panel.active{display:block;}

  .section-head{margin-bottom:28px;}
  .section-head .eyebrow{color:var(--clay-deep);font-size: 17px;font-weight:700;letter-spacing:.06em;margin-bottom:6px;}
  .section-head h2{font-size: 26px;}
  .section-head p{color:var(--ink-soft);margin-top:8px;max-width:600px;}

  /* ===== Calendar ===== */
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px;font-size: 17px;color:var(--ink-soft);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .dot.open{background:var(--sage);}
  .dot.booked{background:var(--clay);}
  .dot.locked{background:#C8BFA8;}
  .dot.family{background:#E8B86D;}

  .cal-day{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:14px;overflow:hidden;
  }
  .cal-day-head{
    display:flex;align-items:baseline;gap:10px;padding:14px 18px;
    background:var(--paper-deep);border-bottom:1px solid var(--line);
  }
  .cal-day-head .d-label{font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Serif TC',serif;font-weight:700;font-size: 21px;color:var(--navy);}
  .cal-day-head .d-week{font-size: 17px;color:var(--ink-soft);}
  .cal-day-head .d-tag{
    margin-left:auto;font-size: 16px;font-weight:700;padding:3px 10px;border-radius:20px;
  }
  .cal-day-head .d-tag.family{background:#FBE9CC;color:#8A5A1A;}
  .cal-day-head .d-tag.event{background:#E6E0EF;color:#473A6B;}
  .cal-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;padding:16px 18px;
  }
  .slot{
    border-radius:var(--radius-sm);padding:9px 6px;text-align:center;font-size: 16.5px;
    border:1px solid var(--line);cursor:default;line-height:1.4;
  }
  .slot .t{font-weight:700;display:block;}
  .slot .s{display:block;color:var(--ink-soft);font-size: 15px;margin-top:2px;}
  .slot.open{background:#EFF4EC;border-color:#C9DABE;cursor:pointer;}
  .slot.open:hover{background:#E3EDDC;}
  .slot.booked{background:#F6E6DF;border-color:var(--clay);}
  .slot.booked .t{color:var(--clay-deep);}
  .slot.locked{background:#F1EEE5;color:#A89F8C;border-color:#E3DCC9;}
  .slot.family{background:#FCF1DC;border-color:#E8B86D;}

  /* ===== Cards ===== */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;}
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;
  }
  .card .badge{
    display:inline-block;font-size: 13px;font-weight:700;color:var(--sage-deep);
    background:#E9EFE5;padding:3px 10px;border-radius:20px;margin-bottom:10px;width:fit-content;
  }
  .card h3{font-size: 21px;margin-bottom:6px;}
  .card .meta{font-size: 17.5px;color:var(--ink-soft);margin-bottom:14px;}
  .card .meta b{color:var(--ink);}
  .card .price{font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Serif TC',serif;font-size: 24px;color:var(--clay-deep);font-weight:700;margin-bottom:4px;}
  .card .price-note{font-size: 16px;color:var(--ink-soft);margin-bottom:14px;}
  .card .count{font-size: 16.5px;color:var(--sage-deep);margin-bottom:14px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--sakura-deep);color:#fff;border:none;border-radius:30px;
    padding:11px 22px;font-size: 15.5px;font-weight:500;cursor:pointer;text-align:center;
    transition:background .15s;
  }
  .btn:hover{background:#C25E73;}
  .btn.secondary{background:none;color:var(--navy);border:1px solid var(--navy);}
  .btn.secondary:hover{background:var(--paper-deep);}
  .btn.full{width:100%;margin-top:auto;}
  .btn.clay{background:var(--clay);}
  .btn.clay:hover{background:var(--clay-deep);}
  .btn.line{background:#06C755;}
  .btn.line:hover{background:#05A647;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .line-login-bar{
    background:var(--white);border-bottom:1px solid var(--line);padding:14px 0;
  }
  .line-login-bar .wrap{display:flex;align-items:center;justify-content:center;}
  .line-login-status{
    display:flex;align-items:center;gap:10px;background:#F0FBF4;border:1px solid #BFE8CC;
    border-radius:30px;padding:9px 18px;font-size: 18px;color:#1E7A3D;font-weight:500;
  }
  .line-login-status .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;}

  .intake-form-section{
    margin-top:24px;padding-top:20px;border-top:2px dashed var(--line);
  }
  .intake-title{font-family:'標楷體','DFKai-SB','BiauKai','Kaiti TC','KaiTi','Noto Serif TC',serif;font-size: 20px;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .intake-hint{font-size: 16.5px;color:var(--ink-soft);margin-bottom:16px;line-height:1.6;}
  .intake-subhead{
    font-size: 17px;font-weight:700;color:var(--clay-deep);margin:20px 0 10px;
    padding-bottom:4px;border-bottom:1px solid var(--line);
  }
  .intake-followup-note{
    font-size: 16.5px;color:var(--ink-soft);background:var(--paper-deep);border-radius:10px;
    padding:12px 14px;margin-top:18px;line-height:1.6;
  }

  /* ===== Forms / Modal ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(44,40,32,0.55);
    display:none;align-items:flex-start;justify-content:center;z-index:200;
    padding:40px 16px;overflow-y:auto;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--paper);border-radius:18px;max-width:520px;width:100%;
    padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-close{
    position:absolute;top:18px;right:18px;background:none;border:none;font-size: 21px;
    color:var(--ink-soft);cursor:pointer;line-height:1;
  }
  .field{margin-bottom:16px;}
  .field label{display:block;font-size: 17.5px;font-weight:500;margin-bottom:6px;color:var(--ink);}
  .field input[type=text],.field input[type=tel],.field input[type=email],.field input[type=number],.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);
    font-size: 17.5px;font-family:inherit;background:var(--white);color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:70px;}
  .radio-row{display:flex;gap:14px;flex-wrap:wrap;}
  .radio-row label{display:flex;align-items:center;gap:6px;font-weight:400;font-size: 18px;}
  .pay-options{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .pay-option{
    border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;
    display:flex;align-items:flex-start;gap:10px;cursor:pointer;
  }
  .pay-option.selected{border-color:var(--clay);background:#FBF0EA;}
  .pay-option input{margin-top:3px;}
  .pay-option .lab{font-weight:500;font-size: 17.5px;}
  .pay-option .sub{font-size: 16.5px;color:var(--ink-soft);margin-top:2px;}
  .amount-row{display:flex;align-items:center;gap:10px;margin:14px 0;}
  .amount-row input[type=number]{width:120px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:var(--paper);padding:13px 24px;border-radius:30px;
    font-size: 17.5px;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:300;display:none;
  }
  .toast.show{display:block;}

  /* ===== Footer / location ===== */
  .loc-card{
    background:var(--navy);color:var(--paper);border-radius:var(--radius);padding:28px;
    display:flex;gap:20px;flex-wrap:wrap;align-items:center;
  }
  .loc-pin{
    flex-shrink:0;width:52px;height:52px;border-radius:50%;background:var(--clay);
    display:flex;align-items:center;justify-content:center;font-size: 26px;
  }
  .loc-card .addr-en{color:#D8CFC0;font-size: 18px;margin-top:4px;}
  .loc-card .addr-zh{font-size: 20px;font-weight:500;margin-top:2px;}

  .line-cta{
    background:#EAF6E9;border:1px solid #BFE2BC;border-radius:var(--radius);
    padding:22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:26px;
  }
  .line-cta .txt h3{font-size: 19px;margin-bottom:4px;}
  .line-cta .txt p{font-size: 17.5px;color:var(--ink-soft);margin:0;}

  footer{text-align:center;padding:30px 20px;color:var(--ink-soft);font-size: 17px;}

  @media (max-width:640px){
    .hero .wrap{flex-direction:column;text-align:center;}
    .hero p.lead{margin:0 auto;}
  }
</style>
</head>

<script>
/* ===================== 資料設定 ===================== */

const TRIP_START = '2026-07-05';
const TRIP_END = '2026-07-19';
const WEEKDAY_NAMES = ['日','一','二','三','四','五','六'];

const WORKSHOPS = [
  {id:'ws1', date:'2026-07-09', label:'7/9（四）', title:'「尋見真我」濃縮課程・週間班', start:'09:00', end:'16:00', price:3000},

  {id:'sp2', date:'2026-07-13', label:'7/13（一）', title:'定化不黑化', start:'19:00', end:'21:00', price:250},
  {id:'sp3', date:'2026-07-14', label:'7/14（二）', title:'在親子手機大戰中創造雙贏', start:'19:00', end:'21:00', price:250},

const VISIT_PRICE_PER_HOUR = 1500;
const LINE_GROUP_NAME = '雪媚老師七月東京行程課程群組';
const LINE_GROUP_URL = '#'; // 待補：實際 LINE 群組/OpenChat 邀請連結
const FORMSPREE_ACTION = 'https://formspree.io/f/mlgybebe'; // Formspree 表單網址（已設定）

/* LINE Login 設定（PKCE 模式，Channel ID 是公開資訊，不是密鑰，可以放在前端） */

const LOCATION = {

  enFull: '2-chōme-23-4 Matsugaya, Taito City, Tokyo 111-0036',
};

/* 產生 7/5–7/20 的每日資料 */
function buildDays(){
  const days = [];
  let d = new Date(TRIP_START+'T00:00:00');
  const end = new Date(TRIP_END+'T00:00:00');
  while(d <= end){
    const iso = d.toISOString().slice(0,10);
    days.push({
      date: iso,
      label: `${d.getMonth()+1}/${d.getDate()}`,
      weekday: WEEKDAY_NAMES[d.getDay()],
      isSunday: d.getDay()===0,
    });
    d.setDate(d.getDate()+1);
  }
  return days;
}
const DAYS = buildDays();

/* 每日時段（10:00–20:00，整點，1小時一格） */
function hourSlotsForDay(){
  const slots = [];
  for(let h=10; h<20; h++){
    slots.push({start:h, end:h+1});
  }
  return slots;
}

/* 判斷某天某時段的狀態：
   family  -> 7/5-7/8 親子優先（仍可預約拜訪/吃飯/出遊）
   locked  -> 工作坊／演講／週日／午餐／晚餐，不可預約
   open    -> 可預約一對一拜訪
   booked  -> 已被預約（之後從 storage 動態覆蓋）
*/
function getSlotInfo(date, hour){
  const d = new Date(date+'T00:00:00');
  const isSunday = d.getDay()===0;
  const isFamilyPhase = date < '2026-07-09';

  // 週日整天鎖定（7/9之後才有週日規則；親子期間週日仍走親子邏輯）
  if(isSunday && !isFamilyPhase){
    return {status:'locked', label:'週日休息', sub:'不開放'};
  }

  // 午餐 12-14, 晚餐 16-18 一律鎖定（親子期間内也標示為親子用餐時段）
  if(hour>=12 && hour<14){
    return isFamilyPhase
      ? {status:'family', label:'午餐時間', sub:'親子時光'}
      : {status:'locked', label:'午餐時間', sub:'不開放'};
  }
  if(hour>=16 && hour<18){
    return isFamilyPhase
      ? {status:'family', label:'晚餐時間', sub:'親子時光'}
      : {status:'locked', label:'晚餐時間', sub:'不開放'};
  }

  // 工作坊／演講鎖定時段
  const ws = WORKSHOPS.find(w=>w.date===date && hour>=9 && hour<16);
  if(ws){ return {status:'locked', label:'工作坊', sub:ws.title}; }
  const sp = SPEECHES.find(s=>s.date===date && hour>=19 && hour<21);
  if(sp){ return {status:'locked', label:'講座', sub:sp.title}; }

  if(isFamilyPhase){
    return {status:'family', label:'親子時光', sub:'可安排拜訪/出遊'};
  }

  return {status:'open', label:'可預約', sub:'一對一拜訪'};
}

/* ===================== 共用即時狀態（window.storage，所有人共享，不含姓名電話） ===================== */
/* 公開資料：時段是否已被預約（true/false）、各場次報名人數。
   私密資料（姓名、電話、聯絡方式）只會送到 Formspree 到老師信箱，不會存在這裡。 */

function visitKey(date,hour){ return 'slot:'+date+'_'+hour; }

async function getSlotBooked(date,hour){ return false; }
async function setSlotBooked(date,hour){}

async function getCount(type,id){
  try{
    const { count, error } = await db.from('event_registrations')
      .select('*', { count: 'exact', head: true })
      .eq('event_type', type).eq('event_id', id);
    if (error) { console.error(error); return 0; }
    return count || 0;
  }catch(e){ return 0; }
}
async function incrementCount(type,id){
  // 實際筆數由 event_registrations 寫入後自動反映，這裡僅重新查詢最新人數
  return await getCount(type,id);
}

/* 本地快取，渲染時先用快取畫面，再用最新資料覆蓋，避免畫面一直空白等待 */
let bookedCache = {};
let countCache = {ws:{}, sp:{}};

async function refreshAllSharedData(){
  for(const day of DAYS){
    for(const slot of hourSlotsForDay()){
      const info = getSlotInfo(day.date, slot.start);
      if(info.status==='open'){
        bookedCache[visitKey(day.date, slot.start)] = await getSlotBooked(day.date, slot.start);
      }
    }
  }
  for(const w of WORKSHOPS){ countCache.ws[w.id] = await getCount('ws', w.id); }
  for(const s of SPEECHES){ countCache.sp[s.id] = await getCount('sp', s.id); }
}

function openRegisterModal(type, eventId){
  const list = type==='ws' ? WORKSHOPS : SPEECHES;
  const ev = list.find(e=>e.id===eventId);
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 style="font-size:22px;margin-bottom:4px;">${ev.title}</h2>
    <p style="color:var(--ink-soft);font-size:17.5px;margin-bottom:20px;">${ev.label}　${ev.start}－${ev.end}</p>
    <form id="register-form">
      <div class="field">
        <label>姓名</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>聯絡方式（電話或 LINE ID）</label>
        <input type="text" name="contact" required>
      </div>
      <div class="field">
        <label>應繳金額（可改為自由奉獻金額・現場請按當日匯率付日幣現金）</label>
        <div class="amount-row">
          <span>NT$</span>
          <input type="number" name="amount" value="${ev.price}" min="0">
        </div>
      </div>
      <div class="field">
        <label>付款方式</label>
        <div class="pay-options" id="pay-options-register"></div>
      </div>
      <button type="submit" class="btn clay full">確認報名</button>
    </form>
  `;
  renderPayOptions('pay-options-register');
  overlay.classList.add('active');

  document.getElementById('register-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const submitBtn = e.target.querySelector('button[type=submit]');
    submitBtn.disabled = true; submitBtn.textContent = '送出中…';

    const { error } = await db.from('event_registrations').insert({
      event_type: type,
      event_id: eventId,
      event_title: ev.title,
      event_date: ev.label,
      name: fd.get('name'),
      contact: fd.get('contact'),
      amount: fd.get('amount'),
      pay_method: '現場現金'
    });

    if (error) {
      console.error(error);
      submitBtn.disabled = false; submitBtn.textContent = '確認報名';
      showToast('送出時發生問題，請直接加官方LINE與我們聯繫，謝謝！');
      return;
    }

    countCache[type][eventId] = await getCount(type, eventId);

    submitToFormspree({
      formType: type==='ws' ? '工作坊報名' : '講座報名',
      eventTitle: ev.title, eventDate: ev.label,
      name: fd.get('name'), contact: fd.get('contact'),
      amount: fd.get('amount'), payMethod: '現場現金'
    });

    closeModal();
    renderWorkshopsPanel();
    renderSpeechesPanel();
    showToast('報名成功，已記錄您的資料');
  });
}

/* 渲染單一欄位（依 type 決定 input / textarea / select / 否是+補充說明） */
function renderIntakeField(f){
  if(f.section){
    return `<p class="intake-subhead">${f.section}</p>`;
  }
  const name = 'intake_' + f.id;
  if(f.type === 'text'){
    return `<div class="field"><label>${f.label}</label><input type="text" name="${name}"></div>`;
  }
  if(f.type === 'textarea'){
    return `<div class="field"><label>${f.label}</label><textarea name="${name}"></textarea></div>`;
  }
  if(f.type === 'select'){
    const opts = f.options.map(o=>`<option value="${o}">${o}</option>`).join('');
    return `<div class="field"><label>${f.label}</label><select name="${name}"><option value="">請選擇</option>${opts}</select></div>`;
  }
  if(f.type === 'yesno'){
    return `
      <div class="field">
        <label>${f.label}</label>
        <select name="${name}_yn"><option value="">請選擇</option><option value="否">否</option><option value="是">是</option></select>
        <textarea name="${name}_detail" placeholder="${f.placeholder || '若選「是」，請簡述時間、地點及過程'}" style="margin-top:8px;"></textarea>
      </div>
    `;
  }
  return '';
}

/* 渲染整個資料表區塊，依目前選擇的 fillerType 切換內容 */
function renderIntakeFormSection(fillerType){
  const form = INTAKE_FORMS[fillerType] || INTAKE_FORMS.self;
  const fieldsHtml = form.fields.map(renderIntakeField).join('');
  return `
    <div class="intake-form-section">
      <p class="intake-title">${form.title}</p>
      <p class="intake-hint">以下資料能幫助雪媚老師更了解狀況，會談會更有效率。請盡量完整填寫，會跟著預約一起送出，不需要另外寄送。</p>
      ${fieldsHtml}
      <div class="intake-followup-note">
        💡 如果方便，也歡迎在會談前另外透過 LINE 補充「生命事件圖」與「家族圖」（手繪拍照即可），能讓會談更聚焦。雪媚老師會在預約確認後說明怎麼補充。
      </div>
    </div>
  `;
}

/* 把表單裡所有 intake_ 開頭的欄位收集成一個物件，方便一起送出 */
function collectIntakeData(formData){
  const result = {};
  for(const [key, value] of formData.entries()){
    if(key.startsWith('intake_')) result[key] = value;
  }
  return result;
}

/* ===================== LINE Login（PKCE，前端可獨立完成，不需要 Channel Secret） ===================== */

/* 產生隨機字串，用於 state（防止 CSRF）與 code_verifier（PKCE） */
function lineLoginRandomString(length){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  let out = '';
  for(let i=0;i<length;i++) out += chars[arr[i] % chars.length];
  return out;
}

/* 將 code_verifier 做 SHA-256 雜湊後轉成 base64url，作為 code_challenge */
async function lineLoginCodeChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const bytes = new Uint8Array(digest);
  let str = '';
  for(const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

/* 點擊「用 LINE 登入」按鈕，導去 LINE 的授權頁面 */
async function startLineLogin(){
  const state = lineLoginRandomString(32);
  const codeVerifier = lineLoginRandomString(64);
  const codeChallenge = await lineLoginCodeChallenge(codeVerifier);

  sessionStorage.setItem('line_login_state', state);
  sessionStorage.setItem('line_login_code_verifier', codeVerifier);

  const params = new URLSearchParams({
    response_type: 'code',
    client_id: LINE_LOGIN_CLIENT_ID,
    redirect_uri: LINE_LOGIN_REDIRECT_URI,
    state: state,
    scope: 'profile openid',
    code_challenge: codeChallenge,
    code_challenge_method: 'S256'
  });

  window.location.href = 'https://access.line.me/oauth2/v2.1/authorize?' + params.toString();
}

/* 頁面載入時檢查網址上有沒有 LINE 登入導回來的 code，若有就用 PKCE 跟 LINE 換取身分 */
async function handleLineLoginCallback(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const returnedState = params.get('state');
  if(!code) return;

  const savedState = sessionStorage.getItem('line_login_state');
  const codeVerifier = sessionStorage.getItem('line_login_code_verifier');
  lineLoginCleanUrl();

  if(!savedState || returnedState !== savedState || !codeVerifier){
    showToast('LINE 登入驗證失敗，請重新登入一次');
    return;
  }

  try{
    const tokenRes = await fetch('https://api.line.me/oauth2/v2.1/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: LINE_LOGIN_REDIRECT_URI,
        client_id: LINE_LOGIN_CLIENT_ID,
        code_verifier: codeVerifier
      })
    });
    const tokenData = await tokenRes.json();
    if(!tokenData.access_token) throw new Error('未取得 access_token');

    const profileRes = await fetch('https://api.line.me/v2/profile', {
      headers: {'Authorization': 'Bearer ' + tokenData.access_token}
    });
    const profile = await profileRes.json();
    if(!profile.userId) throw new Error('未取得使用者資料');

    sessionStorage.setItem('line_user_id', profile.userId);
    sessionStorage.setItem('line_display_name', profile.displayName || '');
    sessionStorage.setItem('line_picture_url', profile.pictureUrl || '');
    showToast('LINE 登入成功！');
  }catch(err){
    showToast('LINE 登入時發生錯誤，請再試一次');
  }finally{
    sessionStorage.removeItem('line_login_state');
    sessionStorage.removeItem('line_login_code_verifier');
  }
}

/* 把網址上的 ?code=...&state=... 清掉，避免重新整理時重複處理 */
function lineLoginCleanUrl(){
  const url = new URL(window.location.href);
  url.searchParams.delete('code');
  url.searchParams.delete('state');
  window.history.replaceState({}, document.title, url.pathname);
}

/* 簡單的 HTML escape，避免顯示名稱含特殊字元時造成顯示問題 */
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* 渲染目前的 LINE 登入狀態（已登入 / 尚未登入兩種畫面） */
function renderLineLoginStatus(){
  const container = document.getElementById('lineLoginStatus');
  const userId = sessionStorage.getItem('line_user_id');
  const displayName = sessionStorage.getItem('line_display_name');
  const pictureUrl = sessionStorage.getItem('line_picture_url');

  if(userId){
    container.innerHTML = `
      <div class="line-login-status">
        ${pictureUrl ? `<img class="avatar" src="${escapeHtml(pictureUrl)}" alt="">` : '✅'}
        <span>已用 LINE 登入：${escapeHtml(displayName || '')}（會自動收到報名通知）</span>
      </div>
    `;
  } else {
    container.innerHTML = `
      <button class="btn line" onclick="startLineLogin()">💬 用 LINE 登入（加好友・接收報名通知）</button>
    `;
  }
}
