<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心路新路全齡身心健康幸福導航站預約系統</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fcfcfc; padding: 15px; color: #333; margin: 0; }
        h1 { text-align: center; color: #4a6741; font-size: 1.5rem; margin-bottom: 20px; }
        .grid-wrapper { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 20px; }
        .day-column { min-width: 100px; text-align: center; }
        .date-header { font-weight: bold; margin-bottom: 10px; color: #555; border-bottom: 2px solid #a3cfbb; padding-bottom: 5px; }
        .time-btn { display: block; width: 100%; padding: 12px 5px; margin: 6px 0; background: #d1e7dd; border: 1px solid #a3cfbb; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .time-btn:hover { background: #a3cfbb; }
    </style>
</head>
<body>
    <h1>請選擇您的預約時段</h1>
    <div class="grid-wrapper" id="calendar"></div>

    <script>
        const calendar = document.getElementById('calendar');
        // 產生未來 7 天
        for (let i = 0; i < 7; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            let dateStr = `${d.getMonth()+1}/${d.getDate()}`;
            
            let col = document.createElement('div');
            col.className = 'day-column';
            col.innerHTML = `<div class="date-header">${dateStr}</div>`;
            
            // 產生 10:00 - 20:00 時段
            for (let h = 10; h < 20; h++) {
                let btn = document.createElement('button');
                btn.className = 'time-btn';
                btn.innerText = `${h}:00`;
                btn.onclick = () => {
                    // 請將下方連結換成您實際的 Google 表單連結
                    const formUrl = "https://docs.google.com/forms/d/e/您的表單ID/viewform";
                    window.location.href = formUrl;
                };
                col.appendChild(btn);
            }
            calendar.appendChild(col);
        }
    </script>
</body>
</html>
