<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心路新路預約系統</title>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; padding: 15px; color: #333; }
        .line-notice { background: #4a6741; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; }
        .grid-wrapper { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 20px; }
        .day-column { min-width: 90px; text-align: center; }
        .date-header { font-weight: bold; margin-bottom: 10px; color: #555; border-bottom: 2px solid #a3cfbb; }
        .time-btn { display: block; width: 100%; padding: 10px; margin: 5px 0; background: #d1e7dd; border: 1px solid #a3cfbb; border-radius: 6px; cursor: pointer; }
        .time-btn.selected { background: #4a6741; color: white; border: 1px solid #2d4128; }
        .confirm-btn { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px; background: #4a6741; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="line-notice">⚠️ 預約提醒：送出後，請務必點選確認頁面的連結加入「心路新路官方 LINE」並傳送訊息！</div>
    <h1>請選擇時段 (可選多個)</h1>
    <div class="grid-wrapper" id="calendar"></div>
    <button class="confirm-btn" onclick="submitBooking()">選好了，前往填寫資料</button>

    <script>
        let selectedSlots = [];
        const calendar = document.getElementById('calendar');

        for (let i = 0; i < 7; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            let dateStr = `${d.getMonth()+1}/${d.getDate()}`;
            let col = document.createElement('div');
            col.className = 'day-column';
            col.innerHTML = `<div class="date-header">${dateStr}</div>`;
            for (let h = 9; h <= 22; h++) {
                let slot = `${dateStr} ${h}:00`;
                let btn = document.createElement('button');
                btn.className = 'time-btn';
                btn.innerText = `${h}:00`;
                btn.onclick = function() {
                    if (selectedSlots.includes(slot)) {
                        selectedSlots = selectedSlots.filter(s => s !== slot);
                        this.classList.remove('selected');
                    } else {
                        selectedSlots.push(slot);
                        this.classList.add('selected');
                    }
                };
                col.appendChild(btn);
            }
            calendar.appendChild(col);
        }

        function submitBooking() {
            if (selectedSlots.length === 0) return alert('請先選擇時段！');
            const slotsText = encodeURIComponent(selectedSlots.join(', '));
            // 更新後的正確連結
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdWorTpnu1lT2S4JipDNRfRszZVSQvQxHyD8oddoq5poPZwiQ/viewform?usp=pp_url";
            // 欄位代碼 652157597 維持不變
            window.location.href = `${formUrl}&entry.652157597=${slotsText}`;
        }
    </script>
</body>
</html>
