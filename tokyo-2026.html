<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 東京行程</title>
    <style>
        /* 溫馨柔和底色，增加質感 */
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: #fdfbf7; 
            padding: 20px; 
            color: #5a554a; 
            line-height: 1.6;
        }
        
        /* 緊湊的資訊框，取代原本鬆散的排版 */
        .info-box { 
            background: rgba(255, 255, 255, 0.6); 
            padding: 20px; 
            border-radius: 15px; 
            border-left: 6px solid #d4a373; /* 溫馨大地色飾條 */
            margin: 15px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 按鈕美化 */
        .btn-reserve { 
            display: block; 
            width: 80%; 
            max-width: 300px; 
            margin: 20px auto; 
            padding: 14px; 
            background: #6b8e60; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(107, 142, 96, 0.2);
        }
        
        /* 報名按鈕樣式 */
        .btn-register { 
            background: #d4a373; 
            box-shadow: 0 4px 6px rgba(212, 163, 115, 0.2);
        }
    </style>
</head>
<body>

    <!-- 原有的預約按鈕 -->
    <a href="payment.html" class="btn-reserve">📅 點此預約行程</a>

    <!-- 新增的報名按鈕 -->
    <a href="https://forms.gle/VBFcwoxNCousAezG7" target="_blank" class="btn-reserve btn-register">✍ 我要報名課程</a>

    <div class="info-box">
        <p style="margin: 0;"><strong>📍 課程地點：</strong><br>
        東京都台東區松谷 2-23-4 601</p>
        <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">
        2-chōme-23-4 Matsuyama, Taito City, Tokyo 111-0036
        </p>
    </div>

</body>
</html>
