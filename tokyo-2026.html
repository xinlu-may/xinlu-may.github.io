<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪媚老師東京課程・行程與報名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF8F5;
    --paper-deep:#FBEEEA;
    --ink:#3A3530;
    --ink-soft:#7A7068;
    --navy:#3A4A5C;
    --navy-deep:#2C3A48;
    --clay:#E8956B;
    --clay-deep:#C96F45;
    --sage:#8FC4A8;
    --sage-deep:#5A9B78;
    --sakura:#F4A8B8;
    --sakura-deep:#D97A8E;
    --sky:#7FB8D9;
    --sky-deep:#4F94BC;
    --line:#DDD3C0;
    --white:#FFFFFF;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 2px 10px rgba(44,62,80,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    color:var(--navy);
    margin:0;
  }
  a{color:var(--clay-deep);}
  button{font-family:inherit;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}

  /* ===== Hero / Stamp signature ===== */
  .hero{
    background: linear-gradient(165deg, #FDEEF1 0%, #FBE4E9 35%, #E8F2F7 75%, #DCEDF5 100%);
    color:var(--ink);
    padding:64px 20px 56px;
    position:relative;
    overflow:hidden;
  }
  .hero .wrap{display:flex;align-items:center;gap:40px;flex-wrap:wrap;position:relative;z-index:2;}
  .hero-text{flex:1;min-width:280px;}
  .hero-eyebrow{
    font-size:13px;letter-spacing:.12em;color:var(--sakura-deep);
    text-transform:uppercase;margin-bottom:10px;font-weight:500;
  }
  .hero h1{
    color:var(--navy);font-size:clamp(28px,4vw,42px);line-height:1.3;margin-bottom:14px;
  }
  .hero p.lead{color:var(--ink-soft);font-size:16px;max-width:480px;margin:0;}
  .hero-deco{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
  .hero-dates{
    display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;
  }
  .hero-date-chip{
    border:1px solid var(--sakura);border-radius:30px;background:rgba(255,255,255,0.6);
    padding:6px 16px;font-size:13px;color:var(--navy);
  }
  .stamp{
    flex-shrink:0;width:148px;height:148px;border-radius:50%;
    border:3px solid var(--clay);
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-9deg);
    position:relative;
  }
  .stamp::before{
    content:'';position:absolute;inset:10px;border:1px dashed rgba(201,123,99,0.6);border-radius:50%;
  }
  .stamp-inner{text-align:center;color:var(--clay);}
  .stamp-inner .top{font-size:11px;letter-spacing:.15em;display:block;margin-bottom:4px;}
  .stamp-inner .city{font-family:'Noto Serif TC',serif;font-weight:700;font-size:24px;display:block;}
  .stamp-inner .yr{font-size:12px;letter-spacing:.1em;display:block;margin-top:4px;}

  /* ===== Nav ===== */
  .tabbar{
    background:var(--white);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:50;
  }
  .tabbar .wrap{display:flex;gap:4px;overflow-x:auto;}
  .tab-btn{
    background:none;border:none;padding:16px 18px;font-size:15px;color:var(--ink-soft);
    cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-weight:500;
  }
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--clay);}
  .tab-btn:hover{color:var(--navy);}

  section.panel{display:none;padding:44px 0 64px;}
  section.panel.active{display:block;}

  .section-head{margin-bottom:28px;}
  .section-head .eyebrow{color:var(--clay-deep);font-size:13px;font-weight:700;letter-spacing:.06em;margin-bottom:6px;}
  .section-head h2{font-size:26px;}
  .section-head p{color:var(--ink-soft);margin-top:8px;max-width:600px;}

  /* ===== Calendar ===== */
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px;font-size:13px;color:var(--ink-soft);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .dot.open{background:var(--sage);}
  .dot.booked{background:var(--clay);}
  .dot.locked{background:#C8BFA8;}

  .cal-day{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    margin-bottom:14px;overflow:hidden;
  }
  .cal-day-head{
    display:flex;align-items:baseline;gap:10px;padding:14px 18px;
    background:var(--paper-deep);border-bottom:1px solid var(--line);
  }
  .cal-day-head .d-label{font-family:'Noto Serif TC',serif;font-weight:700;font-size:19px;color:var(--navy);}
  .cal-day-head .d-week{font-size:13px;color:var(--ink-soft);}
  .cal-day-head .d-tag{
    margin-left:auto;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
  }
  .cal-day-head .d-tag.family{background:#FBE9CC;color:#8A5A1A;}
  .cal-day-head .d-tag.event{background:#E6E0EF;color:#473A6B;}
  .cal-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px;padding:16px 18px;
  }
  .slot{
    border-radius:var(--radius-sm);padding:9px 6px;text-align:center;font-size:12.5px;
    border:1px solid var(--line);cursor:default;line-height:1.4;
  }
  .slot .t{font-weight:700;display:block;}
  .slot .s{display:block;color:var(--ink-soft);font-size:11px;margin-top:2px;}
  .slot.open{background:var(--sage); border-color:var(--sage-deep); cursor:pointer;}
  .slot.open .t{color:#FFFFFF;}
  .slot.open .s{color:rgba(255,255,255,0.92);}
  .slot.open:hover{background:var(--sage-deep);}
  .slot.booked{background:#F6E6DF;border-color:var(--clay);}
  .slot.booked .t{color:var(--clay-deep);}
  .slot.locked{background:#F7F4EE;color:#C7BFAE;border-color:#EDE7DA;}
  .slot.locked .s{color:#C7BFAE;}

  /* ===== Cards ===== */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;}
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;
  }
  .card .badge{
    display:inline-block;font-size:12px;font-weight:700;color:var(--sage-deep);
    background:#E9EFE5;padding:3px 10px;border-radius:20px;margin-bottom:10px;width:fit-content;
  }
  .card h3{font-size:18px;margin-bottom:6px;}
  .card .meta{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px;}
  .card .meta b{color:var(--ink);}
  .card .price{font-family:'Noto Serif TC',serif;font-size:22px;color:var(--clay-deep);font-weight:700;margin-bottom:4px;}
  .card .price-note{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
  .card .count{font-size:12.5px;color:var(--sage-deep);margin-bottom:14px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--sakura-deep);color:#fff;border:none;border-radius:30px;
    padding:11px 22px;font-size:14.5px;font-weight:500;cursor:pointer;text-align:center;
    transition:background .15s;
  }
  .btn:hover{background:#C25E73;}
  .btn.secondary{background:none;color:var(--navy);border:1px solid var(--navy);}
  .btn.secondary:hover{background:var(--paper-deep);}
  .btn.full{width:100%;margin-top:auto;}
  .btn.clay{background:var(--clay);}
  .btn.clay:hover{background:var(--clay-deep);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* ===== Forms / Modal ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(44,40,32,0.55);
    display:none;align-items:flex-start;justify-content:center;z-index:200;
    padding:40px 16px;overflow-y:auto;
  }
  .modal-overlay.active{display:flex;}
  .modal{
    background:var(--paper);border-radius:18px;max-width:520px;width:100%;
    padding:32px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-close{
    position:absolute;top:18px;right:18px;background:none;border:none;font-size:20px;
    color:var(--ink-soft);cursor:pointer;line-height:1;
  }
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13.5px;font-weight:500;margin-bottom:6px;color:var(--ink);}
  .field input[type=text],.field input[type=tel],.field input[type=email],.field input[type=number],.field select,.field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);
    font-size:14.5px;font-family:inherit;background:var(--white);color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:70px;}
  .radio-row{display:flex;gap:14px;flex-wrap:wrap;}
  .radio-row label{display:flex;align-items:center;gap:6px;font-weight:400;font-size:14px;}
  .pay-options{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .pay-option{
    border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;
    display:flex;align-items:flex-start;gap:10px;cursor:pointer;
  }
  .pay-option.selected{border-color:var(--clay);background:#FBF0EA;}
  .pay-option input{margin-top:3px;}
  .pay-option .lab{font-weight:500;font-size:14.5px;}
  .pay-option .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .qr-box{
    margin-top:10px;text-align:center;background:var(--white);border:1px dashed var(--line);
    border-radius:var(--radius-sm);padding:18px;
  }
  .qr-box img{width:160px;height:160px;object-fit:contain;}
  .qr-placeholder{
    width:160px;height:160px;margin:0 auto;background:var(--paper-deep);border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:12px;
  }
  .amount-row{display:flex;align-items:center;gap:10px;margin:14px 0;}
  .amount-row input[type=number]{width:120px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:var(--paper);padding:13px 24px;border-radius:30px;
    font-size:14.5px;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:300;display:none;
  }
  .toast.show{display:block;}

  /* ===== Footer / location ===== */
  .loc-card{
    background:var(--navy);color:var(--paper);border-radius:var(--radius);padding:28px;
    display:flex;gap:20px;flex-wrap:wrap;align-items:center;
  }
  .loc-pin{
    flex-shrink:0;width:52px;height:52px;border-radius:50%;background:var(--clay);
    display:flex;align-items:center;justify-content:center;font-size:24px;
  }
  .loc-card .addr-en{color:#D8CFC0;font-size:14px;margin-top:4px;}
  .loc-card .addr-zh{font-size:17px;font-weight:500;margin-top:2px;}

  .line-cta{
    background:#EAF6E9;border:1px solid #BFE2BC;border-radius:var(--radius);
    padding:22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:26px;
  }
  .line-cta .txt h3{font-size:16px;margin-bottom:4px;}
  .line-cta .txt p{font-size:13.5px;color:var(--ink-soft);margin:0;}

  footer{text-align:center;padding:30px 20px;color:var(--ink-soft);font-size:13px;}

  @media (max-width:640px){
    .hero .wrap{flex-direction:column;text-align:center;}
    .hero p.lead{margin:0 auto;}
  }
</style>
</head>
<body>

    <svg viewBox="0 0 1000 320" preserveAspectRatio="none" style="width:100%; height:100%; position:absolute; top:0; left:0;">

      <p class="lead" id="hero-lead">在東京。歡迎預約工作坊、講座，或單獨約時間見面聊聊。</p>

    <button class="tab-btn active" data-panel="calendar">行程總覽</button>

<script>
/* ===================== 資料設定 ===================== */

const TRIP_START = '2026-07-05';
const TRIP_END = '2026-07-19';
const WEEKDAY_NAMES = ['日','一','二','三','四','五','六'];

const WORKSHOPS = [
  {id:'ws1', date:'2026-07-09', label:'7/9（四）', title:'「尋見真我」濃縮課程・週間班', start:'09:00', end:'16:00', price:3000},
  {id:'ws2', date:'2026-07-11', label:'7/11（六）', title:'「尋見真我」濃縮課程・週末班', start:'09:00', end:'16:00', price:3000},
  {id:'ws3', date:'2026-07-16', label:'7/16（四）', title:'親子手機爭奪戰：雙贏，找到新路', start:'09:00', end:'16:00', price:3000},
  {id:'ws4', date:'2026-07-18', label:'7/18（六）', title:'親子手機工作坊', start:'09:00', end:'16:00', price:3000},
];

const SPEECHES = [
  {id:'sp1', date:'2026-07-10', label:'7/10（五）', title:'建立自己的健康幸福導航系統', start:'19:00', end:'21:00', price:250},
  {id:'sp2', date:'2026-07-13', label:'7/13（一）', title:'定化不黑化', start:'19:00', end:'21:00', price:250},
  {id:'sp3', date:'2026-07-14', label:'7/14（二）', title:'在親子手機大戰中創造雙贏', start:'19:00', end:'21:00', price:250},
];

const VISIT_PRICE_PER_HOUR = 1500;
const LINE_GROUP_NAME = '雪媚老師七月東京行程課程群組';
const LINE_GROUP_URL = '#'; // 待補：實際 LINE 群組/OpenChat 邀請連結
const FORMSPREE_ACTION = 'https://formspree.io/f/mlgybebe'; // Formspree 表單網址（已設定）
const FORMSPREE_DASHBOARD = 'https://formspree.io/forms'; // Formspree 後台列表頁（登入後可直接看到所有提交紀錄）
const NOTIFY_EMAIL = 'prestonahmei@gmail.com';

const LOCATION = {
  zhFull: '東京都台東区松谷2-23-4　601',
  enFull: '2-chōme-23-4 Matsugaya, Taito City, Tokyo 111-0036',
};

/* 產生 7/5–7/20 的每日資料 */
function buildDays(){
  const days = [];
  let d = new Date(TRIP_START+'T00:00:00');
  const end = new Date(TRIP_END+'T00:00:00');
  while(d <= end){
    const iso = d.toISOString().slice(0,10);
    days.push({
      date: iso,
      label: `${d.getMonth()+1}/${d.getDate()}`,
      weekday: WEEKDAY_NAMES[d.getDay()],
      isSunday: d.getDay()===0,
    });
    d.setDate(d.getDate()+1);
  }
  return days;
}
const DAYS = buildDays();

/* 每日時段（10:00–20:00，整點，1小時一格） */
function hourSlotsForDay(){
  const slots = [];
  for(let h=10; h<20; h++){
    slots.push({start:h, end:h+1});
  }
  return slots;
}

/* 判斷某天某時段的狀態：
   family  -> 7/5-7/8 親子優先（仍可預約拜訪/吃飯/出遊）
   locked  -> 工作坊／演講／週日／午餐／晚餐，不可預約
   open    -> 可預約一對一拜訪
   booked  -> 已被預約（之後從 storage 動態覆蓋）
*/
function getSlotInfo(date, hour){
  const d = new Date(date+'T00:00:00');
  const isSunday = d.getDay()===0;
  const isFamilyPhase = date < '2026-07-09';

  // 親子優先期間（7/5-7/8）：全天每個時段都開放預約，文字提示歡迎推薦景點或邀約出遊
  if(isFamilyPhase){
    return {status:'open', label:'旅遊行程', sub:'歡迎推薦景點或帶我們去玩喔'};
  }

  // 週日整天鎖定
  if(isSunday){
    return {status:'locked', label:'週日休息', sub:'不開放'};
  }

  // 午餐 12-14, 晚餐 16-18 一律鎖定
  if(hour>=12 && hour<14){
    return {status:'locked', label:'午餐時間', sub:'不開放'};
  }
  if(hour>=16 && hour<18){
    return {status:'locked', label:'晚餐時間', sub:'不開放'};
  }

  // 工作坊／演講鎖定時段
  const ws = WORKSHOPS.find(w=>w.date===date && hour>=9 && hour<16);
  if(ws){ return {status:'locked', label:'工作坊', sub:ws.title}; }
  const sp = SPEECHES.find(s=>s.date===date && hour>=19 && hour<21);
  if(sp){ return {status:'locked', label:'講座', sub:sp.title}; }

  return {status:'open', label:'可預約', sub:'一對一拜訪'};
}

/* ===================== 共用即時狀態（window.storage，所有人共享，不含姓名電話） ===================== */
/* 公開資料：時段是否已被預約（true/false）、各場次報名人數。
   私密資料（姓名、電話、聯絡方式）只會送到 Formspree 到老師信箱，不會存在這裡。 */

function visitKey(date,hour){ return 'slot:'+date+'_'+hour; }
function countKey(type,id){ return 'count:'+type+'_'+id; }

async function getSlotBooked(date,hour){
  try{
    const r = await window.storage.get(visitKey(date,hour), true);
    return r ? r.value === 'true' : false;
  }catch(e){ return false; }
}
async function setSlotBooked(date,hour){
  try{ await window.storage.set(visitKey(date,hour), 'true', true); }catch(e){}
}
async function getCount(type,id){
  try{
    const r = await window.storage.get(countKey(type,id), true);
    return r ? parseInt(r.value,10) || 0 : 0;
  }catch(e){ return 0; }
}
async function incrementCount(type,id){
  const current = await getCount(type,id);
  const next = current + 1;
  try{ await window.storage.set(countKey(type,id), String(next), true); }catch(e){}
  return next;
}

/* 本地快取，渲染時先用快取畫面，再用最新資料覆蓋，避免畫面一直空白等待 */
let bookedCache = {};
let countCache = {ws:{}, sp:{}};

async function refreshAllSharedData(){
  for(const day of DAYS){
    for(const slot of hourSlotsForDay()){
      const info = getSlotInfo(day.date, slot.start);
      if(info.status==='open'){
        bookedCache[visitKey(day.date, slot.start)] = await getSlotBooked(day.date, slot.start);
      }
    }
  }
  for(const w of WORKSHOPS){ countCache.ws[w.id] = await getCount('ws', w.id); }
  for(const s of SPEECHES){ countCache.sp[s.id] = await getCount('sp', s.id); }
}

/* ===================== Toast ===================== */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ===================== 渲染：行程總覽 ===================== */
function renderCalendarPanel(){
  let html = `
  <div class="section-head">
    <div class="eyebrow">行程總覽</div>
    <h2 id="cal-range-title"></h2>
    <p>灰色是已經安排好的工作坊、講座或休息時間，不開放預約；綠色是還空著、可以預約一對一拜訪的時段（7/5－7/8 旅遊行程期間也歡迎邀約見面、推薦景點或帶我們去玩）。點一下空格就能預約。</p>
  </div>
  <div class="legend">
    <span><i class="dot locked"></i>已安排（工作坊／講座／休息）</span>
    <span><i class="dot open"></i>可預約</span>
    <span><i class="dot booked"></i>已被預約</span>
  </div>`;

  DAYS.forEach(day=>{
    const isFamilyPhase = day.date < '2026-07-09';
    let tag = '';
    if(isFamilyPhase) tag = '<span class="d-tag family">旅遊行程</span>';
    else {
      const hasEvent = WORKSHOPS.some(w=>w.date===day.date) || SPEECHES.some(s=>s.date===day.date);
      if(hasEvent) tag = '<span class="d-tag event">當日有課程</span>';
    }

    html += `<div class="cal-day">
      <div class="cal-day-head">
        <span class="d-label">${day.label}</span>
        <span class="d-week">星期${day.weekday}</span>
        ${tag}
      </div>
      <div class="cal-grid">`;

    hourSlotsForDay().forEach(slot=>{
      const info = getSlotInfo(day.date, slot.start);
      const key = visitKey(day.date, slot.start);
      const isBooked = info.status==='open' && !!bookedCache[key];
      let cls = info.status;
      let label = info.label, sub = info.sub;
      if(isBooked){
        cls = 'booked'; label='已預約'; sub = '時段已滿';
      }
      const timeStr = `${String(slot.start).padStart(2,'0')}:00`;
      const clickable = (info.status==='open' && !isBooked);
      html += `<div class="slot ${cls}" ${clickable?`onclick="openVisitModal('${day.date}', ${slot.start})"`:''}>
        <span class="t">${timeStr}</span>
        <span class="s">${label}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('panel-calendar').innerHTML = html;
}

/* ===================== 共用：付款方式選項（LINE Pay／現場現金） ===================== */
function renderPayOptions(containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = `
    <label class="pay-option" data-val="linepay">
      <input type="radio" name="payMethod" value="linepay">
      <div>
        <div class="lab">LINE Pay（線上）</div>
        <div class="sub">用手機掃描 QR Code 轉帳</div>
        <div class="qr-area" style="display:none;">
          <div class="qr-box">
            <div class="qr-placeholder">LINE Pay<br>收款 QR Code<br>（待補）</div>
          </div>
        </div>
      </div>
    </label>
    <label class="pay-option" data-val="cash">
      <input type="radio" name="payMethod" value="cash">
      <div>
        <div class="lab">現場現金</div>
        <div class="sub">見面當天直接支付，請按當日匯率付日幣現金</div>
      </div>
    </label>
  `;
  container.querySelectorAll('.pay-option').forEach(opt=>{
    const input = opt.querySelector('input');
    const qrArea = opt.querySelector('.qr-area');
    opt.addEventListener('click', ()=>{
      container.querySelectorAll('.pay-option').forEach(o=>{
        o.classList.remove('selected');
        const qa = o.querySelector('.qr-area');
        if(qa) qa.style.display='none';
      });
      opt.classList.add('selected');
      input.checked = true;
      if(qrArea) qrArea.style.display='block';
    });
  });
}

/* ===================== Modal：工作坊／講座報名 ===================== */
function openRegisterModal(type, eventId){
  const list = type==='ws' ? WORKSHOPS : SPEECHES;
  const ev = list.find(e=>e.id===eventId);
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 style="font-size:20px;margin-bottom:4px;">${ev.title}</h2>
    <p style="color:var(--ink-soft);font-size:13.5px;margin-bottom:20px;">${ev.label}　${ev.start}－${ev.end}</p>
    <form id="register-form">
      <div class="field">
        <label>姓名</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>聯絡方式（電話或 LINE ID）</label>
        <input type="text" name="contact" required>
      </div>
      <div class="field">
        <label>應繳金額（可改為自由奉獻金額・現場請按當日匯率付日幣現金）</label>
        <div class="amount-row">
          <span>NT$</span>
          <input type="number" name="amount" value="${ev.price}" min="0">
        </div>
      </div>
      <div class="field">
        <label>付款方式</label>
        <div class="pay-options" id="pay-options-register"></div>
      </div>
      <button type="submit" class="btn clay full">確認報名</button>
    </form>
  `;
  renderPayOptions('pay-options-register');
  overlay.classList.add('active');

  document.getElementById('register-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payMethod = fd.get('payMethod');
    if(!payMethod){ showToast('請選擇一種付款方式'); return; }
    const submitBtn = e.target.querySelector('button[type=submit]');
    submitBtn.disabled = true; submitBtn.textContent = '送出中…';

    const newCount = await incrementCount(type, eventId);
    countCache[type][eventId] = newCount;

    const privateData = {
      formType: type==='ws' ? '工作坊報名' : '講座報名',
      eventTitle: ev.title, eventDate: ev.label,
      name: fd.get('name'), contact: fd.get('contact'),
      amount: fd.get('amount'), payMethod
    };
    await submitToFormspree(privateData);

    closeModal();
    renderWorkshopsPanel();
    renderSpeechesPanel();
    showToast('報名成功，已記錄您的資料');
  });
}

/* ===================== Modal：一對一拜訪預約 ===================== */
function openVisitModal(date, hour){
  const overlay = document.getElementById('modal-overlay');
  const timeStr = `${String(hour).padStart(2,'0')}:00－${String(hour+1).padStart(2,'0')}:00`;
  const dayInfo = DAYS.find(d=>d.date===date);
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 style="font-size:20px;margin-bottom:4px;">預約一對一拜訪</h2>
    <p style="color:var(--ink-soft);font-size:13.5px;margin-bottom:20px;">${dayInfo.label}（星期${dayInfo.weekday}）　${timeStr}</p>
    <form id="visit-form">
      <div class="field">
        <label>這次預約是為了誰填寫？</label>
        <div class="radio-row">
          <label><input type="radio" name="fillerType" value="self" checked> 本人填寫</label>
          <label><input type="radio" name="fillerType" value="parent"> 父母填寫（未成年子女）</label>
          <label><input type="radio" name="fillerType" value="child"> 兒女填寫（長輩）</label>
        </div>
      </div>
      <div class="field">
        <label>填表人姓名</label>
        <input type="text" name="fillerName" required>
      </div>
      <div class="field">
        <label>受訪／預約對象姓名</label>
        <input type="text" name="subjectName" required>
      </div>
      <div class="field">
        <label>聯絡方式（電話或 LINE ID）</label>
        <input type="text" name="contact" required>
      </div>
      <div class="field">
        <label>想聊的主題或備註（選填）</label>
        <textarea name="note"></textarea>
      </div>
      <div class="field">
        <label>應繳金額（每小時 NT$ ${VISIT_PRICE_PER_HOUR.toLocaleString()}，可改為自由奉獻金額・現場請按當日匯率付日幣現金）</label>
        <div class="amount-row">
          <span>NT$</span>
          <input type="number" name="amount" value="${VISIT_PRICE_PER_HOUR}" min="0">
        </div>
      </div>
      <div class="field">
        <label>付款方式</label>
        <div class="pay-options" id="pay-options-visit"></div>
      </div>
      <button type="submit" class="btn clay full">送出預約</button>
    </form>
  `;
  renderPayOptions('pay-options-visit');
  overlay.classList.add('active');

  document.getElementById('visit-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payMethod = fd.get('payMethod');
    if(!payMethod){ showToast('請選擇一種付款方式'); return; }
    const submitBtn = e.target.querySelector('button[type=submit]');
    submitBtn.disabled = true; submitBtn.textContent = '送出中…';

    const key = visitKey(date, hour);
    const alreadyBooked = await getSlotBooked(date, hour);
    if(alreadyBooked){
      showToast('抱歉，這個時段剛剛被別人預約走了，請選別的時段');
      closeModal();
      await refreshAllSharedData();
      renderCalendarPanel();
      return;
    }
    await setSlotBooked(date, hour);
    bookedCache[key] = true;

    const privateData = {
      formType: '一對一拜訪預約',
      visitDate: dayInfo.label, visitTime: timeStr,
      fillerType: fd.get('fillerType'), fillerName: fd.get('fillerName'),
      subjectName: fd.get('subjectName'), contact: fd.get('contact'),
      note: fd.get('note'), amount: fd.get('amount'), payMethod
    };
    await submitToFormspree(privateData);

    closeModal();
    renderCalendarPanel();
    showToast('預約成功！資料已送出通知');
  });
}

/* 送出私密資料到 Formspree（待補實際表單網址後即可生效，不會存進共用儲存） */
function submitToFormspree(data){
  if(FORMSPREE_ACTION.includes('YOUR_FORM_ID')) return Promise.resolve();
  return fetch(FORMSPREE_ACTION, {
    method:'POST',
    headers:{'Accept':'application/json','Content-Type':'application/json'},
    body: JSON.stringify({...data, _to: NOTIFY_EMAIL})
  }).catch(()=>{});
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('active');
}
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target.id==='modal-overlay') closeModal();
});

/* ===================== 動態日期文字 ===================== */
function formatDateZh(iso){
  const d = new Date(iso+'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function renderDateHeadings(){
  const startZh = formatDateZh(TRIP_START);
  const endZh = formatDateZh(TRIP_END);
  document.getElementById('hero-lead').textContent = `${startZh}到${endZh}在東京。歡迎預約工作坊、講座，或單獨約時間見面聊聊。`;
  document.getElementById('cal-range-title').textContent = `${startZh}－${endZh}`;
}
