<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪媚管理中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
    background: #FFF0F6;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* 登入畫面 */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #FFD6E7;
    background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'>  <g transform='translate(30,30)'>    <ellipse cx='0' cy='-9' rx='4' ry='7' fill='%23FF85A8' opacity='0.6'/>    <ellipse cx='9' cy='0' rx='7' ry='4' fill='%23FF85A8' opacity='0.6'/>    <ellipse cx='0' cy='9' rx='4' ry='7' fill='%23FF85A8' opacity='0.6'/>    <ellipse cx='-9' cy='0' rx='7' ry='4' fill='%23FF85A8' opacity='0.6'/>    <ellipse cx='6' cy='-6' rx='4' ry='6' fill='%23FFB3C8' opacity='0.5' transform='rotate(45)'/>    <ellipse cx='6' cy='6' rx='4' ry='6' fill='%23FFB3C8' opacity='0.5' transform='rotate(-45)'/>    <ellipse cx='-6' cy='6' rx='4' ry='6' fill='%23FFB3C8' opacity='0.5' transform='rotate(45)'/>    <ellipse cx='-6' cy='-6' rx='4' ry='6' fill='%23FFB3C8' opacity='0.5' transform='rotate(-45)'/>    <circle cx='0' cy='0' r='5' fill='%23FFE4EF'/>  </g></svg>");
    background-size: 60px 60px;
    position: relative;
    overflow: hidden;
  }

  .login-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,182,193,0.4);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-icon { font-size: 56px; margin-bottom: 16px; }

  .login-title {
    font-size: 26px;
    font-weight: 900;
    color: #BE185D;
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 14px;
    color: #9D174D;
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.8);
    border: 1px solid #FBCFE8;
    border-radius: 12px;
    font-size: 16px;
    color: #1a1a2e;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 16px;
    outline: none;
    font-family: inherit;
  }

  .login-input::placeholder { letter-spacing: 0; color: #FBCFE8; font-size: 14px; }
  .login-input:focus { border-color: #EC4899; }

  .login-btn {
    width: 100%;
    padding: 15px;
    background: #7DD3FC;
    color: #0C4A6E;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }

  .login-err {
    margin-top: 12px;
    color: #BE185D;
    font-size: 14px;
    display: none;
  }

  /* 主介面 */
  #mainApp { display: none; min-height: 100vh; }

  /* 頂部導覽 */
  .topbar {
    background: linear-gradient(135deg, #FCE7F3, #FBCFE8);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    color: #BE185D;
  }

  .topbar-title span { color: #EC4899; }

  .topbar-time {
    font-size: 13px;
    color: #9D174D;
  }

  /* 快速連結列 */
  .quicklinks {
    background: #FDF2F8;
    padding: 10px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #FBCFE8;
  }

  .ql-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.8);
    color: #9D174D;
    border: 1px solid rgba(255,182,193,0.4);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .ql-btn:hover { background: #FCE7F3; border-color: #EC4899; color: #BE185D; }

  /* 主體 */
  .main-body {
    display: flex;
    min-height: calc(100vh - 96px);
  }

  /* 側邊選單 */
  .sidebar {
    width: 220px;
    background: #fff;
    border-right: 1px solid #E8EDF2;
    padding: 20px 0;
    flex-shrink: 0;
    position: sticky;
    top: 96px;
    height: calc(100vh - 96px);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .sidebar-label {
    font-size: 11px;
    font-weight: 700;
    color: #999;
    letter-spacing: 1px;
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: #555;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .sidebar-item:hover { background: #FFF0F6; color: #1a1a2e; }
  .sidebar-item.active { background: #FDF2F8; color: #EC4899; font-weight: 700; }

  .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .badge {
    margin-left: auto;
    background: #EC4899;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    min-width: 20px;
    text-align: center;
  }

  /* 內容區 */
  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }

  .content-header {
    margin-bottom: 20px;
  }

  .content-title {
    font-size: 22px;
    font-weight: 900;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .content-sub {
    font-size: 14px;
    color: #888;
  }

  /* 統計卡 */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #F0F2F5;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 900;
    color: #EC4899;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 13px;
    color: #888;
  }

  /* 資料表格 */
  .table-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #F0F2F5;
    overflow: hidden;
  }

  .table-toolbar {
    padding: 16px 20px;
    border-bottom: 1px solid #F0F2F5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .table-toolbar-title {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .refresh-btn {
    padding: 7px 14px;
    background: #FFF0F6;
    border: 1px solid #E8EDF2;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    font-family: inherit;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: #7DD3FC; color: #0C4A6E; border-color: #7DD3FC; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .data-table th {
    background: #F8F9FB;
    padding: 12px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: #888;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #F0F2F5;
    white-space: nowrap;
  }

  .data-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #F8F9FB;
    color: #333;
    vertical-align: top;
    max-width: 200px;
    word-break: break-all;
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #FAFBFC; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: #aaa;
    font-size: 14px;
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .loading-state {
    text-align: center;
    padding: 40px;
    color: #aaa;
    font-size: 14px;
  }

  /* 首頁 */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .home-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #F0F2F5;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .home-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(236,72,153,0.12);
    border-color: #EC4899;
  }

  .home-card-icon { font-size: 36px; margin-bottom: 12px; }
  .home-card-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .home-card-count { font-size: 24px; font-weight: 900; color: #EC4899; }
  .home-card-sub { font-size: 12px; color: #aaa; margin-top: 2px; }

  /* 序號管理 */
  .code-form {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #F0F2F5;
  }

  .code-form-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #1a1a2e;
  }

  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .form-input {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    border: 1.5px solid #E8EDF2;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #EC4899; }

  .add-btn {
    padding: 10px 20px;
    background: #7DD3FC;
    color: #0C4A6E;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.9; }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag-green { background: #E8F5E9; color: #2E7D32; }
  .tag-red { background: #FFEBEE; color: #C62828; }
  .tag-blue { background: #E3F2FD; color: #1565C0; }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .content { padding: 16px; }
    .quicklinks { padding: 8px 16px; }
  }
</style>
</head>

// 密碼驗證
async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  if (hash === ADMIN_HASH) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    initApp();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function initApp() {
  updateTime();
  setInterval(updateTime, 1000);
  loadBadges();
  showPage('home');
}

}

async function loadBadges() {
  const tables = [
    { id: 'lecture', table: 'lecture_registrations' },
    { id: 'bookclub', table: 'bookclub_votes' },
    { id: 'camp', table: 'camp_registrations' },
    { id: 'cases', table: 'case_forms' },
    { id: 'assessment', table: 'assessment_results' },
    { id: 'codes', table: 'booking_codes' },
  ];
  for (const t of tables) {
    const { count } = await sb.from(t.table).select('*', { count: 'exact', head: true });
    const el = document.getElementById('badge-' + t.id);
    if (el) el.textContent = count || 0;
  }
}

async function showHome() {
  const tables = [
    { id: 'lecture', table: 'lecture_registrations', icon: '🎤', label: '講座報名', page: 'lecture' },
    { id: 'bookclub', table: 'bookclub_votes', icon: '📖', label: '讀書會投票', page: 'bookclub' },
    { id: 'camp', table: 'camp_registrations', icon: '⛺', label: '營隊報名', page: 'camp' },
    { id: 'cases', table: 'case_forms', icon: '📋', label: '個案資料', page: 'cases' },
    { id: 'assessment', table: 'assessment_results', icon: '📊', label: '測評結果', page: 'assessment' },
    { id: 'codes', table: 'booking_codes', icon: '🔑', label: '序號', page: 'codes' },
  ];

  const counts = {};
  for (const t of tables) {
    const { count } = await sb.from(t.table).select('*', { count: 'exact', head: true });
    counts[t.id] = count || 0;
  }

  const content = document.getElementById('contentArea');
  content.innerHTML = `
    <div class="content-header">
      <div class="content-title">🏠 首頁總覽</div>
      <div class="content-sub">歡迎回來，雪媚老師 🌻 以下是目前各項資料統計</div>
    </div>
    <div class="home-grid">
      ${tables.map(t => `
        <div class="home-card" onclick="showPage('${t.page}')">
          <div class="home-card-icon">${t.icon}</div>
          <div class="home-card-title">${t.label}</div>
          <div class="home-card-count">${counts[t.id]}</div>
          <div class="home-card-sub">筆資料・點擊查看</div>
        </div>
      `).join('')}
    </div>`;
}

async function showTable(tableName, title, columns) {
  const { data, error } = await sb.from(tableName).select('*').order('created_at', { ascending: false });
  const content = document.getElementById('contentArea');

  if (error) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div>載入失敗：${error.message}</div>`;
    return;
  }

  const rows = data || [];
  content.innerHTML = `
    <div class="content-header">
      <div class="content-title">${title}</div>
      <div class="content-sub">共 ${rows.length} 筆資料</div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${rows.length}</div>
        <div class="stat-label">總筆數</div>
      </div>
      ${rows.length > 0 ? `
      <div class="stat-card">
        <div class="stat-num">${formatDate(rows[0].created_at).split(' ')[0]}</div>
        <div class="stat-label">最新一筆</div>
      </div>` : ''}
    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <div class="table-toolbar-title">${title}</div>
        <button class="refresh-btn" onclick="showPage('${currentPage}')">🔄 重新整理</button>
      </div>
      ${rows.length === 0 ? `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          目前尚無資料
        </div>` : `
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                ${columns.map(c => `<th>${c.label}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, i) => `
                <tr>
                  <td style="color:#aaa; font-size:12px;">${i+1}</td>
                  ${columns.map(c => `
                    <td>${c.isDate ? formatDate(row[c.key]) : (row[c.key] || '<span style="color:#ccc">—</span>')}</td>
                  `).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}
    </div>`;
}

async function showBookclubVotes() {
  const { data } = await sb.from('bookclub_votes').select('*').order('created_at', { ascending: false });
  const rows = data || [];

  const slots = [
    { key: 'monday_eve', label: '週一晚上 19:00–21:30', group: '晚上班' },
    { key: 'thursday_eve', label: '週四晚上 19:00–21:30', group: '晚上班' },
    { key: 'friday_eve', label: '週五晚上 19:00–21:30', group: '晚上班' },
    { key: 'tuesday_am', label: '週二上午 9:30–12:00', group: '白天班' },
    { key: 'tuesday_pm', label: '週二下午 13:30–16:00', group: '白天班' },
    { key: 'friday_am', label: '週五上午 9:30–12:00', group: '白天班' },
    { key: 'friday_pm', label: '週五下午 13:30–16:00', group: '白天班' },
  ];

  const counts = {};
  const voters = {};
  slots.forEach(s => {
    counts[s.key] = rows.filter(r => r[s.key]).length;
    voters[s.key] = rows.filter(r => r[s.key]).map(r => r.voter_name);
  });

  const maxCount = Math.max(...Object.values(counts));
  const sorted = [...slots].sort((a, b) => counts[b.key] - counts[a.key]);

  const content = document.getElementById('contentArea');
  content.innerHTML = `
    <div class="content-header">
      <div class="content-title">📖 讀書會時段投票</div>
      <div class="content-sub">共 ${rows.length} 人投票</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">投票人數</div></div>
      <div class="stat-card"><div class="stat-num">${rows.filter(r=>r.member_type==='新生').length}</div><div class="stat-label">新生</div></div>
      <div class="stat-card"><div class="stat-num">${rows.filter(r=>r.member_type==='老同學').length}</div><div class="stat-label">老同學</div></div>
    </div>
    <div class="table-card" style="margin-bottom:20px;">
      <div class="table-toolbar">
        <div class="table-toolbar-title">📊 各時段票數（由高到低）</div>
        <button class="refresh-btn" onclick="showPage('bookclub')">🔄 更新</button>
      </div>
      <div style="padding:16px 20px;">
        ${sorted.map(slot => {
          const pct = maxCount > 0 ? Math.round(counts[slot.key] / maxCount * 100) : 0;
          const isTop = counts[slot.key] === maxCount && maxCount > 0;
          return `
          <div style="margin-bottom:16px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
              <span style="font-size:14px; font-weight:${isTop?'700':'400'}; color:${isTop?'#EC4899':'#333'};">
                ${isTop ? '🏆 ' : ''}${slot.label}
                <span style="font-size:12px; color:#aaa; margin-left:6px;">${slot.group}</span>
              </span>
              <span style="font-size:16px; font-weight:700; color:#EC4899;">${counts[slot.key]} 票</span>
            </div>
            <div style="background:#F0F2F5; border-radius:20px; height:8px; overflow:hidden;">
              <div style="background:${isTop?'#EC4899':'#A8D8C0'}; width:${pct}%; height:100%; border-radius:20px; transition:width 0.5s;"></div>
            </div>
            ${voters[slot.key].length > 0 ? `<div style="font-size:12px; color:#aaa; margin-top:3px;">${voters[slot.key].join('、')}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="table-card">
      <div class="table-toolbar"><div class="table-toolbar-title">投票名單</div></div>
      ${rows.length === 0 ? '<div class="empty-state"><div class="empty-icon">📭</div>尚無投票</div>' : `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>#</th><th>姓名</th><th>身份</th><th>可參加時段</th><th>投票時間</th></tr></thead>
          <tbody>
            ${rows.map((row, i) => `
              <tr>
                <td style="color:#aaa;font-size:12px;">${i+1}</td>
                <td><strong>${row.voter_name}</strong></td>
                <td><span class="tag ${row.member_type==='新生'?'tag-blue':'tag-green'}">${row.member_type||'—'}</span></td>
                <td style="font-size:13px;">${slots.filter(s=>row[s.key]).map(s=>s.label.split(' ')[0]).join('、') || '—'}</td>
                <td style="font-size:12px; color:#aaa;">${formatDate(row.created_at)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;
}

async function showCodes() {
  const { data } = await sb.from('booking_codes').select('*').order('created_at', { ascending: false });
  const rows = data || [];

  const content = document.getElementById('contentArea');
  content.innerHTML = `
    <div class="content-header">
      <div class="content-title">🔑 序號管理</div>
      <div class="content-sub">管理已發出的序號</div>
    </div>
    <div class="code-form">
      <div class="code-form-title">＋ 新增序號</div>
      <div class="form-row">
        <input type="text" class="form-input" id="newCode" placeholder="序號（例：XL-0716-001）" style="text-transform:uppercase; letter-spacing:1px;">
        <input type="text" class="form-input" id="newName" placeholder="學員姓名">
        <input type="text" class="form-input" id="newService" placeholder="服務項目（例：一對一諮詢）">
        <button class="add-btn" onclick="addCode()">新增</button>
      </div>
      <div id="codeMsg" style="font-size:13px; color:#0C4A6E; display:none;"></div>
    </div>
    <div class="table-card">
      <div class="table-toolbar">
        <div class="table-toolbar-title">已發出的序號（共 ${rows.length} 筆）</div>
        <button class="refresh-btn" onclick="showPage('codes')">🔄 更新</button>
      </div>
      ${rows.length === 0 ? '<div class="empty-state"><div class="empty-icon">🔑</div>尚未發出任何序號</div>' : `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>#</th><th>序號</th><th>學員</th><th>服務項目</th><th>狀態</th><th>發出時間</th></tr></thead>
          <tbody>
            ${rows.map((row, i) => `
              <tr>
                <td style="color:#aaa;font-size:12px;">${i+1}</td>
                <td><strong style="letter-spacing:1px;">${row.code}</strong></td>
                <td>${row.client_name || '—'}</td>
                <td>${row.service_type || '—'}</td>
                <td><span class="tag ${row.is_used ? 'tag-red' : 'tag-green'}">${row.is_used ? '已使用' : '未使用'}</span></td>
                <td style="font-size:12px; color:#aaa;">${formatDate(row.created_at)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;
}

async function addCode() {
  const code = document.getElementById('newCode').value.trim().toUpperCase();
  const name = document.getElementById('newName').value.trim();
  const service = document.getElementById('newService').value.trim();
  const msg = document.getElementById('codeMsg');

  if (!code) { msg.textContent = '請輸入序號'; msg.style.display = 'block'; return; }
  if (!name) { msg.textContent = '請輸入學員姓名'; msg.style.display = 'block'; return; }

  const { error } = await sb.from('booking_codes').insert([{
    code, client_name: name, service_type: service, is_used: false
  }]);

  if (error) {
    msg.textContent = '新增失敗：' + (error.message || '序號可能重複');
    msg.style.display = 'block';
    return;
  }

  msg.style.color = '#0C4A6E';
  msg.textContent = `✅ 序號 ${code} 已新增！`;
  msg.style.display = 'block';
  document.getElementById('newCode').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('newService').value = '';
  setTimeout(() => { showPage('codes'); loadBadges(); }, 1000);
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}
