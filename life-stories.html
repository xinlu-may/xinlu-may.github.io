                sub: "離開賺錢至上的空虛、失望，進入全然奉獻的喜樂、平安",
                chapters: [
            { title: "寫在前面", text: "爸爸從診斷出癌末到離開人世，只有短短3個多月！我們還來不及搞清楚狀況，就已經開始籌備喪禮了。當喪禮事宜大致安排底定，稍稍停下腳步，才清楚我們在3個多月內到底經歷了什麼：診斷結果帶來的震驚、尋求醫治的兵荒馬亂、照顧爸爸及兼顧工作的快速耗能、化療失敗的抗拒、看著爸爸越來越虛弱的不忍、不能讓爸爸留在等死的絕望所做的努力、盡量帶給他盼望的堅強，到最後爸爸離開的失落、悲傷！\n\n如果沒有神，我們無法有這麼多平安、喜樂和力量走過這一段。我想爸爸到天上時，也同樣會對上帝發出這個感恩，因為如果沒有神，爸爸或許會含恨而終！\n\n爸爸一生可誇口的真的只有勞苦及憂愁，當了一輩子老實苦幹、不重享受的商人，雖曾經賺到不少錢，但付出的卻是與家人疏離、孑然一身的代價；所遭遇的橫逆，沒有讓他享受到錢帶來的好處，只是不斷經歷事業險些歸於無有的驚濤駭浪，雖因不願被打倒的堅毅使得他總是能從頭再來，但他的生命所充滿的也不過就是一次又一次的心力交瘁罷了。好不容易在60歲這一年，事業終於重新在一個小小的基礎上穩定下來，等著他的卻是來得又凶又急的癌症末期！拼了一輩子的人生回報給他的就是3個多月的病痛煎熬，甚至下半身癱瘓的不堪，叫他怎能甘心！如果沒有神，我不知道爸爸如何承受生命是這樣劃上句點。\n\n離世前的20幾天，爸爸對親家公說：「感謝主啦！雖然時間不長，但是我選上帝這邊實在是選對邊了，還好站在上帝這邊，這就對了！」看得出來，爸爸這輩子的勞苦在上帝的供應及同在中已得著滿足、安慰！因著他單純相信得以領受救恩，確信自己已得著屬天福份，以致在生命的最後階段，原本該有的不甘早已被感恩、讚美取代；重大打擊也沒有留下不可磨滅的烙痕，彷彿他不曾經歷過那些兇惡一般！我們看到的是如安穩在母親懷中的恬靜、安詳，並熱切想回報神的心願，3個多月以來，爸爸反覆講述的就是「我要幫上帝蓋教會、感謝主、讚美主」，每回講起來，總是帶著期待及滿滿的笑容。\n\n遺憾還是有的，太晚認識神、來不及作見證、不能為新教會的建造出一份力、太少與家人相聚……。爸爸最後的心願之一就是不想他的親友有同樣的遺憾，所以想要作見證，讓人同得這福音的好處。\n\n親愛的朋友，希望您能領受爸爸的祝福，看完爸爸的故事後，能激勵您趁著還來得及的時候，將生命重心擺對，減少遺憾，並在生命終了前，也能慶幸自己選對了邊……\n\n大女兒　邱雪媚" },
            { title: "美好的最後一程", text: "爸爸走了！\n民國96年4月17日，凌晨3:23\n淡水馬偕安寧病房3216室\n在睡夢中、平靜安詳……\n\n當大家接到通知趕到醫院後，圍在爸爸身邊\n我們分享彼此的傷心、不捨，有眼淚\n我們分享來自上帝的祝福、爸爸的祝福，有笑聲\n我們最擔心的媽媽也被保守在主賞賜的平安中\n一起唱爸爸最愛的「耶和華祝福滿滿」\n一起禱告\n神的平安充滿在整個房間\n上帝真的很愛我們……\n\n96年4月2日是爸爸診斷出癌末以來，第一次氣喘嚴重發作；驚魂甫定的爸爸說：「那感覺很恐怖，像溺水一樣，好像命要沒了！」從那之後有幾天的時間爸爸不敢睡，害怕一睡不起，我想那是他離死亡最近的一次。整個晚上要一直牽著他的手，他才敢闔眼；但沒多久，在旁陪伴的人一定會被他叫醒，直到聽見有人回應、搜尋可以握著的手，再緊緊握著，他才放心。有一天，不擅表達內心感受的爸爸第一次虛弱的說：「我不敢睡……。」我知道上帝心疼他，不捨他無法入睡的煎熬，我將爸爸帶到神面前，同理了爸爸的恐懼及連日來的疲憊後，我們有了以下的對話：\n\n「爸爸，要不要告訴上帝你想要的方式？當上帝要來接你的時候，你希望是在白天，我們都在，你可以跟我們說再見；還是希望在睡夢中，讓上帝帶回去？」\n「可以選喔？」\n「我們可以告訴上帝你的心願呀！」\n……（爸爸想了一下）\n「我看還是睡著的時候回去好了！」\n「你不是怕睡著的時候會不再醒來嗎？」\n「我想過，但這樣比較舒服，比較不會甘苦（台語）。」\n「喔！那我們來告訴上帝。」（我為爸爸禱告）\n「你跟祂講好了沒？」\n「講好了！」\n「好，那我要睡了喔！」\n\n終於，他放心的睡著了！\n\n接下來，一向不喜歡講話的爸爸特別喜歡要我們跟他講話，他常說：「來講話呀！」你問他要講什麼，他只說：「不知道呀，你就是講呀！」所以找話題或翻聖經是那些天的主要工作，其間充滿了許多溫馨、有趣的對話，平常很ㄍ一ㄥ、話少的爸爸，變得可愛、溫和、幽默，就連護士也很愛逗他開心，那些時刻是很甜美的！\n\n十天後，爸爸開始進入嗜睡，在之前，他說了幾次：「我好累，想休息了。」我們想或許上帝接他回去的時間近了，為了讓他有預備，我們開始陸陸續續描述天堂的景象。記得有一次，我以為他聽著聽著睡著了，於是描述完啟示錄21章21節後（十二個門是十二顆珍珠，每門是一顆珍珠；城內的街道是精金，好像明透的玻璃。），我稍事休息，沒想到閉著眼睛的爸爸突然冒出一句：「喔！那珍珠很漂亮。」我與妹妹嚇一跳並相視而笑，不敢偷懶再繼續。之後大部分時間，他是睡著的，當我們叫他時，雖然他可以動作、回答，但很快又睡著，我們知道他真的累了；上帝也知道，於是4月17日的凌晨，護士進來查房時，看著爸爸嚥下最後一口氣。\n\n上帝息了他世上的勞苦，帶他回天家了。" },
            { title: "闖出一片天的鄉下窮孩子", text: "爸爸是嘉義鄉下種田窮人家的小孩，家裡有六個小孩，上有一個姊姊、一個哥哥，下有兩個弟弟、一個妹妹。當兵之前都在家裡幫忙種田，聽大姑姑講，爸爸話少但勤勞，雖然手腳動作不像大伯那麼快，但總是安安份份、認認真真做到太陽下山。雖然話少，但是腦筋動得不少，家裡有一塊田地，因為土地成分酸性較重，總是有一部份稻子種不活；爸爸想出了一個辦法，將稻草切碎，混進泥土中，用意要中和酸性，結果真的提高稻子的存活率！大姑姑說爸爸是有了想法，就會付諸實行的人。\n\n當完了兵，不甘心被困在只能種田的鄉下，期待闖出自己一片天的爸爸，寫信給經營布行的大姑丈，表示不想再回去種田了，希望大姑丈幫忙在高雄市找個工作，大姑丈建議爸爸跟著他學賣布，收入遠高過當時只有幾百塊薪水的「頭路」（台語：工作之意）。於是年紀輕輕來到高雄，成為布行的學徒。\n\n一段時間後，爸爸跟兄弟合租了一個店面。不過，他卻沒有認真看店，因為心都跑到前面店家那位漂亮的美容專櫃小姐身上。美麗活潑的美容師當然看不上木訥的窮小子。不過，所謂「一皮天下無難事」，聽說，當年爸爸為了追媽媽，天天到人家店裡看電視，趕都趕不走。終於在民國61年，把漂亮的媽媽娶回家。\n\n憑藉兩人的努力，很快在同一條街上開設了屬於自己的「賜美布行」，當起了老闆。兩人合作無間，每天一早，爸爸便用機車載著滿滿的幾箱布料，到大高雄地區一些人潮集中的市場擺地攤，媽媽則獨自看店賣布。隨著爸媽的攜手努力，很快即有能力貸款買房子。（記得小學時，填寫家中經濟狀況，我總是勾選小康，因為生意人不在乎小錢，所以我們常常可以要到錢，要求吃些零嘴也非難事。）我想那時爸爸算得上五子登科吧──妻子、孩子、房子、銀子、車子都有了！爸爸總是驕傲的說他是白手起家！\n\n無奈好景不常，隨著成衣加工業的興起，大量機器製作的衣服自然較人工製作的衣服便宜許多，買布做衣服成了不划算及奢侈的事，因而布行生意一天不如一天；漸漸的，家中五個小孩的學費、生活費逐漸吃緊。爸媽再度發揮合作的精神，由爸爸隻身北上彰化員林學習鞋材加工技術，預備開工廠，另闢財源；媽媽則獨自在高雄負責照顧店及五個孩子。" },
            { title: "中年轉行、不畏艱辛", text: "其實，當時爸爸已年近四十，算是中年的開始，但是堅毅、勤勞的個性讓他可以放下老闆身段，在別人的工廠當學徒，跟工人住一起；也曾經為了省機車運費及車費，將機車從高雄騎到彰化，屁股坐痛不說，還迷了路，但從沒聽他抱怨過。\n\n雖然一年後就開了自己的廠，但是接下來的六年間，非但沒有因而改善經濟，反倒因工廠支出遠超過從前，生活變得捉襟見肘；又加上媽媽及孩子們也搬來同住（媽媽做生意的收入也沒了，只靠直銷保養品補貼），更需靠借貸度日——那是我有印象中，家裡經濟真的很緊的日子。雖有一個工廠，但是沒有錢可以用。不過，仍是沒聽他抱怨過！依舊如常的上班、拜訪客戶、巡視工廠、教學徒。現在回想起來，以往被我認為是只關心工廠、不在乎孩子、鮮少與我們講話的冷漠父親，其實還有另外一面：雖承受著幾乎讓他抬不起頭來的沈重壓力，但定意不被環境打敗、安靜奮力前行的勇者；無論多苦，都往自己肚裡吞，這點在他後來生病時，更是表露無疑！" },
            { title: "前進大陸，賺了許多無法享受的錢", text: "其實西進大陸，在民國84年時已不是新聞，需要大量人工的鞋廠為降低人力成本，一一將工廠遷離台灣，面對日漸萎縮的市場，鞋材廠已經沒戲唱了！苦撐一段時日的爸爸不得不面對關廠或遷廠的抉擇。此時，剛好有個機會來臨，覺得留在台灣只是死路一條的爸爸，毅然決然帶著借來的二百多萬、四十多歲的體力、不懂國語的語言能力、媽媽的不願意，前進大陸！於是爸爸在人生地不熟的大陸再一次從零開始！\n\n不會講「普通話」的爸爸學的第一句「普通話」是：「不要講家鄉話！」原來員工來自不同地區，若講起各地家鄉話，不易管理。員工管理還不是最費心力的，爸爸第一個廠房是從整地開始，加上建立客戶群、找原料商……可以想見其困難，不過，沒想到短短兩年就獲利約六百萬。經過兩次的從零開始，爸爸終於結出豐碩的果實！現在擁有的事業規模遠超過從前，嚐到甜頭的爸爸對財富的滿足也跟著提高，有了六百萬，就想要破千萬；有了一個廠，就想要第二個廠、第三個廠……，所以賺來的錢又投入廠房擴充、增購設備。雖然公司盈餘豐碩，但是那幾年，爸爸只領數萬的薪水，繳完房貸、家庭基本支出後，所剩無幾；家裡五個孩子，除了處於青少年的弟弟完全由爸爸供養外，其餘孩子都要打工補貼自己生活費、學費；爸爸的千萬工廠跟爸爸一樣，對我們而言是遙遠又陌生的。不過爸爸除了薪水也無其他收入，他的生活其實很單調，工作、陪客戶（吃飯、喝酒、打牌），此外無他。\n\n記得一次難得的機會，我跟爸爸同時在家，我接到大陸打來找「邱董」的電話，不假思索馬上回答：「沒這個人！」掛上電話，突然覺得不太對勁，心想會不會是爸爸，不太肯定的問：「爸，你是不是邱董？」那個看起來像是鄉下阿伯的爸爸沒好氣的回答：「賜啊（台語）！唉呀，你真害（台語）！」看起來不像個擁有工廠的台商還不是最慘的，爸爸接下來所遭遇到的變化，不但是他自己，就連我們都是一生難忘！" },
            { title: "第二次結束工廠", text: "就在工廠前景一片看好之際，因為某些作業疏失，爸爸被政府單位強制帶走，美其名是「協助調查」，但是有半年的時間，音訊全無！為了設法聯絡上爸爸，透過各種管道，花了許多的錢，仍是徒勞無功。直到某一天接到一通陌生電話：「我是跟你爸爸住在同一個房間的某某先生，你爸爸將你們的聯絡方式偷偷告訴我，他要我轉達，他很好，不要擔心。」我們才第一次獲得父親的音訊。而媽媽第一次、也是惟一一次可以見到爸爸，是在官員嚴密監控，不准有私下談話的緊張情境，媽媽除了飽受驚嚇之外，看到雖年近五十、但始終鬥志高昂的爸爸，第一次失魂落魄、意志消沈地表示：「不然，回台灣好了！」聽到這些轉述，我們知道，爸爸真的感到被打敗了。但，這只是接踵而來打擊的開場！\n\n媽媽面對這樣的巨變，與先生隔離的折磨，工廠關閉的打擊，財務破產，求援的人索求鉅額金錢，情緒幾度崩潰，只能求助各方神明，但事情並無好轉跡象。不過，有次台灣一位傳道人特地到大陸探訪媽媽，還陪著媽媽去政府部門要求見爸爸，媽媽因著這陌生人竟感到有所依靠，這是她第一次經歷從上帝來的幫助；但是，媽媽以為只是那位傳道人特別有能力罷了。\n\n在這件事情發生之初，小妹蒙召要讀神學院，媽媽情緒反彈；小妹向神禱告：願意獻身，但是求神看顧家裡的需要。過了3個月，二妹、小弟相繼經歷上帝的愛而受洗，神果真是信實的，讓家裡的人一個個因信靠主而有力量度過那艱困的時期；因此，家裡有四個小孩因著同樣信仰，能聚在一起禱告，彼此扶持。事發將近六個月後，小妹入學時間到了，媽媽再度攔阻，小妹請神學院發起代禱，其實加上其他三個孩子的教會，前前後後有幾百人為爸爸守望禱告；小妹面對媽媽的攔阻，勇敢地邀請她何不來求這位她不認識的神，媽媽答應後，竟在禱告中為長年忽視孩子向神認罪，求神赦免。沒想到，過了一星期後，爸爸竟被釋放了！不但無需多花一毛錢，政府還退還部分當初硬性規定繳的住宿費！" },
            { title: "第三次從零開始、第三次失敗", text: "歷劫歸來的爸爸，已無動力再重新開始，但因證件過期，竟無法離開大陸，前後被迫滯留大陸兩年多。在這段無奈滯留的期間，與一位早已認識的台灣商人談話間發現如果對方出資金、爸爸出設備及客戶群可以共獲利益，因而決定合夥，工廠經營由爸爸全權負責，對方為可以分紅的股東。第三次又從零開始！\n\n一如以往，獲利很快，一年後即有豐厚盈餘，對方馬上要求分紅，爸爸鑑於分紅影響工廠營運，希望延緩分紅；在對方不接受的情況下，開始討論拆夥。經過一段不算短的協調過程，對方開始強勢干預，破壞當初的協定，也展開一連串的強勢作為，最後派車擋住工廠門口，導致工廠無法運作，爸爸因擔心影響客戶權益，不敢再接工作。接著爸爸提出告訴，希望循法律途徑解決，陷入了一場長期訴訟，一直到爸爸離世前，官司都尚未解決。也因此工廠又沒了。不過爸爸離世前，特地交代，他要饒恕對方，錢拿不拿得回來都沒關係，決定撤回告訴。信主時間不長的爸爸，一直強調要赦免，這是神很大的祝福，也是讓爸爸得以安然離世很重要的原因。\n\n機器設備都被對方扣留在原廠房，沒錢沒機器，實在沒輒！但是此時出現舊客戶的聲援，表示爸爸工廠的品質是他們所肯定的，支持爸爸不要放棄，繼續運作。此時，父母住在一位黃姓朋友很慷慨出借的住處，黃先生不但收留落難的父母，甚至最後出借倉庫讓爸爸充作廠房，就這樣又重新開始！雖經過許多波折，但是沒影響工廠運作，順利營運了半年後，又出現了邀約合夥者。" },
            { title: "第四次面對遷廠、終於無法承受了", text: "一直借用別人廠房絕非長久之計（其實他一直都在尋找廠房），此時出現的邀約剛好符合爸爸的計畫，爸爸好高興！這一次工廠的規模比之前都大，對方也不只是股東，而是實際參與經營。因著對對方的信任及認為應該要放手讓年輕人發揮（爸爸已經五十七歲了），所以爸爸只負責技術指導、監督部份，管理及業務都交給對方負責。沒想到合作才半年，爸爸就發現對方其實希望掌握更多主導權，但是因不熟悉爸爸擅長的專業技術，導致決策有實行的困難；在溝通無法有共識的情況下，嚴重影響出貨品質，造成公司信用及金錢的損失，因而決定拆夥。但在拆夥過程中，又遭遇重重困難，因為當初是以對方名義在大陸設立公司，而且雙方又無正式簽約，加上對方正值蓄勢待發的青壯年，勢在必得，一向不愛也不擅跟人計較的爸爸，在法律上又無權利，可說是處於絕對弱勢。\n\n其實，因年紀、心力緣故，爸爸對工廠營運已有倦意；只因不甘心長時間耕耘的事業真的歸零，才願意承受一次又一次的拆毀和再造。而這一次爸爸有意將工廠交給對方（因家裡孩子一個個蒙召服事上帝，都無意接續家庭事業），讓對方在自己既有基礎上繼續發展，而他自己只當分紅、不參與經營的股東；原本以為事業得以被接續，這輩子辛苦守住的事業總算不徒然，雖然要交出實際經營權給外人，但對於將事業、成就看得比家庭、孩子、自己還重的爸爸，這樣的結果仍是足以令他欣慰。沒想到，以為終於可以被實現的心願不但落空，面對這可能是最後一次保住事業的機會，卻又處於絕對弱勢的爸爸，眼看著工廠一步步就要變成別人的，他慌了！\n\n此時，我們在爸爸身上看到以前從未看過的脆弱。他一直是個堅毅的人，凡事靠自己，勇於面對、不畏環境艱難，只是腳踏實地，一步一步堅持繼續走，即便環境上看來已無路可走。從他當完兵，開始奮鬥，白手起家、中年轉行從高雄搬到員林、從員林到大陸設廠、第一次工廠被迫解散，三番兩次好不容易重建，剛開始獲利，很短時間內卻又遭逢變故，他總是咬緊牙根，面對現實，不將時間用在怨天尤人，最終，他又再站起來，連他自己也同意，他是打不死的蟑螂。凡事靠自己的毅力就可以突破所有困難，一直到他57歲之前，這些人生法則似乎還是管用；但是這一次，他無法再忽視日漸瀰漫在心中的無力、無助。" },
            { title: "向女兒的神禱告看看", text: "十六年前，身為老大的我在高中即經歷主的愛，但是在父母強力反對下，只能偷偷的去教會。雖然其間少不了嚴肅爸爸的強烈責罵，但爸爸畢竟重視事業，也不會花太多時間在我身上，還不至於有什麼承受不了的壓力。我表面雖不多講什麼，但開始向弟弟妹妹傳福音，帶他們到教會；起初，弟妹勉強配合，但是因為神的恩典，在接下來幾年，他們各自真實經歷主的愛，也前後受洗、甚至蒙召當傳道人。有一天，因拜拜的問題，小妹不認同神明的態度終於惹惱了爸爸，憤而將兩個慕道的妹妹，連同他們的衣服丟出門外，不要他們了。然後打電話給在台北的我，一陣關於背叛祖先的憤怒責備之後，清楚的對我說：「從此你不是我的女兒了，我沒有你這樣的女兒，如果還有要信耶穌的弟弟妹妹，你就給我帶到台北去養！不要再進我的家門！」家門當然要再進，只是爸爸去大陸時再進就好了！唯一的兒子也被警告：「如果你敢去信耶穌，我會打斷你的腿！」\n\n從此，基督信仰在家裡變成一個公開的秘密，不能隨意觸及。但是在爸爸遭逢許多變故之際，來自上帝及教會的諸多關心、代禱及協助，卻是支持我們走過一關關困難的重要力量。在爸爸第三次面對打擊的消息傳回來時，我們決定這一次勇敢力薦耶穌，邀請爸爸禱告；或許是困難當頭，他也沒拒絕，只是要我們自己禱告就好，我們知道他漸漸接納我們的神了！第四次危機發生時，爸爸竟要媽媽打電話回來叫我們禱告！在面對最後談判前夕、爸爸仍一籌莫展的最危急時刻，他接受小妹帶著傳道人（魯傳道）前往大陸一趟幫助他。\n\n那時爸爸對上帝仍是敬而遠之，只是非常感謝傳道人；但是看到魯傳道專程請假且盡心盡力陪伴，漸漸的，他的態度開始改變了。魯傳道帶著爸爸禱告，用聖經的原則教導爸爸該如何面對，與爸爸商量。原本總藉故推拖、不置可否的爸爸，態度慢慢轉變，爸爸從其中感受到安定的力量，繼而很信任魯傳道的建議。此時的爸爸也如同溺水中的人，急於抓住任何可以抓的東西，因此當有人介紹一些可以幫助的基督徒朋友時，爸爸也全都接受，只要可以解決事情，什麼都可以。但是對信仰仍是敬謝不敏，所以當基督徒朋友對他介紹信仰時，爸爸說：「我的妻子、女兒、兒子都給祂了，請上帝放過我這個老頭子！」\n\n感謝主！在此次的談判中，爸爸看見神公義的手介入其中，我們幾乎拿回大部份原本屬於我們的資產設備，爸爸第一次經歷神動工的大能遠超過人竭盡心力、焦慮愁煩的努力。但是接著要克服的挑戰是：對方要求我們必須在一個月內將所有機器設備遷出工廠，否則，撤回所有協定，等於回到失去工廠的威脅。其實這是不容易的事，因為一個地點、大小合適，且願意出租的廠房不好找，工廠的機器非常龐大，搬遷也需要時間。當時，爸爸因時間的緊迫感到快瘋掉，以致租金、地點……等因素不是很理想的廠房，他也想勉強租下，但是因風水師反對而作罷，爸爸越來越急。當認識的基督徒知道爸爸詢問風水師的意見，來電教導媽媽，這樣做會失去神的祝福，媽媽在禱告中痛哭認罪，就在那個下午，終於找到優於之前所有條件的廠房。\n\n這是爸爸再一次經歷神的大能。因為小妹在回台灣的路上，看見一個仲介公司，提議爸爸去電詢問，爸爸原本很輕忽，因為他認為他在這個地區十多年，有什麼地方是他不知道的，他不屑的說：「我比仲介更熟這個地方！」最後爸爸姑且一試，沒想到還真找到了！一個根本沒住在大陸的女兒，竟然幫他找到這麼合適的廠房，他認為是上帝的能力使然。但是搬遷之際卻遭遇連日大雨，無法進行搬遷，令他著急不已，擔心超過規定期限，此時爸爸心裡向神說：「如果你讓我有好天氣可以搬工廠，我就信你。」感謝主，搬工廠那天真的天氣特別好，搬了3天之後，大雨又開始下了起來！這是他後來作見證時一定分享的經歷。" },
            { title: "第五次開始新工廠：董事長位置是上帝的！", text: "新工廠在6月開始運作，同年8月在家裡父親節的慶祝中，爸爸第一次坦承：「我心裡有在信呀，只是沒有講出來！至於對風水師，大家認識這麼久了，表面上要尊重一下，他講他的，我做我的。」這個表白讓等了16年的孩子們，有說不出的感恩及感動。\n\n95年2-3月爸爸又更多經歷主。有一筆近20萬人民幣的貨款收了1年收不回來，剛好工廠經濟吃緊，於是爸爸要求我們禱告，沒想到對方竟主動要我們前去領取1/3貨款，爸爸心喜，再繼續禱告，過了一星期，再通知去領1/3貨款，爸爸簡直不敢相信，再試探性禱告：「既然你已經讓我收回2次，剩下的應該通通幫我拿回來呀！」神應允了他的禱告。\n\n95年4月份清明前夕，爸爸主動表示要拆偶像，我們開心的無法置信，因為爸爸甚至沒做過決志禱告，顯示上帝的同在已帶給爸爸莫大的安全感，他已清楚「跟隨神」是他接下來要走的道路。就在拆除偶像之後的一個星期，律師來電傳達與上上個合夥者的官司打贏了！\n\n接下來，識字不多的爸爸開始認真上信仰慕道課，當他很費力的讀了些聖經後，常會哇哇叫：「讀書比種田還累；拿筆比拿鋤頭還重！（台語）」總是把我們逗得哈哈笑，不過我們知道，對神真理的渴慕已讓他勝過閱讀聖經的辛苦！除此之外，在生活上，也開始一點一滴被神更新，例如自己體會到不應該再繼續打麻將，但是不好意思推掉客戶或朋友的邀約，在一次台商朋友的牌局上，對方突然對爸爸說：「你不是基督徒嗎？怎麼可以打牌？」「是不能打啊，但是你邀我啊，那你以後不要邀我。」\n\n爸爸跟媽媽的關係也有很大的改變，沒耐性的爸爸在以往經常不耐煩媽媽的嘮叨或不同意見，有時要求媽媽回台灣或者索性不講話，晚上就出去打牌到很晚。但是開始到教會後，會反省自己的態度。一次家庭禮拜上，談到態度要柔和，我們提醒爸爸不能再對媽媽說：你回去台灣好了。爸爸說：「現在不會了，如果生氣，應該要走的不是她，是我！我自己出去走一走，等冷靜了再回來。」當我們還半信半疑時，只見媽媽滿意的點點頭，說：「爸爸的脾氣是真的改很多。」在我們的鼓吹下，爸爸竟然還可以當著我們的面說：「太太，我愛妳！辛苦妳了！」媽媽的笑容更燦爛了。\n\n在辦公室他還作了一個很滿意的改變：他從本來董事長的位置移到總經理的位置，爸爸說：「從今以後，這個工廠是上帝的，所以董事長的位置要空出來給上帝坐。」並對上帝說：「現在工廠是你的，你來帶領，你怎麼說，我怎麼做。」從那以後，爸爸表示現在同樣在帶領工廠，但是晚上已經能睡得著了。原來，因為工廠營運的壓力，爸爸常常是無法入睡的。把工廠交給上帝的爸爸，也在同年6月4日，受洗歸入主的名下，正式成為神的兒女！\n\n此後，爸爸常會自己打電話給我們每一個信主的孩子，要求我們為某件事禱告，除了對禱告的倚靠加深，這也是從有記憶以來，爸爸為著他的事主動跟我們有互動。除此之外，他跟我們通電話時講的話不再只有一句，甚至我們回家過節時，還可以聽到在大陸的他在電話那頭主動要求跟每個孩子講講話，真令我們嘖嘖稱奇，上帝果然能改變人的生命，我開始覺得我有爸爸了。" },
            { title: "我要幫上帝蓋教會", text: "爸爸是由平鎮浸信會的黃牧師施洗的，受洗隔天當他看到平鎮浸信會教堂照片時，心中出現一個羨慕：如果可以在大陸也蓋一個這樣的教會，該有多好！他說：「大陸開放宗教自由可能還要20年，雖然我現在沒錢，但是只要給我再活20年，前10年我努力賺錢當蓋教會基金應該夠了，然後我用10年的時間慢慢蓋，我不相信蓋不起來，這就是我未來人生的目標，我希望有更多人認識主耶穌，讓耶穌來照顧。」當時，我的感動不只在於剛信主的爸爸就有這樣的宏願，而是過去20多年，我從沒在他眼中看到過這樣的光彩，除了錢，這是他第一次擁有超越物質財富的人生目標！我衷心為爸爸感到高興，他終於享受他的生命了！雖然短短的10個月後，他就走了！\n\n除了蓋教會，爸爸的另一項使命是作見證，或許是因受同住在員林曹永杉弟兄夫婦的榜樣所影響，他們夫婦原本是虔誠的佛教徒，自從經歷主的愛之後，立定心志服事主，因而到處為主作見證，在爸爸信仰初期，他們常來探訪爸爸，鼓勵爸爸。所以爸爸最常有的禱告是：「主啊！我要為你作見證！」然後對我說：「我把我的意思告訴你，你幫我寫成文章，然後教我唸，這樣我才記得起來。」但我一次也沒做，因為偷懶，因而爸爸每回要作見證前，總拉著孩子問要怎麼講，然後一次一次默記、練習講，我們很像指導演講比賽學生的老師，只不過這個學生比老師認真多了。\n\n有時，同樣沒有認得很多字的媽媽取笑他：「你甘耶號講（台語）？你講得出來嗎？你不怕漏氣喔！」爸爸總是不卑不亢回答：「主會教我講，慢慢講就會越來越進步，不講就永遠不會進步！」果真，在短短時間中，還真的在不同教會、佈道會中作了幾次見證。第一次正式作見證就是站在約800人面前，老實說，雖然表面上總是鼓勵爸爸，但其實心中忐忑不安，尤其爸爸上台前還埋怨我沒有幫他寫稿，害他不能背起來！沒想到，他不但台風穩健，幽默風趣，講到神的大能、鼓勵大家要信耶穌時，更是鏗鏘有力，十分篤定，看到這幕景象時，身為孩子的我們，都不敢相信這就是那位惜話如金的爸爸，只能讚嘆神的大能。" },
            { title: "又凶又急的癌症末期", text: "其實爸爸一直有痛風的病史，因此常有些疼痛，但是當他在飲食上控制、增加運動後，也能減緩痛風發作，不影響生活，所以當癌症早已透過疼痛告知他時，他總以為是痛風導致的疼痛，為著方便，不顧家人提醒的吃著大陸來路不明的止痛藥，因為感到很有效，加上堅毅的性格，一直過著忍痛的日子。爸爸平均每2年都會做一次健康檢查，所以95年12月底，當他以為是為了疼痛不已的骨刺回台開刀，卻檢查出是癌症時，震撼自然不在話下！\n\n隨即我們轉往和信再做確認，仍是得到同樣的答案：「癌症已擴散到很多地方，所以無法查出原發部位。」也就是說，根本不知道是什麼癌症。一開始我們不知如何啟口，特別是看到他充滿期待的希望趕快醫好，要回大陸作見證、要蓋教會。當醫生終於告訴我們如果化療完成，可能也只剩1-2年的壽命。為了讓他更有力量承受這個衝擊，我們請來爸爸的屬靈啟蒙老師──劉三(劉曉亭)牧師。當爸爸坦承他其實有在信時，我們問：「你怎麼信的？」爸爸說：「我就想，奇怪，怎麼我的孩子一個個都去信耶穌，到底這個基督教在講什麼，應該要來瞭解一下，聽了一陣子劉三的節目，講得有道理，我就接受了！」\n\n為鼓勵爸爸，不久之前，曾帶著爸爸拜訪劉牧師，親自道謝，回來後，爸爸還將這件事講了好幾遍呢。因此，再度請劉三出馬，只為鼓勵爸爸堅強面對。沒想到當劉牧師說要把人生當成來出差，工作完成要回去交差時，爸爸接著說：「當成來玩啦！玩夠了，就要回家了！」我提醒爸爸，媽媽每次聽到他說回去陪上帝也很好，都會捨不得，爸爸笑笑牽起媽媽的手說：「不要傷心，我是先去幫你佔位子啦！」我永遠記得媽媽臉上綻放出的笑容。其實如果病人本身能正面看待死亡，會降低照顧者的心理負擔。爸爸的豁達在我們整個陪伴的過程中也有引導作用，他一直跟醫生說：「不要怕告訴我，我什麼都不怕，如果你能醫就醫，如果你不能醫，我會請上帝醫。」然後告訴我們：「如果上帝要用我，就會醫好我，如果祂覺得我可以休息了，回去跟他作伴也很好。」\n\n我一直等著要觀察爸爸聽到醫生親自宣布病情時的表情，要看看他是否真那麼放得開，當醫生正式跟爸爸說明，化療以後可能還有2年的生命時，我看到爸爸整個放鬆且笑開來，他說：「哇，2年還可以做很多事，還有2年可以幫上帝做事情，我已經很高興了。」我再次看見爸爸不怕面對現實的勇敢，等待未知結果的壓力反而遠勝於知道自己只能活2年。" },
            { title: "其實他真的很痛", text: "疼痛是癌末病人無法閃躲的必然，爸爸也不例外，尤其是癌細胞已經擴散到骨頭的患者。從診斷出癌末到他離世前，約有3個多月，我沒有看過他因疼痛而生氣咆哮或抱怨、唉哼，他只是眉頭緊鎖，一直輕拍疼痛的部位；請我們幫他擦舒緩疼痛的藥膏；頻頻叮嚀千萬不要錯過吃止痛藥的時間。雖然，他幾乎分分秒秒承受著疼痛，包括晚上因痛無法入眠，依然自己強忍著痛，不要旁人分擔，使得我們要一直叮囑他不要忍痛，有痛的感覺一定要說，才能讓醫生正確給藥。這是爸爸體貼人的一種表現，盡可能不要增加別人的負擔。淡水馬偕安寧病房的護理師告訴我們他所看到的爸爸，在一次氣喘發作後，爸爸呼吸得很吃力，護理師說明需要照X光片，只見帶著氧氣罩的爸爸緩緩的說：「好……應……該……的……，要……盡……快……」，一般人經歷嚴重氣喘發作，通常會非常驚慌，爸爸竟然能如此平穩應對。其實，以往因著爸爸重事業輕忽家庭，我對他非常不諒解，認為他是一個不可取的父親，不值得尊重。但是在這段陪伴過程，我才知道我的爸爸有這麼好的品格、有修養的態度，在爸爸最不能有所作為的時候，他贏得了我衷心的尊重。" },
            { title: "對上帝的渴慕及恩典支持他承受病痛", text: "生病過程中，爸爸最常講的就是：「感謝主、讚美主、哈利路亞！」\n\n在化療之前，為減輕爸爸的疼痛，醫生安排了10天的放射線治療，住院10天中，他很認真的將詩篇23篇每個字記起來，因為他等著要回大陸作見證，希望能分享一些聖經。我們將字放大做成海報貼在牆上，認真的爸爸要求在他容易忘記的字旁邊劃上圖或做記號，即使剛唸過，他仍會忘記，再次抱怨讀書比種田累，但總是一次又一次複習，直到身體的疼痛讓他無法再繼續才停止。\n\n接下來的日子，我們反覆進出和信醫院，因為爸爸做完第一次化療後，身體狀況急轉直下，幾乎每一週都要輸血、補充血紅素及其他營養。漸漸的因藥物副作用，進食越來越困難。越來越虛弱的身體讓他沮喪，但是只要邀請他讀聖經或禱告，他總是能振奮起精神配合，直到體力不支，我們雖然心疼，但是知道唯有神能滿足他的心，成為他的力量。\n\n因化療效果不好，癌細胞仍一直長大，壓迫到腰椎神經，爸爸在化療後不到3星期的時間裡下半身癱瘓，這對我們都是一個不能接受的事實，比知道得到癌症打擊還要大。因為這帶給爸爸的痛苦、羞辱是那麼的直接。爸爸意識完全清醒，卻突然無法自理大小便，開始包尿布，身體因長期臥床開始出現褥瘡，一切打擊來得又快又急。我們也才明白為何在這之前，他上一次廁所（小號）總要半小時以上，因為他的腰椎神經已受到壓迫，疼痛異常，因而每一個動作都必須很緩慢，但是他默默忍受，以致我們沒有感受到其嚴重性。這期間，他學會了一種禱告：「耶穌，來幫我痛！」他總是一次又一次呼求耶穌，讓耶穌陪他度過每分每秒的疼痛。有一天，他告訴我們：「晚上，我痛得睡不著，上帝來陪我聊天，還帶我到大陸玩一趟，又帶我回來醫院」。雖然白天他還是痛，但是，當他在敘述時，我可以感受到他的興奮，與神相交的喜樂讓他超越了身體的疼痛。\n\n以往，爸爸很少回台灣，因為他說他在台灣沒有朋友，但是在他住院的前一個月裡，他估算有超過100個人來探訪他，這讓他體會到上帝真的在看顧他，再怎麼痛，一定要坐起來，跟大家一起唱詩歌、禱告。探訪的人回去之後，他總是帶著滿足、寬慰的心情及疲倦不已的身體入睡。而一開始對年輕的弟弟需要獨自承擔帶領工廠是有些擔心，但是上帝親自堅固他，讓他有不憑眼見的信心，相信上帝會掌管，所以當弟弟傳來捷報，工廠在爸爸回台這段時間業績成長、員工也很有向心力，爸爸不感意外的微笑著！\n\n另一件讓爸爸深知上帝一路眷顧的是上帝預備所有物品。當爸爸一開始無力行走，我們需要一枝有3隻腳、更穩固的手杖，可是星期天店家休息，且緊接著過年，我們正擔心買不到時，突然一家快要關的店出現在眼前，竟然買到了！接著，爸爸已沒有力氣走路，需要輪椅，但也同樣買不到，沒想到主日崇拜後，牧師說教會有一輛多出來的輪椅，我們驚喜的接受！過完年回台北，確認爸爸癱瘓的事實，接著我們需要買氣墊床及電動床，總花費起碼要2-3萬，但是竟然都輕易借到了，最神奇的是當我們正煩惱著需要租一間有電梯的房子給爸爸暫住，以便出入照顧時，大女婿前老闆娘來看爸爸時，她隨行的姊姊竟主動表示有一間房子可以借我們，而且就在妹妹家附近，裡面所有傢具一應俱全，彷彿為我們量身打造一般。其實，走到這裡，全家人心中對神眷顧的感激早已滿溢出來，真是在我們還未開口時，神就預備了一切。" },
            { title: "讓我們沒有遺憾的安寧療護", text: "爸爸因下半身癱瘓而比預定時間提早一個月回醫院複診，醫生告知如果體力沒有恢復無法再繼續做化療，之後，我們又努力了3個星期，因放射線照射到食道附近，已經吃不下東西的爸爸為了恢復體力，仍勉強吃幾口，但是常常又吐出來，我們知道爸爸真的很努力要恢復體力，所以當第3次回診，醫生宣布體力仍無法承受化療時，爸爸被擊倒了！忽然之間，他好像老了10歲，志氣全消，垂頭喪氣的說：「算了，算了，應該是上帝要帶我回去了。」看在我們眼中真是無比的心疼，不忍心看他再繼續承受身體的不舒服，因而決定住進安寧病房，因為住在家裡，我們的護理專業不夠，徒增爸爸的痛苦。\n\n住院後，爸爸馬上洗了一個舒服的澡，上一次用水洗澡已是一個半月以前的事了，安寧病房不但將爸爸的身體照顧得很好，大部分傷口在很短時間內癒合，而且醫生及護士對爸爸的心理感受尤其重視，就連我們也感到被照顧了。因此我們有餘力做更重要的事。\n\n我不想讓爸爸處於等死的沮喪，當爸爸表示不想再繼續痛苦，回去也好。我接著他的話：「如果你真覺得上帝要帶你回去了，那麼應該要將你剩下的責任盡完，才是圓滿完成你的任務呀！」他說：「我都沒有什麼要做的了。」「如果你就這麼回去，親戚朋友不知道你是這麼蒙耶穌照顧，可能會很傷心，以為你是像一般人一樣很悲哀的離開。」「那要怎麼辦？」「你要不要寫下一些文章或錄下一些要對誰說的話，讓他們放心呀，或者將你走了以後我們需要處理的事先交代好？」「應該的，快點進行吧！」\n\n有了任務的爸爸重新有了活力，病房變成他的辦公室，他指揮一切，我則像秘書一般，記錄所有他交代的事，錄下他對不同的人所要講的話。錄音內容大致如下：「○○○你好，當你看到這個影片時，我已經在天上享福了，我要謝謝你……」。此外，他不願自己太慢發現癌症的遺憾發生在與他處境類似的台商朋友身上，因此，由他口述，孩子執筆寫了一封給台商朋友的信，並購買一本教導全人健康的書《活得久、活得好》(宇宙光出版)，將信貼在書上送到大陸及送給來看他的人、護士、病房病友。聽說，有些朋友來看過他之後，馬上進行全身健康檢查，爸爸很高興他可以成為別人的提醒。" },
            { title: "爸爸給台商朋友的一封信", text: "親愛的朋友：\n\n我是邱鐘明，很高興問候大家！\n\n在今年一月初因身體不適就醫，醫生診斷後確認是癌症末期，心中當然是非常震驚，不過仍要面對現實，因此開始進行化療，不過在第一次的化療後，醫生評估化療對我的身體損害太大，繼續進行恐怕身體無法負荷，孩子得知馬偕醫院有安寧療護，可讓我得到最好的照顧，因此現在我住在淡水馬偕醫院的安寧病房，在這裡，我的確受到很好的照顧，加上太太、孩子的悉心陪伴，雖然身體非常痛苦，心中卻是充滿感恩、喜樂！\n\n面對這可能是我人生的最後一個階段，我體會到一些重要的事情，我想這是我可以送給各位的禮物，希望對大家有幫助：\n\n1. 原來錢不是萬能：以前我總認為有錢能使鬼推磨，現在想想真是錯的！賺了一輩子，現在只賺到一張病床！應該多花些時間關心別人，人的價值勝過金錢！\n\n2. 應該多陪家人：以前為了事業，把家庭都交給太太，如今身體因病而下半身癱瘓，所有需要都是太太孩子們照顧，看到他們又要工作又要輪班來照顧，除了感動也感到虧欠，原來，家人不一定在你風光時來分享，卻會在遇到苦難時來分擔！不管過去我有多少朋友，現在只有家人在我身邊守著，過去，我實在太缺乏關心及陪伴他們了，雖然我們請看護不是問題，但是太太及孩子堅持要多陪陪我，這份情我可能沒有機會回報了，這是很大的遺憾。如果你的時間仍是都用在工作上，甚至除了太太（先生）以外，還有另一個家，奉勸你趕快回頭，回頭是岸，重新跟家人建立關係，希望你到生命結束之前，沒有我這種遺憾，即使家人包容原諒你，你仍必須面對無法彌補的歉疚。\n\n3. 健康真的很重要：不要再熬夜工作、打牌，不要再大吃大喝，不要常常充滿壓力及不好的心情，想辦法多休息，讓你會有負面心情的事盡量避免，這些都會危害你的健康，定期要做健康檢查。等到你發現要注重健康時，已經來不及了！聖經說：「人若賺得全世界，賠上自己的生命有何益處呢？人還能拿什麼換生命呢？」這是真的！\n\n4. 生命需要有意義：賺錢絕對不是生命的意義，在面對可能是生命最後階段時，我發現我要面對死了以後要去哪裡，而且此時回頭看，才看清楚什麼是對、什麼是錯！我很感恩去年我認識了耶穌，上帝成為我生命中的引導者，以前我用自己的方式拼事業，雖然賺了一點錢，但是錢又從其他地方溜走了，自從信靠耶穌，不但心中得到平安，面對公司營運的壓力，也能入睡，也得到上帝所賜的智慧來管理公司，而且更得到上帝實際的幫助，常常經歷因為禱告得以轉危為安，不論是金錢、訂單、人力…，上帝都一一供應，更棒的是—我整個人都快樂起來了！有了這些上帝與我同行的實在經歷，以致在面對死亡時，我一點不害怕，因為深知上帝與我同在，死亡是息了世上的勞苦，回到天家，與主同在，是美好無比，雖然我會捨不得家人及世上我關心的人事物，但是知道不久的將來，我的太太、所有孩子都要回到天家歡聚，將來又會在一起！我非常相信上帝不會隨便帶領我，祂所為我安排的都是最好的！希望你面對人生困頓及死亡時，也能有這樣的確信及把握、平安及喜樂！我只遺憾我太晚認識耶穌了！\n\n5. 施比受更為有福：以前，我的人生只有一個目標，就是賺錢、享樂，但是信了耶穌後，我學習到分享的人生是快樂的，我的幾個小孩都是從事助人工作，不是傳道人、師母、義工，就是做心理輔導，他們都不是很有錢，但是當他們一心想幫助別人時，他們都過得滿足、喜樂、有意義！今年4月1日是我60歲生日，那一天，我帶著疲憊虛弱、需要坐輪椅的身體，還有紅包、蛋糕，到每一個病房為其他病友打氣，鼓勵他們多活著一天就是賺到一天，要堅強、不要放棄希望！那一天，我好累，但是好喜樂。我希望我可以更有時間祝福別人，我也要祝福你生命中因著分享關懷、祝福別人而得到許多喜樂。如果你有興趣對一些弱勢家庭、孩子提供經濟上的幫助，讓他們有讀書的錢，你可以聯絡我在台灣的大女兒。她在孫越擔任終身義工的宇宙光關懷輔導中心工作，有許多這方面的資訊。\n\n謝謝你花時間讀完這封信，如果真的能對你有所提醒讓你過得更健康，我就滿足了，所以我送給你一本書『活得久、活得好』，這是我最衷心的祝福！最後，我要分享的人生最大的祝福—就是認識耶穌！耶穌不只是心理上的寄託，祂會成為你人生真實的引導及實際的幫助，聖經說：神的意念是賜平安的意念，不是降災禍的意念！所以這個信仰跟以前我拜拜的信仰最大不同是不會擔心如果我對上帝禮數不夠周到，會招來什麼麻煩，因為這位神是慈愛的神，希望你也可以來認識祂，如果你對這個信仰有興趣，可以看台灣電視台有個好消息頻道，在台灣是15台，或者你可以聯絡我的兒子，他也會幫助你，如果你對讀聖經有興趣，告訴我兒子，我會請他送你一本。\n\n最後，我要說再見了，不管我的生命是不是走到這裡，這句話早晚都要說，我很高興我是心情輕鬆的說，希望將來你也可以！最後，也要謝謝你們在過去這十多年的照顧、相挺，我銘記在心，也懇請大家繼續支持我的兒子，讓他在大陸也得到像我一樣珍貴的友情及幫助！謝謝大家，再見！\n\n邱鐘明 敬上\n96.04.07\n\n由於選擇了安寧療護，讓爸爸在最後階段不但不需忍受插管或各種急救的痛苦，在危急時，也不用送進加護病房與親人分開，最後這20多天的日子，我們24小時貼近爸爸，得以照顧他身、心、靈的需要，看著爸爸被照顧得很好，在睡夢中安詳離開，我們真的很感恩，也非常謝謝淡水馬偕安寧病房醫護團隊。" },
            { title: "安寧病房護士的回應", text: "護士的回應 1：\n即使佝僂的軀體拖動病人，在痛痛中，也持續不咳嗽，致力於牀人身及任何意見想法和忍受。痛苦，願見將生疏人心的請求，又痛見舒病床尾的迷失。每見躺於病人病情，將一個病室內的氣氛帶動，留有1道醫護平靜，不似一般人愉意而你的逆境，常生活所及望逝去，重別永遠，在所有人的人生最後階段，相見我看見了天堂。\n（離世，我看見了天堂。）\n\n護士的回應 2：\n我是大夜班的護理人員，謝忱。\n最近我跟班記得在在在等的時間，到我親切的孩子，他比起其它人感覺更動，在他的開朗，每人說再見到，再見的詩歌。\n看到他蹲乎拘謹的人，飛過殷怅快，總是面對著他，再帶著感受，愛的傷感，愛到孩子哭。\n還在他他家人愛聽得後好，喔覺很開心，更感得後越走向上帝。\n祝福他和回國更美好的未來。\n禮琴 2007.4.15.\n\n護士的回應 3：\n我是白班照顧邱伯伯的曉楨，\n照顧他的過程，\n感受到他對人的體貼，\n總是替人著想，\n當醫生面對他病情的變化，\n提到「要找到受苦的意義」時\n邱伯伯在旁脫口而出「要赦免！」。\n那時刻，\n我感受到信仰給他的力量，\n及伯伯面對生命的智慧。\n在照顧邱伯伯的過程，\n我也看到了全家人對他滿滿的愛，\n全家人的凝聚力圍繞著他，\n就如一群天使伴著他，\n讓病房充滿著愛的溫暖。" },
            { title: "修復家庭關係", text: "一天，在爸爸交代一些身後事該如何辦理的過程中，突然情詞迫切的叫起媽媽的名字來，接著出現了戲劇化的一幕，爸爸語帶哽咽的對媽媽說：「太太，以往我有很多對不起妳的地方，請妳原諒我！這個家還好有妳，才有今天！……」爸爸連日常生活都言語寡少，更別說什麼感謝、道歉的話，我們是從來沒聽過，媽媽表示很多年前爸爸被客戶灌醉送回家時，曾經說過一次謝謝太太。\n\n對孩子也是，不只一次向我們道歉，他很後悔沒有多關心我們，而且以前說：「要花錢，自己去賺」也是不對。每每提到對於沒能留下什麼遺產給我們，看到孩子須為基本的經濟需要而努力，總是會掉下眼淚。其實，當我們聽到爸爸表達出來時，就是他留給我們最好的遺產了。這段時間我們補足了很多以往對其他家人應該有的道歉、道謝。\n\n記得安寧病房的護理師告訴我們，當醫師問他說：「在這樣人生的苦難中，你認為人生的意義是什麼？」沒讀過多少書的爸爸不假思索緩緩道出：「要赦免！」令護理師當場落淚，她感動於爸爸雖剛信主，就對這個信仰的核心體會得如此精確，我們之所以能得到這個救恩，就是因著主的赦免，而爸爸在生命的最後階段真是學像耶穌，不但表示要原諒從前打擊他的人，也在自己深感歉疚之處，向神、向人認罪，並且謙卑的接受神及人的赦免！從那之後，爸爸常常當眾或私下表示對媽媽的感激或欣賞，我想，後來這2個多月爸爸愛的表達遠超過過去30多年的婚姻生活。或許這也是媽媽能坦然接受爸爸離世的原因之一，因為許多的糾葛情仇都因爸爸還在世時，真誠的道歉、感激而化解了！\n\n過去，家裡五個孩子都因父親的缺席，心靈留下許多缺口，覺得我們是不被重視、不被在乎的孩子，成長過程中都花了許多時間耗損在無法自我接納的挫折中，直到在天父的愛中才得以修復。所以我們非常感謝神將爸爸最後這一程留給我們陪伴，看起來，是我們付出時間、心力24小時看顧，但是在每一個孩子照顧他時，都不約而同聽到爸爸對自己的欣賞、叮嚀、感謝、道歉。這對等了30多年的我們，是何等大的祝福，終於等到爸爸回家；爸爸終於親自補上我們心中「爸爸」的位置！" },
            { title: "爸爸的祝福", text: "一粒麥子不落在地裡死了，仍舊是一粒。若是死了，就結出許多子粒來。\n～聖經約翰福音十二章24節～\n\n包括自己家人及很多親友，都非常惋惜爸爸這麼早離開，一方面他的為人深受大家欣賞；一方面他勞苦的一生終於走到寬闊之處、心中因重擔卸下而滿足喜樂。即便在病痛中，他仍非常滿意當時處境，他對弟弟說：「工廠交給上帝和你了，我好起來後也不管工廠了，我現在的事業是作上帝的工，我要作見證、幫上帝存錢蓋教會。」表面上會質疑上帝是不是開玩笑，16年後，當爸爸經過抵擋、極力反對到現在經歷主愛的真實奇妙，終於認識且全心跟隨他時，卻就這樣讓他走了？爸爸見證時常說：「16年前，我女兒跟我傳福音，我不信，現在我覺得我太慢信了。」在病榻上也常說：「要快點，快來不及幫上帝作工了！」\n\n從投資報酬率來看，神的算術似乎太差了，這16年來，上帝為了幫助爸爸，在爸爸身上動用許多的人力，正如聖經羅馬書5章7-8節說「惟有基督在我們還作罪人的時候為我們死，神的愛就在此向我們顯明了。」在爸爸還不認識祂、敵擋祂時，祂已定意愛了爸爸。但是爸爸甚至都未能替神做什麼就回天家了！\n\n當我們後來在家庭禮拜、感恩分享時，發現爸爸留下了許多祝福。原本分散各地的孩子因為爸爸而聚在一起，這段時間是兄弟姊妹最親近的時刻；媽媽以往的信仰總是半調子，但是從爸爸領受那麼多恩典及爸爸因倚靠神能在疾病中依然感恩、讚美，最後滿足安詳的走，不像很多病友深埋愁苦中，媽媽被神折服，到教會幾年後，終於清楚看到她對神認真起來了！\n\n幾個孩子也因為初信的爸爸比誰都認真全心愛主，因而激勵我們更多追求主，靈命更新。弟弟的成長更是明顯，雖一下子要學習當老闆，但爸爸對神的承諾激勵著他，為了傳承這項託付，他有了留在大陸的動力，跟以往勉強到大陸陪父母的心境完全不同，大家都看到，小弟真的長大了！全家人因爸爸的心願比以前有更深的凝聚力！\n\n很多來探望的朋友都表示被爸爸安穩在主裡、毫無保留回應上帝、以作主工為人生最主要目標而受激勵，加上他之前努力的留下見證及分享的錄影、文章，我想：\n\n爸爸的祝福還會繼續下去；\n爸爸想為上帝作的見證會繼續下去；\n爸爸想幫上帝蓋教會的心願也會繼續下去……" },
            { title: "附錄：孩子們給爸爸的信", text: "（大女婿給爸爸的一封信）\n\n親愛的爸爸：\n\n我們還是捨不得你離開了我們，但我深信你已經在一個好得無比的地方了。\n\n回想起這3個多月的過程，你是一位好漢，勇敢面對，不怕痛，有堅定的信心，溫柔良善。\n\n你對我們說的很多話都一一浮現在我的腦海裡。雖然你不在我們身邊，但你的影響會遠遠勝過你的預期。我記得有一個晚上你微笑對我說：「都這樣了，又好不起來，弄得大家都很忙」。我們知道你因著愧疚、因著病痛而有情緒，但你總不發在人的身上，自己承擔，處處為別人著想，不願麻煩別人，即便是自己家人。\n\n你的病情迅速惡化，但你不抱怨也不責備也沒有不甘，願意單單順服。在這麼不舒服的光景，你常常嘴裡掛著要為我的工作禱告。當我向你抒發面試挫折的心情，看起來好像很有把握卻又令人失望時，你對我說：「慢慢找，最慢找到是最好的」。你的沈穩及祝福對我猶如一劑強心針。\n\n爸爸，謝謝你這段時間給我很大的鼓勵及支持。我確信你一定為著我的工作偷偷跟上帝禱告，因為就在我找到工作的那一天，晚上你就安心的跟耶穌走了，我相信這份工作是你給我的祝福。謝謝你，我一定會好好的工作，為耶穌作美好的見證。\n\n啟強 敬上\n\n（二女兒給爸爸的一封信）\n\n親愛的爸爸：\n\n我是您的第二女兒，也是從小到大一直待在家裡的人。原本是想出去工作的，還是沒有機會，也不知道是好是壞，就這樣度過了20幾年。曾經許多人羨慕我可以在家裡上班，不用擔心沒工作、與同事不和等問題，所以，現在想想也有點幸福啦！謝謝您因為信主，越來越關心我們，也讓我看到了我有一位積極、勇敢、會寬恕別人的好爸爸，在您身上學到很多。我以您為榮！\n\n美蘭 敬上\n\n（三女兒、準女婿給爸爸的一封信）\n\n親愛的爸爸：\n\n第一次寫信給你喔！雖然我們不常在一起，又加上以前一些不愉快的記憶，所以在信主前，我真的不知道該怎麼愛你；但認識神以後，被神的愛充滿、安慰、醫治，所以爸爸這段時間生病，讓我們有機會更多的互動，使全家人更凝聚在一起，同心合一，感謝神這麼愛我們這個家喔！\n\n景祿感謝爸爸願意以愛、赦免、包容、接納我不堪的過去，感覺爸爸是個嚴肅且不愛說話的父親，在這段生病的過程，我看到爸爸是那麼願意為主做工、想為耶穌建立教會，神的愛引領你去到每間癌症病房傳福音，由衷敬佩你的精神。\n\n面對身體的疼痛與死亡的恐懼，爸爸相信惟有信靠主耶穌才能得著平安，將生命的主權交給主；交託所有的擔憂，最後卸了地上的勞苦安詳返回天家，這是何等的蒙福！爸爸一生在事業上不屈不撓、屢敗屢戰的精神，在家庭親情上內心充滿關心與愛，只是沒有明確用言語表達出來，但是慈愛永遠在你的臉上。\n\n爸爸在天家與主同在好得無比！相信爸爸您正用笑臉看著我們，為在地上的這群兒女們祝福、禱告……您是我的榜樣！我愛您……\n\n景祿、美惠 敬上\n\n（四女兒、女婿給爸爸的一封信）\n\n親愛的父親：\n\n記憶中，我們小的時候您常因工作的緣故，以至於沒有辦法常常陪伴我們，而您也不善於表達對我們的關心與愛。但我心裡明白，您默默的付出是要讓我們有一個溫暖的家。\n\n在二十歲時，雖因信仰的關係有一些的衝突，但每當我想起您的時候，我就是常常藉著禱告來為您守望。感謝神，聽了我的禱告，讓我們父女間的關係可以慢慢的修復。特別感謝您，在我和宗彥的婚禮當中，縱使您還不認識我們的信仰，但是您因為愛我的緣故，願意放下自己的成見，第一次踏進教會來為我們的婚姻祝福。\n\n感謝天父，讓我們能夠在您生病的最後這3個多月中來陪伴您，讓我們有機會來服事您。當我們在您感到很不舒服、信心軟弱的時候，您常常要我們為您禱告、唱詩歌，也常常在我們一起禱告的時候，天父的愛和恩典就臨到我們當中。\n\n在這樣的過程中，我們看見爸爸您留下了許多珍貴的遺產給我們，就是靠著天父勇敢面對疾病，勇敢的面對過去，並且憑著信心盡力為主傳揚福音。謝謝您透過您的生活，教導我們做人處事的道理：不佔人便宜、不虧待人，且要腳踏實、殷勤的做每一件事。\n\n最後，我們要再一次向您說聲：爸爸！我們永遠愛您。\n\n宗彥、瑞分、主行 敬上\n\n（小兒子給爸爸的一封信）\n\n親愛的爸爸：\n\n從小不太認識您，「爸爸」這兩個字是代表陌生、威嚴、不可親近；總覺得您好像不在身邊一樣，知道您很辛苦為家計打拚著，但好像無法去體會您的心，隨著年紀的增長，才能了解您在巨大現實的社會壓力之下的身影有多不容易。\n\n爸爸，謝謝您一直用您的方式來愛我，不管我可不可以體會，您總是默默地去做，不張揚自己、努力踏實、一步一腳印去做。尤其在大陸陪伴您的最後一年的日子，您用您最真實的生活來教導我認識您的生活哲學，您的每一滴汗、每一滴淚，代表您忠厚踏實的個性、堅強堅毅的性格、不向環境低頭、努力不認輸的拚勁、吃虧就是佔便宜、吃苦就是吃補的老實生意哲學，讓我體認到不同於一般的社會想法，改變我許多的人生觀，您的想法到哪裡，就身體力行到哪裡的執行精神，更是不容易。\n\n您或許也有許多的缺點，但經過上帝巧妙的安排、奇妙的更新，我看到不同於以前的新的您，您變成一個可以親近的朋友，變成一個很會付出的天使，多少次您的身影鼓勵了我的灰心、沒有自信或是對付我驕傲年輕的心；在大陸陪伴您的日子，我特別感到珍惜、珍貴，同時我看到您對家人滿滿的關愛，是以往未曾發現的，您也一直在背後默默付出愛來教導我謙卑的功課。\n\n對不起，爸爸，我學得很慢，一直讓您擔心，謝謝您「不怕慢，只怕站」的教導，使我在不斷的挫折當中學好我該學的功課，因有您陪著，覺得很安慰，您對生命的執著，對工作的認真，對人謙卑的態度，是我最好的學習榜樣；您對信仰的堅持和信心，更是給我最大的遺產。真的在您身上看到單純熱情的信心，堅持不懈的努力，實際行動的決心，每一項都激勵我，不可放慢自己的腳步，好好跟上，不要懈怠。\n\n您在生病當中，堅忍旺盛的生命力，更是我不知道要花多少代價才可以領悟的寶貝，我知道您很痛，痛到落淚，可是和您一起靠著上帝的恩典憐憫，勝過病痛的經驗，是我對神最真實的經歷，您隨時隨地感恩滿足的心，也是我很好的典範，您用生命帶給我的成長，是那樣的真實，和您在一起的日子真好，真的很捨不得您，不過我願意順服神這樣的安排，同樣我知道您現在已經與神同在，息了地上所有的勞苦，在天上的家等著我們回去相聚，請您為建豪禱告，繼續做您未完成的工作，直到我學好所有該學的功課，才回去和您團聚，爸爸，再見。\n\n建豪 敬上" },
            { title: "許多的感謝", text: "要謝謝上帝……\n\n是慈愛的阿爸天父親自吸引爸爸歸向祂，我們才能與爸爸有如此美好的時光，爸爸也才有機會知道他有這麼愛他的太太跟孩子，讓他帶著滿滿的愛回天家！\n\n要謝謝爸爸……\n\n謝謝爸爸留下要我幫他寫見證的心願。我是爸爸的大女兒，一向被他視為最聰明，也最不聽話。在他離世的前幾天，他總是滿足、高興的指著我對別人說：「她是老大，她幫我了做了一本書！」其實我只是將他的見證貼在一本書上，並將每一本拿給他親自簽名。看到他因而感到很有成就感，我真的想在他生前幫他完成見證集，讓他真正擁有自己的書，且可以讓他作見證。沒想到上帝的時間比我快……\n\n我知道，當他看到我幫他完成這個見證集，他會欣慰的說：「總算聽話了！」\n\n要謝謝大家……\n\n其實，在這些過程中，我們都是很脆弱、疲憊、有壓力的。但大家總是在我們需要時就出現了！謝謝大家的關心、探訪，我們知道您每次來看爸爸，總要坐捷運一個小時左右，中南部上來的親友，辛苦更是不在話下，付出的是寶貴的愛心、時間、金錢，但也因著大家的付出，爸爸及我們的心都暖洋洋的，讓我們感到不孤單！願上帝親自記念您的擺上，並供應您一切所需！\n\n大家再見，希望我們天上再相見！" }

            { title: "第一章：望族之後", text: "阿金的爺爺蔡井是台南六甲一帶有錢的地主，也是保正，具有維持地方治安的權力，算得上是有錢有勢的望族。阿金的爸爸蔡強得因著富裕家庭環境，能夠接受教育，在當時普遍貧窮的情況下，念到高校畢業。不低的學歷加上家世背景，讓他得以在水利會擔任公職。\n\n蔡強得，高挑身材、溫文儒雅、脾氣好、學歷好、家世好，跟一般務農背景的農家人比起來，簡直是上上之選，許多門當戶對的望族自然少不了多加打聽。\n\n今天媒人婆黃大娘又上門了。\n\n「蔡老爺子，今天我給您介紹的這一家的姑娘，您一定滿意！」\n「妳倒說說是哪家姑娘？」蔡老爺子說。\n「隔壁村擁有好幾十甲土地的黃盛黃老爺子家，他們家二女兒黃茹，不僅長得標緻，刺繡活特別好，有才情，個性還特別溫柔。」黃大娘口沫橫飛的說著。\n「聽起來，是挺不錯的，女人首重是賢淑呀！」蔡老爺看起來頗為滿意。\n「這麼好條件才敢上你們家來提親呀！誰叫你們家強得少爺條件這麼優秀！」\n「好說，好說！」黃大娘的恭維讓蔡老爺笑了個開懷！\n\n於是，一樁門當戶對的婚姻就這麼成了。\n\n雖然是媒妁之言，溫文儒雅的蔡強得跟性情溫和的黃茹相當合拍，兩人非常恩愛，加上第一胎就生了個男生，蔡老爺子高興得不得了，黃茹在蔡家備受疼愛。就算裹小腳的黃茹作不了太多家務事、沒唸過書，在一個富裕的家庭，那都是微乎其微的缺點了。\n\n人丁興旺是蔡老爺子的心願，也是那個時代的普世價值，黃茹就這樣一個接一個的生了下去，老大、老三、老六是男的，其他都是女的，一直生到第十個。原以為日子會這樣一直過下去，直到......\n\n在黃茹努力替蔡家傳宗接代的過程中，蔡家經歷了「分家」！\n\n蔡老爺除了蔡強德這個兒子以外，另外還有四個兒子。在蔡老爺七十大壽之後，下面三個兒子吵著要分家產，因為他們不滿蔡強德在大家庭經濟的貢獻上實在不大。\n\n「阿爸，大哥身體不好，有胃病，所以作文員也是適合他，反正他也不會做農活，是不是將田地交給我們管理？」蔡家老二首先發難。\n「你們好大膽子，這樣不是明著欺負你們大哥？」蔡家老爺不悅的說道。\n「阿爸。這怎麼是欺負呢？」老三幫著老大講話。\n「這就是欺負，你大哥一個月文員才賺多少錢？土地遇著豐收，勝過他好幾年收入，這不是欺負嗎？」老爺子可不想放任兒子們胡來。\n「阿爸，大哥從來沒有在農事上分擔過我們的責任和工作，將來您不在了以後，豈不是要我們要照顧大哥那一大家子？」老二說。\n「你是咒我早死是不是？」\n「阿爸，您怎麼那麼生氣呢！」這時，蔡強德下班回家，看見爸爸生氣，連忙瞭解情況。\n「大哥，這事就是為了你」老三說。\n「別亂說！」老爺子這肝火動得不小。\n「什麼事情為了我？」蔡強德不明就裡的問。\n「我還活著，這事我作主！強得，你的弟弟們要求管理所有的土地，這不就是要我分家嗎？雖然你因著身體不能做農活，但你是長子，我是絕不可能讓你弟弟們拿走所有土地。」老爺子說。\n「阿爸，您別生氣，身體要緊！我本來就不能做農，對管理農地我也真是不擅長，這些年，多虧了弟弟們對家裡的付出，我也是心存感謝，加上我家孩子雖多，但是目前只有三個男孩，年紀都還小，實在貢獻有限！」蔡強德一貫謙和的態度正是蔡老爺子疼愛的原因。\n「爸，大哥自己都說了，您就把我們該得的分給我們吧！」老二說。\n「好了，你們都別說了，我還在呢!手心手背都是肉，家裡土地我會平分給你們，你大哥不會做農，他可以請工人作，用不著你們擔心。全都出去，讓我靜一靜！」\n\n蔡老爺子當然不願意看到兄弟分家，但他知道既然幾個兄弟已經對老大不滿，勉強在一起，表面的和諧只能維持到他離世之前，倒不如趁他還在的時候，多幫幫老大。\n\n於是，蔡大家族就這樣分家了。這是阿金五歲時發生的事，在她還搞不清楚發生什麼事時，最後一個妹妹蔡秀鳳剛出生時，家道就開始走向中落。" },
            { title: "第二章 發揮銷售長才的童年", text: "蔡老爺子為了幫疼愛但不擅農事的老大，把家產的一部份土地和能幹長工阿財一起給了蔡強德。老爺子的如意算盤是長工能幫蔡強德把管理土地這事打好基礎，以後只要能找到好工人，就能靠土地繼續過上富裕日子。\n\n蔡強德感謝爸爸的疼惜，努力兼顧工作和農事管理，妻子因不斷懷孕、生產，身體虛弱，常需要臥床休息。大家都羨慕嫁入蔡家的黃茹命真好，殊不知黃茹是有苦難言，她也想幫丈夫多分擔一點，無奈力不從心。蔡強德看著身子贏弱的太太加上還有十二個孩子要養，他沒有退卻的理由。\n\n有家裡長工阿財的幫忙，蔡強德還可以兼顧水利會和農事管理，家中三個女兒也都到田裡幫忙。一開始，家裡仍像以前一樣，女兒們都懂事、孝順，盡心盡力幫忙家裡。蔡強德和太太感到安慰，雖然辛苦，但對未來充滿希望。\n\n但是，人算不如天算，蔡強德依賴的阿財作不到一年竟因太勞累而中風。雖然仍有聘請其他工人，但總不如阿財又能幹、又勤奮，還能幫忙管理其他工人。蔡強德只能花更多心力在農事上。但令人安慰的是，雖然辛苦了點，他提供給妻兒的生活仍是比一般人好很多，至少是衣食無虞的生活。\n\n五歲之前的阿金生長在蔡大家族，堂兄弟姊妹一起玩耍，其樂融融。但分家之後，一切都不再一樣了。重男輕女的時代，大哥、二哥、三哥可以在學校繼續唸書，但是疼愛她的大姊、二姊、三姊到田裡幫忙的時間越來越長。每天晚上，阿金想找姊姊們玩的時候，姊姊們總說太累了，沒力氣玩了。\n\n「我要大姊陪我玩」阿金哭鬧著要從小常背著她、哄他睡覺的大姊陪。\n「阿金乖，大姊從田裡回來很累了，四姊陪你玩好不好？」\n「我不要，我不要，我就要大姊！」\n「是誰在吵呀？」爸爸剛下班就聽見阿金的哭鬧聲。\n「阿爸，我要大姊陪，大姊太累了，不要陪我！」\n「阿金，妳要聽話，大姊在田裡工作一天，一點力氣都沒有了，不能陪阿金玩了。」重覆的話聽了幾遍，小小阿金終於聽進去了，也安靜下來了。\n「阿爸，我以後不要到田裡工作，太累了！」阿金天真的說。\n「好好好，阿金不要到田裡工作！」\n「不可以，大家都要到田裡幫忙，不然，大姊、二姊、三姊太累了。」四姊抗議道。\n\n阿金的童言童語蔡強得沒有放在心上，此刻，他只想將一家大小安頓好，讓大家早點休息。\n\n阿金更大一點時，也是需要到田裡幫忙，只是姊姊們疼她，總是讓阿金作輕鬆的事。但就算再輕鬆，田裡的環境對小阿金來說不是一個舒服的地方，有時，陽光實在太強，姊姊們只好在田埂邊用稻草搭一個小小空間讓阿金躲在裡面，免受烈陽荼毒。雖不用被太陽曬，躲在那個小空間，讓充滿活力的阿金悶壞了。但總比曬太陽好。在田裡的生活讓阿金開始想，她真討厭下田工作，如果不到田裡幫忙，還可以怎麼幫忙家裡。\n\n媽媽裹小腳，所以不能到田裡幫忙，可以作的事就是在清晨幫忙整理菜，讓家裡長工阿霞帶去早市賣。全家人團結一心，一起為家裡打拼。\n\n轉眼間，阿金到了進小學的年紀了。爸爸不忍心老十也像姊姊們一樣為了幫忙家裡沒唸書，決定讓阿金受教育。\n\n要上學的第一天，阿金好興奮，早早穿戴整齊等著上學。\n\n「阿金，妳第一天上學，阿母讓阿霞帶你去學校，但是，你要先和她去早市把菜賣完，她再帶你去學校。」\n「阿母，我知道了！」興奮要上學的阿金很快答應著。\n\n「來喔、來喔，新鮮的菜喔！」阿霞到了早市，很快吆喝起來。\n「來喔、來喔，新鮮的菜喔！」阿金看著有趣，也跟著吆喝起來。\n\n有小孩子的叫賣，吸引了更多人，這一天菜很快賣完。\n\n「阿金，菜這麼快賣完，都是妳的功勞。」阿霞說。\n「為什麼呢？」阿金不解的問。\n「人家看妳學著賣菜，很可愛，都願意跟妳買呢！我們快去上學吧！」\n\n阿金沒有多想，終於要到新學校的興奮充滿她的心。\n\n過了幾天，要上學的時間到了，阿金喊著要跟阿霞一起出門。未料，阿霞說：「阿金，今天我不能去賣菜了，因為我的腳受傷了，不能陪妳上學了。」\n「我可以自己去賣菜！」七歲的阿金自告奮勇的說。\n「妳要怎麼賣呀？」爸爸問。\n「我可以上學前把家裡的青菜帶去早市賣，然後再去上學。」\n「妳可以嗎？」阿母問。\n「我可以的！我看過阿霞賣菜。我真的會。」阿爸見她這樣堅持，只好答應讓她去試試看。\n\n「這是今天早上現採的青菜，很新鮮喔！」阿金一到早市，就扯開喉嚨大聲喊著。\n「哇，這麼小的孩子自己來賣菜，真乖！來，我買一把。」\n「謝謝阿姨，這樣我可以快點去學校，我算你便宜一點。」阿金開心的說。\n「哇，這麼會做生意，我也來一把！」\n\n憑藉著甜美可愛的外表，阿金很快賣完菜，可以來得及上第一堂課。\n\n放學後，阿金興奮的帶著早上賺的錢回家，一進門就大聲喊：「阿母，這是我今天賣菜的錢。」\n「這麼厲害，會害怕嗎？」阿母驚喜的問。\n「不會怕，感覺很好玩。」\n「阿金，你今天第一天去賣菜，有賣完嗎？」阿爸回來第一個問阿金。\n「有喔，我很快賣完。」\n「為什麼妳可以快賣完？」\n「我和阿姨、阿伯聊天，他們都很高興，如果很有禮貌，就有更多人來買。」\n「喔，看起來，妳很會做生意喔！」阿爸稱讚阿金。\n「阿金，你好厲害喔，我都不敢自己去賣菜，你真勇敢！」五姊稱讚阿金。\n「阿爸，阿金會賣菜賺錢，就不用像我們到田裡作得那麼辛苦。」大姊說。\n「阿爸，我要賺更多錢給你，我不要去田裡工作」阿金說。\n\n蔡強得怎麼覺得這話聽得感覺似曾相識，老四講話了。\n「阿爸，阿金小時候曾說過她不要去田裡工作，沒想到她還記得。」\n「真的嗎？我小時候就說我不要去田裡工作呀？」阿金問。\n「是啊，妳說田裡工作太辛苦，妳不要像大姊、二姊、三姊那麼辛苦。」大姊回答。\n「如果賣東西可以賺錢，我就可以不用去田裡工作了。」阿金這樣想著。" },
            { title: "第三章 走出一條與家裡姊姊不一樣的路", text: "唸完初中，對唸書沒興趣的阿金，決定不再升學。也不想到田裡幫忙的她跟著鄰居學作衣服。鄰居說只要勤快點，手工仔細，收入也不錯。沒想到，需要仔細、謹慎的功夫，阿金作起來挫折連連，她覺得要一直很小心，好累喔！也不好玩，一坐就是一整天，不是畫衣版，就是踩縫紉車；覺得悶時，跟同事聊個天，很容易就出錯。煩啊！實在不愛，就跑掉了。\n\n反倒是小五歲的妹妹秀鳳，聰明、謹慎、認真、仔細，後來將做衣服這門手藝學得很好，退休前有20年時間被服裝公司派往菲律賓當主管20年呢！\n\n接著，阿金找到一個戲院售票員的工作，每天也可以跟著看電影，阿金開心極了。不過這電影看久了也沒意思，兩個月過去了，開始覺得這生活有點無聊。\n\n「阿金，有妳的電話喔！」\n「喔，來囉！」\n「阿金呀，妳阿母倒下去了，已經送到醫院了，妳趕快請假到郭綜合。」阿霞在電話那頭著急的喊著。\n「阿霞，媽媽怎麼會倒下？」阿金的心臟都要快要停住了。\n「我也不知道，我發現的時候，夫人已經倒在床邊的地板上了，我就趕緊通知老爺，現在已經送到醫院了。」\n「好，我知道了，我現在過去。」\n\n阿金趕到醫院，看到憂心忡忡的阿爸。連忙問：「阿爸，阿母現在怎麼了？」\n「醫生說妳阿母中風了！現在要送大醫院開刀。」阿爸沮喪的說。\n「怎麼會這樣？今天早上還是好好的。」阿金沒有辦法接受。\n\n經過了緊急搶救，媽媽的中風情況控制下來了。醫生說還好送醫的早，否則情況會更糟。接下來只要好好照顧，多吃營養的東西，應該可以恢復得不錯。阿金那一顆揪著的心總算稍稍鬆開一些了。\n\n一天，上班前，經過市場，看到鮮紅的蘋果，阿金想買給阿母吃，但是看到那價錢，實在買不下手。只好不甘願的去上班。\n\n「阿金，妳的臉怎麼臭臭的？」清潔工阿莉問。\n「早上。我想給我阿母買顆蘋果，但是實在太貴了。」\n「妳實在很有孝心。」阿莉說。\n「只有孝心有什麼用？有錢才能買營養的東西給阿母。」阿金說。\n「妳想不想賺外快？」阿莉問。\n「想啊，妳有辦法嗎？」阿金問。\n「剛好有個機會，我有個親戚，是美容保養品大盤商，正在找中盤商。意思就是說看妳要不要去批化粧品來賣，只要賣出去，馬上就有現金。」\n「我想賣賣看，可是我現在沒有很多現金。」\n「我也是沒有現金，不敢賣，也怕賣不出去。」阿莉說。\n「阿莉，妳可不可以幫我問問看妳親戚願不願意先給我一瓶試用品，我先找客人試用，如果有人喜歡，我先收訂金，我就有錢進貨了。」阿金滿懷期待的問。\n「看在妳孝心的份上，我幫妳問問看。」\n「阿莉，真的很謝謝妳。」\n\n沒想到，阿金的請託被接受了。在沒有本錢的情況下，阿金做起了保養品的生意。因著戲院位處菜市場中，除了來看戲的觀眾，逛菜市場的婆婆媽媽都是她的潛在客戶。更沒想到，阿金的誠意、勤勞讓她的保養品生意越作越好，收入竟比售票員薪水還要高。想要買給媽媽吃的蘋果，早就不是問題，阿金覺得有錢真好。\n\n阿金的銷售策略是主動出擊！除了等候老顧客及戲院觀眾來跟她買，她更利用下班及休假時間，到處去賣，隨處都可以跟人推銷，可謂是推銷即生活；生活即推銷。因此，她的顧客群不斷不斷的增加中。\n\n一天，阿金在外面推銷累了，回家在客廳椅子上就睡著了。阿爸回家見狀，叫醒她：「阿金，阿金，怎麼在這裡睡？」\n「喔，阿爸，是你喔！我今天跑客戶，太累了！」睡眼惺忪的阿金昏昏沈沈的回答著。\n「妳這樣作兩項工作，不會太累嗎？身體要顧。」\n「我知道啦，我會注意！有錢賺一定要去賺啊」阿金有點清醒了。\n「哈哈，看起來，妳這個名我真給妳取對了！」\n「怎麼說？」阿金不解的問。\n「當初算命師要讓我選名字時，淑金就是第一個名，我一聽就中意了。希望這個金字帶給妳多金、富貴，當然，也希望將來你是一個賢淑的妻子。」阿爸娓娓道來。\n「原來我的名是這樣來的，阿爸，我如果可以賺到很多錢，都要多謝你的祝福了。」阿金高興的說。\n「希望如此！妳趕快去睡了。」\n「好，我知！」\n\n這一天，她經過一家美容院時，突發奇想：或許可以跟美容師合作，他們幫人家化妝，是最直接可以跟顧客推銷保養品的人。阿金想的是她可以給美容師抽成，讓他們幫她賣保養品。想著想著就走進去了。\n\n「妳好，要化妝，還是要作保養？」店裡美容師招呼著。\n「妳好，我叫蔡淑金，我是賣保養品的。」阿金自我介紹著。\n「喔，不用啦，我們已經用很多了，不用介紹了！」美容師顯然想把阿金打發走。\n「看妳的皮膚這麼好，保養品一定很勤勞使用。」阿金努力找著話題。\n「妳真的有內行，我是照三餐擦，大家都笑我浪費，妳看，值得嗎？」美容師開始聊起來。\n「當然值得呀！妳這樣就是最好的口碑，如果來賣我這一組保養品，一定賺很多。」\n「喔，妳是要叫我幫妳賣，不是要叫我買喔！」\n「對啦、對啦，我這一組賣得很好，有錢大家一起賺啦！」\n「那妳拿出來我用用看」美容師終於心動了。\n「好好，沒問題，我這一罐送妳，我對妳有信心，我也對我的產品有信心，我們一定會合作愉快的。還是那句話，有錢大家一起賺啦！請問，要怎樣稱呼您呢？」阿金問。\n「叫我莉美就好了！」\n\n這就樣，莉美成為阿金的客戶，阿金更答應莉美，如果她可以幫忙找到別的美容師幫忙賣，可以讓莉美抽成。阿金也跟莉美越來越熟，變成好朋友。\n\n有一天，阿金到莉美那收貨款時，莉美正在幫客人化妝，要阿金等一下。阿金看著看著，覺得化妝真有意思，怎麼就可以讓一張平凡的臉變得那麼漂亮！\n\n「阿金，妳在看什麼？看得那麼專心？」莉美問。\n「化妝好像變魔術，把人變得好漂亮耶。」阿金打從心裡讚嘆的說。\n「妳有興趣作美容嗎？我最近剛好想要收徒弟。」莉美問。\n「真的嗎？我可以嗎？」阿金驚喜的問。\n「看妳是不是真的有興趣啦！」\n「有啦，我有啦！」阿金興奮的說。\n\n當家裡姊姊們在田裡幹活時，阿金開始了每天打扮光鮮亮麗的美容師生活。" },
            { title: "第四章 阿金美容師的愛情", text: "學會化妝之後，阿金真的活出她的名字一般的樣貌：閃閃發亮！除了每天光鮮亮麗穿著以外，她的能言善道、開朗、美麗更是讓人無法忽視，彷彿就是一位天生的美容師。不到三年的時間，她進入當時一家很大的化粧品公司，受過公司完整訓練之後，被派到高雄一家店當櫃姐。在高雄發展的阿金，美容及銷售專業的知識、技巧，都更上一層樓，包括她的存款。\n\n孝順的她常給父母買昂貴水果、營養品，還有穿起來透氣又舒服的高級服飾。左鄰右舍都說：生到阿金這個女兒是最值得的。阿金覺得有錢真好，可以孝順父母，讓父母享福，她也替自己感到驕傲。阿金的業績常是全國前三名，光憑著年終積分，她得到彩色電視、冰箱等許多家電、甚至曾得到一輛摩托車、公司招待的免費出國旅遊更是家常便飯。阿金覺得這樣的生活真是美極了。她非常謝謝爸爸當年的祝福，更感到自己就是閃閃發亮的一塊精金。\n\n能夠賺到錢，又能發揮自己專長的美容師工作讓阿金越來越有自信，越來越漂亮，自然吸引一大堆蒼蠅整天在身旁飛呀飛。阿金是站櫃的美容師，和氣生財，沒有理由趕人家走。更何況，為了討阿金歡欣，這些蒼蠅常常讓她的業績很漂亮呢！但是，面對愛情，聰明的阿金並沒有被這些金錢沖昏了頭。爸爸的溫文儒雅、正直人品、疼愛妻子才是阿金選擇對象的範本，所以不管對方的條件多麼優渥，態度輕浮、不行！花名在外，直接出局！富家子弟、不事生產，讓人沒有安全感，再見！\n\n高標準的原則下，25歲的阿金還沒結婚，追求者眾，但沒有固定男朋友。周遭親友急了，想當年，阿金的媽媽25歲時，都生三個了。其實阿金也知道要著急了，但是生性自由的她不願意為了結婚而結婚，她一直都是非常有主見的女孩，從她五歲起就決定不要到田裡工作，也不願意為了錢，嫁給大戶人家，看婆家人臉色。面對婚姻，她仍要當自己的主人。\n\n「阿金，妳有沒有發現同一條街上慶龍布行的學徒，最近常往我們這邊走！」老闆娘說。\n「有嗎？沒注意到！」阿金一邊整理化粧品、一邊漫不經心的說著。\n「說人人到，來了，來了，就是那一個膚色有點黑，看起來有點兒害羞的那一個，最近常常在我們店前面，晃過來晃過去。」老闆娘說。\n\n阿金特地朝店門口看了過去，不小心跟「那個人」對上了眼，只見「那個人」害羞的低了頭，快速離開。老闆娘說：「我看，八成是要來追妳的。不過，這樣不行啦，有夠膽小！」阿金雖然笑而不答，但是留下了深刻印象，因為「那個人」跟之前的公子哥兒們都不一樣。\n\n有一天，「那個人」終於走進店裡。阿金大方招呼他：「你好，請問要點什麼？」，只見「那個人」拿出一千塊，頭低低的、小聲的說：「我要買乳液。」\n「請問是什麼年紀要擦的？」阿金問。\n「都可以！」\n「都可以？先生，這樣我很難跟你介紹耶！乳液有很多種類，最好依照需要性來使用。」阿金耐心說明。\n「那我下次再來買。」說完「那個人」就走了。留下滿是問號的阿金和「那個人」帶來的一千塊。\n\n當阿金將這情況報告給老闆娘，老闆娘笑個半天，並說道：「他哪是來買什麼乳液，他是來追女朋友的，不過，這麼沒膽，娶不到老婆啦。這個不好，不要考慮。」阿金這時說話了：「不會呀，我覺得老實沒什麼不好，老實不會亂來，還會疼老婆。」\n「妳真的有喜歡喔！」老闆娘問。\n「談不上喜不喜歡啦，只是聽多了我們客人婚姻的情況，老公不老實，最後都是別人的。所以老實也沒什麼不好。這一千塊怎麼辦？」阿金問。\n「要追女朋友要大膽一點，等他自己來拿啦！」老闆娘說。\n\n過了兩天，「那個人」還是沒有來拿，因為就在同一條街上，阿金決定利用午休時間送過去給他。\n\n「請問有人在嗎？」阿金朝慶龍步行店裡問。「那個人」從店裡後面房間走了出來，看見是阿金，臉馬上紅了起來。「嗯... 嗯..那個..那個，妳要買布嗎？我可以算便宜一點。」「那個人」說。\n「鍾明啊，是誰進來了呀？」布行老闆從裡面走了出來，看見阿金，就說：「是阿金呀，今天怎麼有空過來？要剪布料嗎？」\n\n原來他叫鍾明啊，阿金心想並笑笑說：「老闆，你好，抱歉，吵到你休息了。我是來還一千塊的。」老闆說：「你沒有欠我錢啊！」\n「一千塊是我的。」阿明急忙說。\n「阿金什麼時候跟你借一千塊了？」老闆問\n「沒啦！他沒跟我借錢啦。」阿明澄清著。\n「沒借錢，為什麼要還錢？」老闆問。\n「阿...就那個.....嗯....」阿明吞吞吐吐得說不出來。\n「看你平常做生意很能講，怎麼今天看到漂亮姑娘講不出話來。」老闆笑他。\n\n阿金想幫阿明解圍，便說明情況。\n\n「買乳液？阿明，你買這乳液要作什麼？你阿母和你兩個姊妹都是做農耶，沒有人在擦乳液，你要買給誰用？難道，你交女朋友了？」老闆問。\n「沒啦、沒啦，我要買給我以後的女朋友用啦！」阿明又是急忙澄清。\n「原來是買給以後的女朋友用，難怪不知道要買哪一種。」阿金說。\n「你很無聊耶，等交到才買啦，阿金，抱歉啦，不要理他，神經病。」老闆罵了阿明。\n「沒關係，這一千塊還你，等你交到女朋友，再帶過來買乳液。」阿金說完，把錢還給阿明，便往店門口走。\n「我真的沒有女朋友啦！」阿明大聲喊。\n「我聽到了！」阿金忍不住的笑了走回自己店裡。\n\n有了這一次接觸，阿明膽子漸漸大了起來，常往阿金店裡跑，最常作的事是客人較少時，賴在阿金店裡跟老闆娘、阿金一起看連續劇。俗話說：戲棚下，站久就是你的。阿明就靠這一招死皮賴臉娶到了阿金當老婆。\n\n除了老實，阿金到底喜歡阿明哪些地方呢？" },
            { title: "第五章 從美容師到布行老闆娘", text: "阿明，全名叫邱鐘明，是來自嘉義布袋鄉下的窮小子。家裡都是做農的，他不喜歡當農夫，想學做生意，想當老闆賺大錢。所以投靠開布行的姊夫，有點經驗後，隻身一人來到高雄要打天下。阿金漸漸瞭解阿明後，覺得阿明跟自己很像，雖然是老實，但是胸有大志；雖有抱負，卻也是腳踏實地。\n\n阿明更多認識阿金後，發現她雖然漂亮，但是仍然樸實，沒有被大都市的紙醉金迷給污染了，特別是漂亮的美容師常嫁給富少爺或者當人家小老婆，仍保有純真善良的阿金真是相當難得，阿明更加喜歡了。他更發現阿金優秀的交際能力是他所缺乏的，對於想開店當老板的他看阿金無疑是最佳老闆娘人選。出於擔心阿金會被搶走，終於有一天鼓起勇氣約阿金去愛河散步。\n\n「阿金，我以後想在高雄開一間布行。」阿明說。\n「我知道呀，你說過好幾遍了。」阿金說。\n「你想不想跟我一起開店？」阿明問。\n「你要我投資喔？」阿金問。\n「對啦.....不對啦....我的意思是....」阿明有點急了。\n「是什麼？」\n「我想讓你當老闆娘啦！」阿明講出這一句，終於鬆了一口氣。\n\n阿金當然知道他的意思，她接著說：「讓我當老闆娘，錢都歸我管嗎？」\n「當然都歸你管！」阿明堅定大聲的回答。\n「那如果將來賺到了錢，你會不會在外面亂來？」阿金問。\n「不可能有那種事，我一定只愛你一個。」阿明堅定大聲的回答。\n「我有說我要讓你愛嗎？」阿金笑著說。\n「你不要喔？」阿明緊張的說。\n「不要什麼？」阿金逗著阿明。\n「你不想要答應嫁給我喔？」阿明緊張的說。\n「你又還沒求婚，我要怎麼答應？」阿金有點害羞了。\n「抱歉，抱歉，第一次，所以沒經驗！」阿明緊張的說。\n「第一次，你打算要幾次呀？」阿金逗著阿明。\n「沒啦，我不敢啦！我一定只愛你一個人，疼惜你，也不多管你，讓妳自由自在，像現在一樣。」阿明誠懇的說著。\n\n阿金聽到阿明的承諾竟然是可以讓她自由自在，像現在一樣，表示她可以繼續賺錢，孝順父母，不像以前很多人會限制她結婚後希望她留家裡。如果跟阿明結婚，阿金覺得婚姻也是她可以自主的，於是她歡歡喜喜的成為邱太太。雖然阿明沒有錢，但是在這個婚姻中可以有自主權，兩人又有要一起賺錢的目標，憑藉過去的經驗，阿金覺得一定可以累積財富的。她對未來充滿樂觀。\n\n結婚後，兩人很快在高雄前鎮銀座街租房開了一間布行，店門口則是阿金的美容專櫃。每天早上，阿明總是勤勞的載著滿滿的布料去到不同的菜市場擺攤賣布，阿金則顧著店，兼作美容師。以前當櫃姐是領薪水和獎金，現在當老闆娘，除了薪水、獎金照領，還有利潤所得。兩夫妻勤奮的賺錢，三年後，就買了第一間房。\n\n阿金覺得她的人生越來越閃亮了！\n\n婚後，阿明果然像他承諾阿金的一樣，給她很大自由度，而且因為做生意忙，阿明媽媽還來幫忙帶孩子、作家務。但是生活卻不如阿金期待的順風順水，家裡的爭吵開始頻繁起來。" },
            { title: "第六章 事與願違的婚姻生活", text: "開店做生意，一開了門，人就要守在店裡，連到銀行趕三點半，都要請鄰居瞄一下店，匆匆來回。除了生意繁忙，阿金人總是不太方便，因為她不是懷孕生產、坐月子、就是準備懷孕中。由於婆婆堅持要生一個男生，以致於繁忙生活中，生了三個女兒的阿金仍不能停歇，婚後第六年，第四個孩子又懷上了。\n\n阿明老實、勤勞、腳踏實地，卻有一個致命的嗜好：喜歡下棋、打牌。夫妻倆常因此吵架。如果是下棋，還好一點，因為阿明會邀鄰居在店裡下棋，還看得到人。如果是打牌，常常一出去好幾個鐘頭不見人影，阿金要顧店沒辦法跑，只好常要大女兒到打牌地方叫爸爸回家，但是阿明只會給孩子一些分紅，打發孩子回家。\n\n「你不要太超過喔！」阿金對著半夜一點才進家門的丈夫大吼！\n「我哪個又不玩大錢，有什麼關係？」阿明為自己辯解著\n「你有沒有想過你的責任？」\n「我哪裡沒有盡責任，每天早上我都出去賣布，賣的錢都交回來，哪裡沒有盡責任？」\n「家裡沒有責任嗎？」\n「家裡的事都聽妳的，讓妳全權決定，讓妳那麼自由，這樣還不好？」\n「我懷孕不方便，你不用幫忙照顧三個孩子嗎？」\n「我也是快傍晚才出去，那時，沒什麼客人，你也可以照顧孩子呀！連我這一點點嗜好你也要干涉，真的很愛管，我都不管妳，妳也不要管我。」\n「你怎麼那麼沒良心？我這麼辛苦，也不知道幫忙，一直去打牌，這些孩子都是姓邱，我得到什麼？」\n「妳要，也可以姓蔡呀，反正都是女的」\n\n阿金聽到這話，在也受不了了，抓起旁邊衣架就丟過去。\n\n「幹什麼啦，妳這個瘋女人！」阿明不理他，逕自走向房間。\n\n留在客廳的阿金雙眼模糊了，眼淚不爭氣的往下流，一直流、一直流...，幾年下來的爭吵，也不是沒想過離婚，憑自己條件，要找什麼樣的丈夫沒有，當初多少公子哥兒可是捧著白花花的銀子上門追求！回想這一生，只要是阿金想作的事，沒有作不成的，最想賺的錢也賺到了，白手起家，三年就買房，人人都稱讚，多了不起！但現在，她卻一點力都使不上，有三個孩子跟一間店要照顧，老四即將出生的阿金要顧慮的事很多。\n\n丈夫不成熟，溝通也沒有效果，稍微念一下，丈夫就更常出去打牌，更晚回來。衝到牌桌上抓人也是有的，但那只會引起更大的衝突，甚至上演全武行。硬的不行來軟的，阿金決定再試試看。\n\n「喔，今天怎麼煮那麼豐盛？」丈夫望著晚餐那一桌菜問道。\n「為了高興啊，你出門賣布那麼辛苦，應該的！」\n「不錯喔！對啦，就要這樣，家裡就是要高高興興，不要常常碎碎念，有夠煩！」阿明說。\n「好了，吃飯不要說有的沒的，吃飯吃飯！」阿金催促大家吃飯。其實，阿明在抱怨時，阿金差點又要生氣了。但是她想著如果生氣，就功敗垂成了，只好按耐住自己的性子，為大局著想。晚上，阿明心情愉快，主動找阿金親熱。夫妻算是和好了。\n\n阿金盡量作讓阿明高興的事，煮他愛吃的菜、熱情招呼到店裡下棋的鄰居、講話注意要溫柔，避免讓阿明感覺在管他。雖然爭吵有減少，但是這些改變並未等到阿明的正面回應，相反的，阿明以為老婆改變了，不反對他去打牌了，結果牌越打越兇。\n\n這日子雖過得不滿意，加上為了生個男生，總共生了五個！五個孩子加上店裡的生意，責任感重的阿金也沒力氣一直吵，就這樣又過了幾年。\n\n這一天，小孩生病，阿金打電話要阿明從牌局中回來，阿明嘴巴說快了快了，但是一直沒回來。阿金實在受不了，把店收一收，挺著肚子，拿著菜刀，帶著生病孩子去找阿明。打牌的都是鄰居，看到阿金手上那把刀，大家都勸阿明回家，也一哄而散了。阿明覺得很丟臉，兩人一路吵回家。\n\n「妳這樣做，我的面子要放在哪裡？」\n「你還要顧到面子，我都快活不下去了」\n「和我在一起這麼痛苦，要不然離婚啊」\n「要不是為了小孩，我早就想離了」\n「媽媽，我的頭很熱！我想吐！」生病的老二從房間走出來中斷兩人的爭吵。\n「趕快送急診啦！」阿金喊著。\n\n折騰到大半夜，孩子總算退燒，阿金也沈沈睡著。早上丈夫照樣出門做生意，但奇怪的是了下午還沒回來，平常，中午過後就會回到家的。\n\n一直等一直等，晚餐時沒有回來，阿金想會不會又去打牌了，一陣不高興的情緒又上來。到了晚上，孩子們都睡了，還沒回來，憤怒已經累積到最高點。但鄰居們說沒有去打牌。天亮，人竟然還是沒有回來，阿金有點著急了，會不會出事了。聯絡了平常承租攤位的老闆，都說沒見到阿明。\n\n「人回來了嗎？」鄰居阿紅問。\n「沒有。」\n「怎麼會這樣？以前有這樣嗎？」\n「沒有這樣過。已經一個禮拜了，我已經擔心到麻痺了。」阿金\n「他應該是嫌妳不要他打牌啦，生氣了！」\n「他如果真是這樣，我真的是不指望他了，都沒想到我還有五個小孩要顧！都不回來算了！」阿金委屈又氣憤的說。\n\n突然，一通電話進來\n「阿金在嗎？」\n「我就是，妳哪裡找？」\n「我是三兄啦，你家鐘明在我家耶，他來彰化住了一個星期不走，我覺得怪怪的，打電話問妳一下。」\n「他已經出去一個星期，消失一樣，我也找一個星期了。」阿金知道丈夫下落鬆了一口氣卻也無奈的回答。\n「鐘明說他要到彰化作貼合廠耶。」三哥說。\n「到彰化開貼合廠？」阿金充滿極度的困惑。" },
            { title: "第七章 從布行老闆娘到貼合廠老闆娘", text: "「我要到彰化當貼合廠的學徒，一年，只要一年，我學成功夫後，我要自己開工廠！」從彰化回來的阿明逕自宣布著！\n「那個好嗎？」面對這麼大的轉變，阿金顧不上詢問丈夫離家出走的細節，只想瞭解阿明的新計畫。\n「我想過了，成衣廠興起後，一件襯衫50元就買得到，越來越少的人來裁布請師傅作衣服了，太貴了，一定要趕快轉業，才賺得到錢。」阿明分析著。\n「孩子那麼多，都在唸書，要轉學也要等暑假。」阿金思考著。\n「你們先不要去，我自己一個人，可以住工廠宿舍，比較簡單，等開了工廠，一切上軌道，你們再過來。彰化到高雄，三個小時就到，我一個人跑，比較簡單啦！」阿明早已決定，他回來只是告知太太。\n\n就在老大才五年級，阿明將五個孩子和一間布行留給太太，到彰化貼合廠學鞋材貼合技術。阿金一個女人要照顧這一大群孩子和一間店，談何容易？但是阿明說得沒錯，光靠已沒落的賣布生意，很難養大孩子，的確需要另謀生路。看在五個孩子嗷嗷待哺的份上，阿金也只能支持。想到丈夫中年轉業，願意放下老闆的身份從學徒當起，也是不簡單。他願意扛起家庭的責任總比沈溺在打牌中好。\n\n一開始，阿明每個月都會回來一趟，時間久了，間隔越拉越長，孩子們也開始給爸爸寫信，阿金雖然忙碌，但都寄望丈夫早日學成開工廠的一天。\n\n「老闆說我可以開了！」一年多以後，阿明在電話中興奮說著。\n「真的喔，你這麼厲害喔！」阿金也是高興著。\n「你有五十萬嗎？租廠房、買機器、請工人都要用錢。」\n「不太夠，布行生意不太好，勉強付生活費。怎麼辦？」阿金說。\n「將房子拿去抵押，跟銀行借。」阿明說。\n「唉，才剛剛繳完房貸，現在又要開始繳利息！」阿金說。\n「做生意就是要投資，要賺錢就要膽大。」\n「知道了」！當丈夫願意努力賺錢，阿金比什麼都高興，再苦也會跟著撐下去。\n\n「媽媽，還有多久才會到？」阿金的小兒子建豪問。\n「高雄到彰化很遠耶，現在才剛離開高雄，沒有那麼快啦！」老二美蘭希望弟弟安靜點。\n\n在阿金老大上六年級時，阿明的「財明貼合廠」風光開幕，一家人從高雄北上彰化要看爸爸的新工廠。阿金雖對環境感到陌生，但是開幕儀式上「老闆娘、老闆娘」稱呼不絕於耳，聽得阿金滿心歡喜，她就知道她的眼光沒有錯，阿明雖然老實，但是有抱負，皇天不負苦心人，阿金一個人在高雄艱辛守著孩子和布行，現在終於熬出頭了！\n\n殊不知，苦難正要開始！\n\n「阿金呀，明天妳再匯三萬給我。」阿明交代著。\n「前天不是已經匯三萬了嗎？」阿金說。\n「工廠欠貨款，我錢周轉不過來。」阿明說。\n「你是將我當作銀行是不是？讓你去彰化是為了賺錢，不是為了花錢？」\n「要回本那有那麼快？」\n「我每天要顧孩子、顧店，還要幫你找錢，你乾脆叫我搶銀行算了！」\n「再忍耐一下啦，我一定很快賺到錢。」\n「嘟嘟嘟.......」阿金不想再講，所有的壓力只能透過掛掉電話來抒發。但她能作的，也只是抒發，睡一覺起來，還是想辦法給丈夫匯了三萬塊。工廠運作要原料、要水費、要電費、員工要吃飯.....，不幫忙又能怎麼辦？\n\n所幸，阿明也真的勤奮工作、努力接訂單，收入的確比漸漸沒什麼客人的布行好很多，阿金的壓力這才小了一點。看著工廠運作日漸穩定，阿金提出一家北上團聚的想法，畢竟她一個人撐著一大家子，實在也累了。\n\n就在分開三年後，阿金和孩子搬到彰化跟丈夫團聚。\n\n阿明因為工作忙，隨意找了一個房子，為要靠近學校，只好遷就了。那是一個三層樓的透天房子，二樓一個房間，整個三樓沒有隔間，五個孩子像軍人一樣，每個人分配到一張書桌、一張單人床、一個塑膠衣櫥。看著簡陋的居住環境，孩子們很失落，還以為上來跟開工廠當老闆的爸爸團聚是要過更好的日子，沒想到連自己的房間都沒有。跟爸爸相處也不自在，可能是因著環境陌生，對阿明也是感到陌生。\n\n失落也在阿金的身上出現了，以往阿明久久回高雄一次，小別勝新婚，相處上只要不談錢都很愉快，現在終於團聚了，她卻感到整個家顯得隔閡陌生，孩子跟爸爸不親，她跟阿明也需要重新適應每天在一起的生活。為了賺錢，家庭一分為二，竟需要付出感情疏離的代價，這是阿金始料未及的。\n\n除了家庭問題，其他問題也一一浮現。阿金發現丈夫不擅管理，例如廚房每天的伙食費過高，煮出來的菜色卻不盡人意。阿金反應了幾次，阿明聽得不耐煩，竟要阿金自己去煮。為了節省開銷，阿金竟從一個打扮光鮮亮麗的美容師、布行老闆娘變成工廠煮飯阿姨。對於不擅廚藝的阿金來說，廚房工作是困難的，一大早買菜、洗菜、備菜、煮菜、洗廚房，剛去的時候是夏天，沒有一天不是汗流浹背煮完飯的，煮完自己都沒食慾了，每一天都是狼狽的生活著。阿金心中無限的委屈，但只要能對家裡有幫助前，她願意吃苦。沒想到，工人表示不習慣阿金煮的菜，阿明為免麻煩，要阿金別煮了，還要阿金別再管他工廠的事了。\n\n情勢的變化叫阿金情何以堪！高雄的親友為阿金送行，個個羨慕她要當悠閒的老闆娘了，豈不知連當煮飯阿姨都被嫌棄。阿明是個不擅言詞的男人，更不懂安慰阿金的辛苦，阿金拉著他多講幾句鬱悶的心情，阿明就覺得她在鬧，不勝其煩，更常藉口工廠要趕貨，留在廠裡加班。\n\n阿明的工廠也不是一直都很順利，接到訂單越來越少，因為鞋廠開始西進大陸了。鞋廠的生產線需要很多工人，台灣工資越來越高，鞋廠漸漸吃不消。當時正遇上大陸改革開放，台灣人可以到大陸設廠，大陸低廉的工資無疑是鞋廠的救命丸，於是一家接著一家的鞋廠陸續遷廠到大陸。原來中部地區蓬勃的製鞋工廠只剩不到一半還在苦撐。身為製鞋業上游廠商的貼合廠主要是跟鞋廠配合處理皮革貼合，沒了鞋廠，貼合廠也沒戲唱了。阿明曾想過也將貼合廠移到大陸，阿金不同意，這一家好不容易團聚了，這又要分開，可不行。阿明只好買功能更好的機器，接技術更高難度的訂單維持生計，這也需要更多錢。\n\n面對丈夫資金的缺口，阿金想要幫忙。以前習慣每天賺現金的阿金在這人生地不熟的異鄉無法有任何收入，她被困住了。她想著或許可以像以前一樣賣保養品。在員林這鄉下地方能夠接觸到最多人就是菜市場了，一有了方向，她立刻行動。\n\n這一天，第一次不是為著買菜來到菜市場。阿金環顧四周，找尋她在菜市場開始她保養品事業的起點，還真給她找到了：竹筍攤！是的，就是竹筍攤！阿金對竹筍攤老闆娘的和善、熱心印象深刻，她盤算著：如果可以跟竹筍攤老闆娘變成朋友，她一定可幫她的。就這樣阿金天天到攤子上幫忙剝竹筍殼、跟老闆娘、客人天南地北的聊天，阿金的開朗、熱情很快被菜市場所接受，沒有多久，其他攤位的老闆娘、客人、客人的家人朋友都變成阿金保養品的客戶。阿金賺到的錢更是常常幫丈夫應急，包括有一次必須等到阿金拿錢到工廠，工人才有午餐吃。\n\n不到半年，阿金再度站穩腳步，賺到錢，賺回對自己人生的主導權，也賺回自信。但是也只能是自己的人生，丈夫的人生卻從來不是阿金可以掌握的。" },
            { title: "第八章 西進大陸經歷兇險", text: "「不去大陸不行了，就算是現在去，都太晚了。」阿明還是跟阿金攤牌了。\n「你有把握嗎？」\n「當然有啊，如果不是擋著我，現在工廠早在賺錢了，留在台灣只有死路一條！」「你心裡只有事業，我過的是什麼日子你知道嗎？孩子們怎麼長大的，你知道嗎？」\n「我只知道，沒錢，大家一起餓死！」\n\n又是錢！曾經是阿金最愛的賺錢，卻讓阿金再次嚐到跟丈夫分隔兩地的生活。面對生活壓力，誰能不低頭。這就樣，阿明帶著用房子抵押借的兩百萬隻身一人前進大陸。\n\n阿明是個老實誠懇的商人，一到大陸，很受老客戶的歡迎，過去常合作的鞋廠很願意幫助他，很快的時間就有了很好的發展。鞋廠因著工資低廉，獲利高，鞋廠賺錢，貼合廠也跟著賺錢。阿明再度在太太面前抬頭挺胸。\n\n聽著丈夫的捷報，阿金也就放心的守在台灣照顧孩子，也繼續她越來越壯大的保養品直銷事業。那時小兒子正值青春叛逆期，不愛唸書，老是在補習時間偷偷跑去打電動，常常送完貨還要去電動玩具店抓人，讓阿金很是煩惱。但至少不用再煩惱錢，阿金覺得好多了。\n\n終於小兒子也念高中，可以不用阿金陪在身邊時，阿金會到大陸小住一段時間陪阿明。阿明工廠一直擴充，不出幾年，帶去的兩百萬已將工廠資本額提升到千萬，員工有幾十人，好不風光！阿金也變成名副其實的董娘。去大陸的日子，就是貴婦的生活，家裡有佣人打掃、有阿姨煮飯、出門有司機，最常作的事就是跟其他董娘吃飯、聊天，很快的，這些董娘也變成阿金保養品的客戶，阿金是不會放過任何一個可以賺錢的機會的！阿金想想，爸爸這名字給她取得真好！\n\n然而，樹大招風，阿明的事業也不能倖免的遭受重創。同行嫉妒他工廠生意好，將阿明工廠沒有按實申報進口原料的情形檢舉到政府部門。這個情形在當時是公開的秘密，因為政府官員接受賄賂的收入遠比薪水多，有人鑽法律漏洞，才有油水可拿，商人也從中獲取利潤，有錢大家賺，何樂不為。不料，當時中國政府開始嚴格打貪，官員們人人努力自清，不敢再像過去一樣包庇。曾有同行提醒過阿明，阿明也有放心上，不再鑽法律漏洞，但那一次申報時，一時迷糊寫錯了。中國公安埋伏跟蹤，在阿明外出時，無預警的被抓走了，阿金接到消息，為免也被抓走，當天逃回台灣。\n\n阿金老二學的是會計，就幫家裡管帳。那時候剛好在中國查帳，還好有女兒陪同，否則阿金可要嚇壞了。兩母女帶著極度恐懼，一直到香港、過了海關、上了飛機，確定不可能被抓回大陸，才鬆了一口氣。\n\n回台灣之後，就開始想辦法要把阿明救出來，已顧不得昂貴的電話費，一通通的越洋電話一直打，到處打聽誰可以幫忙，結果，每一個信誓旦旦說可以幫忙的人都只是要騙錢，每一筆費用都是幾十萬起跳。阿金女兒們看明白後阻止阿金再答應匯款，阿金跟女兒們起了激烈的爭執。\n\n「難道，要對你爸爸見死不救？你們這些不孝女！」\n「媽，沒有用的，都是騙人的！」一直幫著匯錢的老二美蘭勸著。\n「啊---------！！」阿金崩潰大叫，她再也承受不了這些壓力了。\n\n但上天是顧念阿金的，此時她的女兒們成了她精神上的支持。從事心理諮商的老大，頂著自己也很焦慮的壓力，把媽媽當成個案，將自己所學用在媽媽身上，終於把阿金安撫下來。老四瑞分信了耶穌，正想去讀神學院，帶著極大的信心回娘家為媽媽禱告。阿金竟然感受到一股從天上來的溫暖及安定的力量，讓她有了盼望，阿金也開始跟著孩子禱告。\n\n神蹟發生了，之前不願接受任何申請的大陸公安部門竟主動聯繫阿明工廠，表示阿明住在國家招待所接受調查，需要交住宿費用，也可以跟阿明見面。這是阿明被抓後的三個月，阿金滿懷期待的再次回到大陸。見到阿明時，兩夫妻都很激動，因著旁邊都有公安監視，阿明只得把保險箱號碼寫在衛生紙上，偷偷交給阿金，囑咐他工廠重要文件都在裡面，也有一些現金，讓阿金把工廠收了。不要再繼續交相關費用。短短的會面之後，阿明說了句話讓阿金很心疼，他說：「這次，如果能夠出去，就回台灣吧，我們不作了。」三個月的監禁、拷問讓阿明完全喪失以往的企圖心，阿金也開始體會到比錢更重要的是親情呀！現在她一心一意只想要把丈夫救回來。\n\n家裡孩子們陸續信了耶穌，焦慮的氛圍逐漸被一起禱告的溫暖取代。半年後，出現後第二次的神蹟，中國政府竟願意讓阿明無條件被釋放，阿金女兒趕緊託大陸友人繳交機票費用，公安直接將人帶到機場搭機回台灣。還記得阿明的班機降落後，阿金和大女兒等了一個小時還見不到人，都到家門口了，為何還有阻攔呢！心急詢問之後，才知阿明證件早已過期，正在補辦證件。那時候的兩個小時就像一世紀那麼長，終於見到虛弱的阿明從閘門走出來時，阿金早已淚流滿面。\n\n「回來就好，回來就好！」阿金含淚說著。" },
            { title: "第九章 從小工廠老闆娘變成千萬工廠老闆娘", text: "阿明從大陸回來休養了一個月，接到一通電話，他的鬥志又恢復了！\n\n「我想回大陸！」阿明說。\n「回大陸？！」阿金瞪大眼睛的問。\n「留在台灣每天讓電視看，看到睡著，這樣的日子跟廢人沒兩樣！」阿明有點生氣。\n\n一想到過去半年的心驚膽跳，餘悸猶存的阿金不想講話。\n\n「我只會當老闆，留在台灣只能當警衛，我不要！」\n「工廠已經收起來了，你要怎麼開始？錢也剩不多了。」阿金試圖讓丈夫知難而退。\n「當初我不是從零開始嗎？現在我還多了經驗。只要一切照規定來就不會有事。」\n「是誰打電話給你，怎麼你接了電話就要回大陸？」\n「是黃董，他說我的工廠出品的品質那麼好，不做了，是大家的損失。他跟很多鞋廠老闆聊到我，大家都很替我覺得可惜。只要我願意回去，他們都會幫我的忙。\n\n黃董是阿明的客戶兼好朋友，承諾願意在自己鞋廠規劃出一個區域免費出借給阿明，待阿明可以自立時，隨時可以離開。這麼好的機會阿明不想放棄，他想這應該是人生最後一個機會了。\n\n阿明的誠懇、用心讓許多老客戶相挺到底，沒想到業績比之前的工廠還要好，訂單一張接一張。經過被羈押事件，阿明更珍惜，以更感恩的心態作事業，回饋客戶。阿金也用更多時間陪著阿明，畢竟這是失而復得的丈夫。\n\n阿明更開始想著接班人的問題，在這次經驗中，他體會到一個事業所以是事業，不在於廠房、員工，而在於信譽。雖然他曾犯了法律的缺失，但是他的態度贏得了客戶的信任，以致於可以東山再起，這是他事業價值之所在。在打擊中，他萌生退休念頭，讓他意識到終有退休的一天，再回來，他想要找接班人！把他的信念、態度和這個事業的價值傳承下去。\n\n沒想到，家裡五個孩子沒有人願意接手經營工廠！這時，出現了一個柯先生，曾經在商會上一起吃飯認識的，他看上阿明的工廠很得客戶賞識，想投資成為合夥人，想跟阿明學技術。柯先生比阿明年輕20歲，他的出現正符合阿明的需求，他沒錢，柯先生有錢，他想傳承技術，柯先生夫想學，兩人一拍即合。\n\n新廠房比阿明以前的工廠都大，也更有規劃，阿明很滿意。柯先生擅長經營管理，阿明很放心交給他，由於不想再跟政府打交道，所以用他的名字登記成公司負責人，自己只負責技術指導，講好利潤平分，前所未有的輕鬆、放鬆還讓阿明在工廠裡搞了一個魚池，養起魚來了。阿明覺得這一生的努力走到現在，很值得。\n\n「邱董，我覺得您對師父的要求要再嚴格一點，免得師傅散漫。」柯先生說。\n「小柯，帶人要帶心，你對他好，他自然會回報你，要把員工當家人。如果員工不想留，待不久，也會影響工廠產品的品質。」阿明語重心長說著。\n「邱董，我很敬重您的是長輩，也敬重您的專業，技術方面我聽您的，但是公司經營管理還請您尊重我。」\n「小柯，我當老闆已經很多年了.....」阿明有許多苦口婆心的話要講。\n「邱董，您不用說了，我已經決定了，獎懲制度也經頒佈，就這樣。」柯先生講完話轉頭就走。\n\n阿明的心涼了一半，原來柯先生並沒有把阿明當合夥人，充其量是當個技術指導，對外宣稱董事長是阿明，也只是用來留住客戶，這不是阿明與他合作的初衷，這情形下更不可能傳承正確的企業精神。不過，雖然不樂意，阿明卻感到自己不像從前年輕氣盛，要換做從前，一定馬上拆股走人。但是現在阿明沒錢、沒力氣了。留在這，總比回台灣強啊。\n\n「爸，你們公司的帳怪怪的。」老二美蘭從台灣來電。\n「有什麼問題，就跟柯先生的太太對帳呀。」阿明說。\n「我找過她了，她說傻子才只有一本帳，照實作帳，利潤從哪裡來。而且，當初大家說好利潤均分，他也沒有照作。」\n「這樣就不對了。」阿明跟政府打過交道，不願再有違反法律情勢，非得找柯先生講明白。\n「邱董，我已經說過了，除了技術方面，其他地方請您不要過問，您該得的那一份，我會如數奉上，您不用擔心。」\n「我也是合夥人，我當然有權利監督帳怎麼作。而且我女兒說，你們給我的分紅少了！」阿明說。\n「邱董，不是少了，是先扣著，您一直要買新機器，我怎麼知道划不划算，當然要先扣著，如果不符經濟效益，這支出當然由您的錢扣。」\n「這樣，我沒有辦法再繼續合作。」阿明生氣了，不想再這麼窩囊留在這。\n「可以，我也不勉強您留著，但是營業登記負責人是我，在法律上，您就是我的一個員工，所以你無法動這公司，我可以給您一筆優渥的拆夥費，大家好聚好散。」柯先生面不改色的說。\n\n到這，阿明才看清楚柯先生的真面目，他真正的目的是拿到這家公司的經營權，他看準阿明需要資金，而且不想再跟政府打交道，絕不會想跟他打官司，之前更是拿出誠意十足的態度，要阿明相信他，不需要打契約，暗地裡早就把公司變成他的了。\n\n「不然，來禱告看看？」阿金說。\n「禱告什麼？」阿明問。\n「你被關的時候，小孩叫我禱告，後來就被放出來了。」知道阿明反對信基督教，阿金小心的說著。\n「妳禱告就好。」沒想到，阿明沒有斷然拒絕。\n\n阿金趕緊告訴小孩，要小孩一起禱告。在台灣的孩子知道了阿明的處境，馬上過去大陸聲援他，不能讓爸爸被欺負，特別是老四還帶了牧師，要替爸爸祈禱祝福。\n\n「邱爸爸，我們來禱告，上帝一定會幫助你的！」遠從台灣來的牧師一見到阿明就這麼說。\n\n因著這挫敗，阿明早沒有當初16年前反對孩子信基督教的殺氣，柔軟的說：「我是很需要耶穌的幫助啦，但是我是拿香拜拜的，這樣會不會不好意思？」\n\n「邱爸爸，上帝愛你，你知道有多少人在為你禱告嗎？起碼超過四百多個人，你的四個孩子在不同的教會，都邀請許多人為你禱告著，上帝真的很愛你，你只要相信他，一起來禱告就可以了。」牧師溫暖的說著。\n\n「四百多個喔，這麼多！」阿明很驚訝，長年在外忙事業，他跟孩子的關係很疏離，甚至對孩子們說過：我花的錢都是我自己賺的，你們要花錢，自己去賺。他沒想到孩子竟以熱切的愛回報他的冷漠。\n\n「爸，上帝一定會幫助你的！別擔心。」瑞分老四說。\n\n此時，阿明更是浮現出一個情景。有一天他回台灣休假，正准備在家燒香拜拜時，尚處青少年老四瑞分說了句：這是木頭作的，又不是真神。阿明得知小孩上教會後，氣得把孩子的東西都扔到門外，說要斷絕關係，知道是老大向弟弟妹妹傳的耶穌，氣得打電話給台北的老大，說：「妳厲害，會傳耶穌啊，那弟弟妹妹妳給我帶出去養！」想起過去情景，阿明覺得很對不起孩子。\n\n「爸，你在想什麼？一起來禱告呀！」老大雪媚的呼喚把阿明帶回現實。\n「好好，來祈禱！」現實的打擊、孩子的溫暖讓阿明變成一個柔軟的老人。\n\n經過連番的激辯及堅持，柯先生終於願意讓步，他開出條件，如果五天之內可以把機器搬走，那他不會攔阻。阿明覺得不可能，怎麼可能五天之內找到可以搬的廠房，而且最近總是下雨，更不可能搬動大型機具。死馬只能當活馬醫，不可能也要找，阿明找了三天都沒有合適的廠房。老四瑞分因著台灣還有工作，不得已先回台灣，在到機場的途中，突然看見廠房出租，電話中請爸爸去看一下。一開始阿明不置可否，笑笑說：我在大陸這麼多年，熟門熟路都找不到，怎麼可能住台灣的女兒會找得到！\n\n「你一直靠自己，最後得到什麼？以前，你總是一意孤行，聽不進勸，牧師說要相信上帝，去試試看。」阿金勸著阿明。\n\n神蹟再次發生，那個廠房的大小、租金不僅適合阿明，而且很多東西是現成的，直接可以使用，馬上可以搬進去。最後一關來了，下雨天，大型機器不太能搬，而且只剩兩天了。阿明第一次打電話給老四。\n\n「是阿分嗎？我是爸爸。我要請你們禱告，請上帝幫幫忙，我這邊的雨暫停一下，只要一天我就可以搬完了。啊這樣求會不會太超過？」阿明說。\n「不會啦，上帝要怎麼作，上帝自己會決定。」第一次接到爸爸電話的瑞分開心的說。" },
            { title: "第十章 從董娘回到阿金", text: "結果竟然真如阿明的禱告，期限的最後一天，雨停了，阿明趕緊聯絡工人搬機器。到了新廠房，他在他的辦公室放了兩張桌子，一張寫著董事長，一張寫著總經理。\n\n「總經理是誰？」阿金問。\n「是我！」阿明說。\n「那董事長又是誰？」阿金問。\n「上帝！」阿明說完跟阿金笑了開來。\n\n「從現在起，我聽上帝的，不再堅持自己意見了，你說得對，我一直靠自己，最後失去很多。還好有妳一路相挺！以前我很多不成熟，讓妳辛苦，對不起！」阿明說。\n\n阿金聽到這些，驚訝的睜大眼睛，懷疑是不是自己聽錯了，這輩子除了一次丈夫喝醉酒，說過：「太太，妳辛苦了！。」阿金從沒聽過木訥的阿明道愛、道謝、道歉的。阿明的幾句話，讓阿金覺得值得了，也想起爸爸的期許：希望自己是個賢叔的女人。阿金想：自己做到了！！\n\n住進新工廠的董事長宿舍第一天，夫妻倆又吵架了。\n\n「司機要把貨載出去，一定要嚴格登記，不然，很容易把庫存偷出去賣。」阿金擔心的說。\n「我會注意，不要一直碎碎念！不然，妳回去台灣啦，很煩！」阿明不耐煩。\n「好不容易走到今天，不小心守著，又要重來一次嗎？你這都重來幾次了！只會對我發脾氣，想想是誰一路陪著你！」阿金生氣了。\n\n阿明聽到這話，想起牧師的交代：「你們作丈夫的，要愛太太，成為太太的肩膀。」往事一幕幕突然浮現，阿金雖然不是溫柔的小女人，但是一次次陪他共度難關，不離不棄，還要承受自己的壞脾氣。再看看已經不再年輕漂亮的阿金，想到曾經貌美如花的太太為這個家吃的苦，心中頓時湧現對太太的無限疼惜。\n\n「好啦，妳不用走，我走！」阿明站起來說。\n「你又要幹什麼！」仍有情緒的阿金面對阿明反常的舉動不知所措。\n「我現在信耶穌了，要聽聖經的話，要愛太太。我叫你回台灣，是我脾氣不好，你不用走，要走的是我，我出去走一走，反省一下，冷靜了再回來。」說完，就走出去了。\n\n阿金驚訝又感動，信了耶穌的阿明讓阿金好像換了一個老公！\n\n「邱董，恭喜恭喜，鴻圖大展啊！」來參加工廠開幕的賓客熱絡祝賀著。\n\n阿金看著嶄新的工廠，笑容滿面的丈夫，心中無限滿足。\n\n這時候她真的覺得心裡閃閃發亮，不是因為財富，而是因著自己不畏人生路途上的險惡，一次次勇敢面對、承擔起自己的責任，因而收穫豐碩的感情、家庭及人生。\n\n她，閃閃發亮，不是因為多金，因為她是「阿金」！" }
        ]

            aunt: {
                topTitle: "📖 正在閱讀第三冊：蔡秀鳳小阿姨《瀟灑走一回》",
                title: "瀟灑走一回",
                author: "像媽媽一樣的秀鳳阿姨",
                editor: "◎ 邱雪媚 整理撰寫",
                sub: "在麻醉中舒服的睡著，在開刀前回天家，安詳如睡",
                chapters: [
                    { title: "再見了，像媽媽一樣的秀鳳阿姨", text: "2025/7/11，一早，一如既往，滿懷愛心照顧著行動不方便的淑金姐姐，出門前說要到市場採購食材，要煮好料給姐姐吃！\n\n沒想到，早上十一點說手無力，送到急診，醫生說主動脈剝離，需要緊急開刀，才剛麻醉完心臟就停止跳動，馬上接葉克膜維持，6點12分移除葉克膜。\n\n她常念著她要舒舒服服回天家去找上帝，上帝回應了她的禱告！\n\n得知妹妹情況不好，媽媽隨即趕到醫院，安慰阿姨，並且鼓勵她好好跟著耶穌，這時候，阿姨留下了眼淚，雖然不能言語，但能感受到了姐姐的愛，也讓我們的心得著安慰！\n\n一生沒有結婚，人生最後二十多年一直跟我們家在一起，像媽媽一樣疼我們的小阿姨。從小到大，阿姨好照顧我們每個小孩！\n\n我接到消息馬上從台北趕到彰化基督教醫院，七點了，雖然沒能說上話，但可以見到她最後一面，可以摸摸她的臉，至少沒有遺憾！\n\n謝謝天父，讓阿姨在麻醉中舒服的睡著，在開刀前回天家，所以最後她看起來像睡著了一樣安詳。真的真的很錯愕、更更更捨不得，但我們都為著阿姨回天家前不需身心受苦，衷心為她高興。\n\n在阿姨的手機相簿裡，充滿一張又一張家族歡樂的照片，她總是期待也享受在兒孫滿堂的熱鬧團聚中，笑得好開心！！！\n\n我們最想跟阿姨說的是：《好喜歡與你在一起》——謝謝你牽著我手，高山低谷陪我走，從不放棄我，真誠愛我，接納我，一起做夢，一起笑，一起敬拜和禱告，一起慶賀每個生命的奇蹟。好喜歡與你在一起，分享生活，分享愛，沒有批判和論斷，心完全敞開，好喜歡與你在一起，像耶穌一樣地愛，你我不孤單，這裡有愛。" },
                    { title: "自立自強的人生", text: "秀鳳阿姨跟同齡人比起來格外有活力、好奇心、聰明、又有服務精神，不只長輩，只要她在場，就是可以看到工作，一直忙個不停，教會姊妹告訴我：你阿姨真的很衝！！我甚至認為她應該是個過動阿嬤！她的行動力從小就顯而易見一直到老。\n\n這個生在日據時代、重男輕女的台灣社會，身為家中排行第十一的女孩，一出生，雖帶著不被看重的性別，但是為自己爭氣的走出一條路。\n\n秀鳳是家中老么，跟最接近的淑金姐姐差了5歲，淑金姐姐20歲即離家工作，所以父母人生最後階段，秀鳳好像獨生女一樣陪伴了較長時間，所幸姐姐們都孝順，也住附近。\n\n聰明、認真、努力的她雖然考上不錯高中，但是家裡不支持她繼續讀，不認命的她堅持要繼續學習，就離開了家。更在60歲退休前在聚陽服裝公司被派在菲律賓擔任主管、經理20年，得到她想要的成就感！\n\n阿姨的好朋友兼同事說：她工作一向是非常認真負責，一直在菲律賓工作20年，直到退休。公司的老闆都對她工作態度與敬業精神，對她讚賞有加。也常成為其他分廠的支援，擅長處理狀況及問題。\n\n相冊中有很多出國旅遊照片，日本、新加坡、美西、長灘島……在當年應該是個很時髦的女子。" },
                    { title: "在外頗獲好評的小阿姨，是我最怕的小阿姨", text: "小時候，我最怕聽到媽媽說小阿姨要從菲律賓回來了，沒有一次不會不檢查我的抽屜，而且都會突然出現在我背後嚴厲地說：抽屜打開我檢查！每一次不例外的總是亂七八糟，阿姨就會說：在別人看不到的地方也要整齊。我點點頭，如果看我沒有整理的動作會接著說：我會站在這裡看你檢查完，通常背脊都是發涼的。\n\n除此之外，也都要檢查我們的筆拿得端不端正，字漂不漂亮、拿筷子正確的姿勢對不對，不但對我如此，我媽媽的九個孫子也都被她告誡過應該如何拿筷子，甚至在每年過年的時候祭出可以用筷子夾豆子就發獎金為獎勵，督促我們成長，她從來沒有鬆懈過！\n\n我是小女孩就告訴我要如何有氣質，現在我兒子都14歲了，回娘家賴床時，就會進房間指責我：沒有人像你這樣當媽的，竟然不早起做早餐給小孩吃。\n\n我是唸幼教專業，很早就明白一個觀念，每個嬰兒都帶著先天氣質來到世界上，秀鳳阿姨的先天氣質顯而易見是認真、執著、嚴謹，她說在菲律賓的時候員工最怕她，我一點都不懷疑。所以她老了，也是個認真生活的老人！\n\n想著她單身，每次有假期，總想帶著她和媽媽出去玩，常常說：不要。問她原因，總是說：我事業做很大。一問，事業還真不小！回天家前一天，74歲的她還在長照據點服務很多長輩們進行活動，她不也是長輩嗎？還是個活力十足的志工，也是郵局志工，每天風雨無阻六點多就起床到員林國小當導護奶奶，每天清晨當導護奶奶照顧小朋友過馬路，她說跟有些學生甚至是互相認識呢！聽到孩子說：奶奶早！她就開心！\n\n好多獎狀、獎牌，退休後更是一直維持打羽球。" },
                    { title: "終於感受到人的限制——秀鳳阿姨受洗過程", text: "2013年某一天的早上，秀鳳阿姨打電話給我小妹，需要趕快為她禱告，她發現早上睡起來，臉部整個顏面失調，嘴巴閉不起來，感覺臉整個歪了，很擔心自己是不是中風了。\n\n去醫院檢查，菲律賓的醫生也檢查不出來是什麼原因。所以急著要回台灣找出原因，但她非常害怕她回不了台灣，因此，在上飛機前，又再次打電話給我小妹，於是，小妹就帶她求上帝讓她順利回到台灣就醫，也帶領做了決志禱告。\n\n感謝主！回到台灣檢查是病毒性感染造成顏面神經失調，經過治療後也得到醫治。所以，在2013年4月21號，阿姨就樂意的受洗成為上帝的孩子。\n\n受洗後，剛開始，常把自己當主管那一套用在弟兄姊妹身上，常常跟我們抱怨誰誰誰不認真、誰誰誰不公平、誰誰誰這樣做不合聖經的教導，我們跟她講服事跟當主管不一樣還會被她罵，但慢慢地，她開始柔軟，跟著信仰造就的課程，會自己很認真的抄聖經，慢慢地，常常聽到她在唱詩歌，參加教會詩班。一直到最近，我們都還沒跟她抗議說她太兇了，她就會自己說我已經在改了，當她一旦把改變自己當成目標，她也不會放過自己，這個真的讓我太敬佩了。\n\n我在聖經上讀到一個更有意思的句子，創世紀一章27節，上帝是按著他的形象造人，所以，秀鳳阿姨從小就有的認真、嚴謹是神美好的創造，只是人用自己的意思過人生，使用過當，遇到疾病、苦難，發現不能再靠努力解決所有事情時，特別恐懼無助！所以，那次生病過後，阿姨就緊緊抓住神，活在有神同在的安全感中！" },
                    { title: "大家族有許多的兄姐 ‧ 主內家人", text: "秀鳳阿姨跟媽媽兄弟姊妹相聚時都聊得好開心，可惜只收集到一些些照片。\n\n創世紀1：27上帝是按著自己的形象要製造人，所以每個人這些與生俱來的特質都是從上帝分賜而來，所以就成了後來我們看見熱心服事的秀鳳姊妹——員林和平長老教會的主內家人。" },
                    { title: "退休後被家的溫暖充滿", text: "當秀鳳阿姨被許多詩歌、上帝的話語溫暖醫治過去雖堅強但孤獨的心靈後，越來越慈祥、可愛，也把她的能力全部奉獻給身邊需要的人，我們這一家真的很感謝她對我媽媽的照顧，比我們所有小孩照顧的都還要好，我也替阿姨感謝：沒有結婚的她因著我媽媽的五個小孩，過上了教會的生活，有了教會主內的家人，也因著她的心柔軟能夠被安慰，也跟著我們大家族享受了家的凝聚力與愛，家族照片一定有姨婆。我真的超級開心許多孫子圍著外婆、姨婆時候的溫馨融洽，也謝謝秀鳳阿姨參與我們的人生許許多多的部分。\n\n淑金姐的小孩孫子就是秀鳳姐的小孩、孫子。" },
                    { title: "大女兒雪媚：兩個媽媽", text: "謝謝阿姨照顧我2025開刀，讓我有兩個媽媽！！妳比媽媽有學問、見識廣，總是教我們許許多多做人處事道理，也照顧我們無微不至，失去妳，真的超失落，我想我要適應很長一段時間，還好，剛帶妳去玩不少地方，沒有遺憾了！\n\n親愛的姨婆：過年都會有兩張椅子，你和阿嬤坐中間，我們拜年，以後只剩一張，我想到就難過。謝謝您每次在我回到員林的時候，都讓我們住，早上還準備早餐給我吃，也教我許多道理。只要我考得好，你總會發獎學金，請放心，雖然，你回天家了，我仍會繼續認真讀書的！\n\n（二女兒楚涵一家）從嬰兒看著長大的芷瑜上大學，姨婆好開心！" },
                    { title: "三女兒、小女兒的告別", text: "三女兒美惠：阿姨，謝謝妳總是像媽媽一樣的接待我們在妳家住，常常麻煩妳要整理家務、準備餐食，每次回娘家都倍感溫馨，妳息了地上的勞苦，到神那裡去好得無比，相信將來我們會再相會的。美惠\n\n女婿景祿：阿姨，您每次都會問我「要不要喝咖啡」？記得第一次在您家裡，您拿了一台手搖磨咖啡豆，我磨了半天手都酸了，咖啡豆才磨了一點點！這是我人生第一次磨咖啡豆初體驗！阿姨也是一個很會品嚐美食的專家，有時還會研究自己怎麼煮！阿姨年輕的歲月在菲律賓工作的時光，您說著怎麼管理下屬，過著被人服事的生活，但在您退休回臺灣後的歲月，受洗信耶穌，您是服事教會，服事社會中有需要的人身上！活出耶穌的生命！阿姨您是我們的榜樣。阿姨⋯我們天上再見了！\n\n小女兒瑞分：小時候對阿姨的印象就是從台南帶了很多芒果來高雄給我們吃，教我們五個小孩怎麼正確拿筷子。看到照片中，發現我結婚、生小孩、宗彥按牧⋯重要的時刻，您都有參與到。謝謝阿姨的關心陪伴！很開心的事，就是阿姨受洗成為天父的公主，後面十幾年也當義工、在教會參與服事和陪伴照顧我們的媽媽，成為許多人的祝福，活的相當精彩！最後要說的是～小阿姨有您真好⋯⋯\n\n女婿宗彥：謝謝阿姨，每次回員林都對我們噓寒問暖，泡咖啡給我們喝，熱心接待我們在家中住宿，感覺就好像回到自己的家一樣。尤其我的父母生病以後，時常會來關心他們的狀況，也特別來台北為他們禱告，給他們加油打氣。另外，也感受到阿姨非常重視家中的團結，以及下一代的教養，常跟我分享她過去待人處世，和建造團隊的寶貴經驗，使我獲益良多。再次感謝阿姨過去對我的關愛和扶持，我們天上見喔～" },
                    { title: "孫子們的記憶", text: "大孫子主行：老實說，我對姨婆的印象其實不算多，一年見到她的次數幾個手指頭就數得出來，從小最有印象可能也就是過年拿紅包的時候。雖然見面的機會不多，但她卻給人一種很親近、很溫暖的感覺，就像最親的家人一樣。姨婆對我說的話不多但遇到我總會關心我最近怎麼樣，然後鼓勵我，也教我怎麼和弟弟妹妹們相處，怎麼照顧大家。讓我最佩服的是，姨婆退休後，還是一直在奉獻她自己、用笑臉幫助了很多需要的人，姨婆是一個值得我學習的人，我會向您看齊！\n\n孫子主宣：感謝姨婆在我們家回去員林時，都會特別整理空房間給我們睡，也會很關心我們現在情況。今年過年時，我身體很不舒服的躺在沙發上，記得姨婆您拿著水走來關心我的身體狀況，覺得您是一個很溫暖、細心的人。也看到姨婆很願意的在教會服事、當義工，幫助了許多的人。姨婆您是我們的榜樣！\n\n孫女詠心：親愛的姨婆，謝謝您讓我們回員林的時候都不用擔心住的問題，也謝謝您陪我們玩，您也會送我們小禮物，妳是全世界最棒的姨婆，我愛您喔　詠心敬上\n\n孫女恬馨：親愛的姨婆，謝謝您對我很好，還記得您有一次帶我們去吃很好吃的早餐，也謝謝您對我們的照顧，讓我們家能夠住您家，我愛您　恬馨敬上" },
                    { title: "建豪給小姨最後一封信", text: "小時候永遠都分不清楚我到底有幾個舅舅，有幾個阿姨？！辛苦了不是在生小孩，就是在生小孩路上的外婆。小姨應該是所有阿姨中最親近的，每一次從國外回來一定幫我們預備禮物，為了調整我們正確拿筷子的方式，還買「圓巧克力」，想吃就是得用筷子夾起來！！現在我也這樣訓練我的小孩，很想念小姨當年的樣子，整潔又時髦，充滿自信，每次登場，氣場強大，令人敬畏！\n\n小姨在國外顏面神經失調，被同事送回台灣，在機場接到小姨，第一次在小姨臉上看到不安和恐懼！很感恩上帝幫助小姨有平安，也親自醫治小姨！後來小姨決定退休回台灣，來到彰化員林和我們在一起，一開始真的沒事做，還憂鬱症半年，終於走進了教會，真正認識主耶穌，身、心、靈得全然的醫治，開始投入教會生活，感謝小姨，一直陪伴在教會的媽媽，更是不斷地關心我們家每個孩子，甚至是我們的孩子。\n\n小姨就是個認真的人，自我要求甚高，記得小姨有一次去了聖地以色列，回來後要分享心得及短信息，您拉著我一起討論如何呈現，感受到小姨認真負責的生活態度。小姨對於我們生活生命突破的表現總是給予具體又直接的讚美。過去這十幾年，每天都可以看到小姨來家裡走跳，和媽媽聊聊天，一起上教會，過年過節我們都在一起，謝謝小姨帶給我們家這麼多溫暖的回憶，小姨因為信耶穌，不至滅亡反得永生。如今蒙主寵召，息了地上的勞苦。與耶穌同在，好得無比。有一天我們還會在天上見面。\n\n在我心目中，阿姨就像聖誕老公公，印象中每次長輩要阿姨來我們家，我們五姊弟都會有禮物，有時候是阿姨工廠生產的知名運動品牌的衣服、或是國外的巧克力、芒果乾⋯⋯讓我覺得很被愛被看重。我想阿姨會在職場如此成功，是她認真負責的生活態度，當然她也會這樣的要求身邊的人，而且阿姨對於我們課業的進步、生活生命突破的表現總是給予具體又直接的讚美。\n\n媳婦詩怡：嫁入這個愛的大家庭已經14年，從阿姨退休回台灣定居開始，每年過年都會和阿姨一起預備年菜，阿姨對於菜餚的口味與烹飪的步驟別具匠心，讓一旁配搭的小幫手的我獲益良多，記得我們第一次煮大蝦，擺盤總覺得少了什麼，阿姨隨手拿起蔥段切成花，點綴其上，彷彿一道餐廳大菜，大廚阿姨為著手所作的心滿意足，我更為著與阿姨二代共廚的開心時刻充滿感恩，覺得自己是很被愛的下一代。側身觀察阿姨與我婆婆的互動，身體較靈活的阿姨總是會幫婆婆代步買東西、拿這個提這個，甚至耳提面命教會的活動細節、飲食的注意事項，實在姐妹情深，真情流露。多年前原本因身體不適返台治療的阿姨，過程中經歷屬天的平安與信仰的真實，於是信主受洗並且熱心投入教會服事，活躍在長者團契中，此刻阿姨突然的離去，實在讓至近的親屬悲傷不已，在極不捨中我們相信阿姨已經到天父那裡去，與我們相約在主裡，這也是我們最大的安慰與盼望，期待與阿姨天堂再相見！阿姨，我們愛您！我們相約在主愛裡呦～" },
                    { title: "替秀鳳阿姨感恩——姊妹情深中回天家", text: "秀鳳姨婆回天家前幾個月，淑金姐家剛好整修房子，所以淑金姐姐和秀鳳妹妹同住，回到小時候，只是兩人都已是要吃許多藥品的老姐妹。兩人每天都會互相提醒：補品吃了沒？秀鳳姐妹前不久，動了小手術在腳部，大家說：兩個人一起住，姐姐可以照顧妹妹。秀鳳姐：到底是誰照顧誰！沒錯，開了刀的秀鳳姐妹還是一天到晚叮嚀姐姐許多生活細節，念得淑金姐都怕了！！可愛的姐妹倆！！\n\n上帝賜於秀鳳的認真、執著讓她看重事情過看重人，容易得罪人，但是在聖靈的帶領下，她專注於服事有需要的人、服事神，以致於生命最後一刻心中沒有憂慮愁煩，只有照顧人的滿足！！最後，傳給家族的照片是她炫耀養的虎尾蘭開花了，心滿意足的她得到我們的讚，完成世上的工回天家，相信現在也得到上帝爸爸的讚了！\n\n耶穌說：我的食物就是遵行差我來者的旨意，做成他的工。——約翰福音4:34" },
                    { title: "恩典世界 ‧ 您就是神美好的創造", text: "姨婆很喜歡唱詩歌，好喜歡跟著詩班敬拜上帝。7/11回家前，練的最後一首詩歌是：恩典世界。我在7/13的主日聽到了，好美好美的詩歌。悠揚的旋律及讚美詞，就是秀鳳姨婆所經歷的那位主及祂所創造的美好世界。\n\n盡忠職守的姨婆7/13來不及在世界上獻上的讚美詩，7/26我們替她獻上敬拜。\n\n詩篇19:1　諸天述說上帝的榮耀，穹蒼傳揚祂的作為。感謝主⋯\n\n謝謝參加蔡秀鳳姊妹人生畢業典禮，我們天家見！\n\n您就是，神美好的創造！！\n\n因我看你為寶為尊，又因我愛你。（賽43:4）" }
                ]
            }
        };

        function buildPlaceholderBook(type) {
            const fName = {rose:"玫瑰", daisy:"雛菊", sunflower:"向日葵", orchid:"蝴蝶蘭", sprout:"綠豆芽", seedling:"種子"}[type] || "生命";
            return {
                topTitle: `📖 預留展位：${fName}生命寶盒`,
                title: `${fName}故事籌備中`,
                author: "虛位以待，精彩繼續",
                editor: "◎ 靜候您的生命篇章",
                sub: "點選下方回應按鈕，即可與雪媚老師預約您的傳記整理",
                chapters: [
                    { title: "珍藏一生足跡", text: "這格精美的植物方格目前正安靜靜候著您或您家中長輩的生命史。當未來新故事加入時，這裡就會開通專屬該生命的精彩翻頁書。\n\n不要讓寶貴的家庭記憶隨風逝去，整理過去是與自己、與親人和好最溫暖的旅程。\n\n歡迎點擊下方按鈕加入雪媚老師的官方 LINE，讓我們一起豐富這座充滿愛與傳承的數位生命故事花園。" }
                ]
            };
        }

        function openFullscreenBook(type) {
            document.getElementById('gardenMainView').style.display = 'none';
            document.getElementById('mainNav').style.display = 'none';
            document.getElementById('fullscreenBookView').style.display = 'block';

            currentType = type;
            let data = dataBank[type] || buildPlaceholderBook(type);
            dataBank['_current'] = data; // 暫存目前資料供翻頁時取用

            document.getElementById('topBookHeaderTitle').innerText = data.topTitle;

            // 封面頁(第0頁) + 每個章節一頁 + 最後留言頁附加在最後一個章節頁裡
            totalPages = 1 + data.chapters.length;
            currentPage = 0;
            renderFullscreenPages();
            window.scrollTo(0, 0);
        }

        function closeFullscreenBook() {
            document.getElementById('fullscreenBookView').style.display = 'none';
            document.getElementById('gardenMainView').style.display = 'block';
            document.getElementById('mainNav').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function renderFullscreenPages() {
            const data = dataBank['_current'];
            const box = document.getElementById('bookMainBox');
            const isLastPage = (currentPage === totalPages - 1);

            let html = '';

            if (currentPage === 0) {
                // 封面頁
                html += `
                    <div class="page-pane active">
                        <div style="text-align: center; padding: 50px 10px; background: #F1F8E9; border-radius: 12px;">
                            <h2 class="book-big-title">${data.title}</h2>
                            <p class="book-big-author">${data.author}</p>
                            <p style="font-size: 19px; color: #555; margin-bottom: 25px;">${data.editor}</p>
                            <p style="font-size: 19px; color: #2E7D32; font-weight: bold;">${data.sub}</p>
                        </div>
                        <span class="page-footer-number">封面 ‧ 共 ${data.chapters.length} 個篇章</span>
                    </div>`;
            } else {
                const chapter = data.chapters[currentPage - 1];
                html += `
                    <div class="page-pane active">
                        <h3 class="book-ch-title">${chapter.title}</h3>
                        <div class="book-big-text">${escapeHtml(chapter.text)}</div>
                        <span class="page-footer-number">第 ${currentPage} / ${data.chapters.length} 篇</span>
                    </div>`;
            }

            // 留言區只在最後一頁顯示
            if (isLastPage) {
                html += `
                    <div class="comment-box" id="commentBox" style="display:block;">
                        <p style="font-size: 21px; font-weight: bold; color: #1B5E20;">歡迎留下你的回應，一起豐富生命花園</p>
                        <a href="https://lin.ee/@431trrjk" target="_blank" class="comment-line-btn">💬 點我傳送回應與心聲</a>
                        <button class="admin-sunflower-btn" onclick="verifyAdminPassword()" title="管理員入口">🌻</button>
                        <div class="visitor-comments-area" id="commentsArea" style="display:block;">
                            <p style="font-size: 16px; font-weight: bold; color: #2E7D32; margin-bottom: 10px;">💬 溫暖回應錄：</p>
                            <div class="comment-item" id="c1">
                                <p style="font-size: 16px; font-weight: bold; color: #444;">學員 主恩媽媽：</p>
                                <p style="font-size: 16px; color: #555; margin-top: 5px;">讀完長輩的見證太受感動了！謝謝雪媚老師整理這麼棒的故事！</p>
                                <div class="admin-controls-badge">
                                    <span class="admin-action-link" onclick="adminDeleteComment('c1')">❌ 刪除留言</span>
                                    <span class="admin-action-link" style="color:#0288D1;" onclick="adminReplyComment('主恩媽媽')">✍️ 回應留言</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }

            box.innerHTML = html;

            document.getElementById('fullPrevBtn').disabled = (currentPage === 0);
            document.getElementById('fullNextBtn').disabled = (currentPage === totalPages - 1);
            document.getElementById('fullProgressText').innerText = `第 ${currentPage + 1} / ${totalPages} 頁`;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        function moveBookPage(direction) {
            currentPage += direction;
            if (currentPage < 0) currentPage = 0;
            if (currentPage > totalPages - 1) currentPage = totalPages - 1;
            renderFullscreenPages();
            document.querySelector('.book-max-wrapper').scrollIntoView({ behavior: 'smooth' });
        }

        function verifyAdminPassword() {
            let password = prompt("🌻 請輸入雪媚老師專屬管理員密碼：");
            if (password === "8888") {
                alert("🔓 密碼正確！已成功開通管理員權限。您可以直接在前台刪除留言或進行回應。");
                document.querySelectorAll('.admin-controls-badge').forEach(b => b.style.display = 'block');
            } else if (password !== null) {
                alert("❌ 密碼錯誤！無法行使管理權限。");
            }
        }

        function adminDeleteComment(id) {
            if(confirm("確定要刪除這則回應嗎？")) {
                document.getElementById(id).style.display = 'none';
                alert("🗑️ 該留言已被成功刪除！");
            }
        }

        function adminReplyComment(visitorName) {
            let replyText = prompt(`✍️ 請輸入您想對【${visitorName}】的回應：`);
            if(replyText) {
                alert("已成功記錄回應！");
            }
        }
    </script>

</body>
