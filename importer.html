function log(m){ document.getElementById('log').textContent += m + '\n'; }
async function run(){
  log('解壓縮題庫…');
  const bin = Uint8Array.from(atob(BANK_B64), c=>c.charCodeAt(0));
  const json = pako.ungzip(bin, {to:'string'});
  const rows = JSON.parse(json);
  log('題庫共 ' + rows.length + ' 題');
  log('檢查是否已有資料…');
  const { count } = await db.from('assessment_questions').select('*',{count:'exact',head:true});
  if(count && count>0){ log('⚠️ 資料表已有 '+count+' 筆，為避免重複，請先清空再匯入。已中止。'); return; }
  const recs = rows.map(r=>({set_no:r[0], dimension:r[1], q_no:r[2], q_text:r[3], reverse:r[4]}));
  const B=500;
  for(let i=0;i<recs.length;i+=B){
    const chunk = recs.slice(i,i+B);
    const { error } = await db.from('assessment_questions').insert(chunk);
    if(error){ log('❌ 第 '+i+' 批失敗：'+error.message); return; }
    log('已匯入 ' + Math.min(i+B, recs.length) + ' / ' + recs.length);
  }
  log('✅ 全部匯入完成！請刪除此 importer.html 檔案。');
}
