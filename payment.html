<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">

    <title>諮詢費用與匯款資訊</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #fdfbf7; padding: 20px; color: #5a554a; }
        .container { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; text-align: center; }

        .bank-info { background: #f9fbf8; padding: 20px; border-radius: 15px; margin: 20px 0; border-left: 5px solid #6b8e60; text-align: left; }
        .bank-info p { margin: 8px 0; font-size: 1rem; }
        .btn-confirm { display: block; background: #6b8e60; color: white; padding: 16px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 10px rgba(107, 142, 96, 0.3); transition: 0.3s; }
        .btn-confirm:hover { background: #5a7a50; }
        .note { font-size: 0.85rem; color: #888; margin-top: 15px; }

</head>
<body>

        <div class="bank-info">
            <p><strong>銀行代碼：</strong> 013 (國泰世華)</p>
            <p><strong>銀行帳號：</strong> 132-50-013341-8</p>
            <p><strong>戶名：</strong> 邱雪媚</p>
        </div>

        <p>匯款後，請點擊下方按鈕開始選擇您的專屬時段。</p>
        
        <a href="booking.html" class="btn-confirm">我已完成匯款，前往預約時段</a>
        
        <p class="note">若有任何疑問，歡迎隨時透過官方 LINE 聯繫老師。</p>
    </div>
</body>
</html>
